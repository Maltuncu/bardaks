<style>

    --border: #E2E8F0;

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  .kat-baslik::after { content:''; flex:1; height:1px; background:var(--border); }

  .fl-check { display:flex; align-items:center; gap:8px; flex:1; font-size:13px; cursor:pointer; min-width:0; }
  .fl-check input[type=checkbox] { width:18px; height:18px; accent-color:var(--accent); flex-shrink:0; }

  /* ===== KOMUTA MERKEZİ (HOME-COCKPIT-1) ===== */
  .hm-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }

</style>

<script>
const SUPABASE_URL = 'https://kfpgqqjmkutjzdmzkwaa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmcGdxcWpta3V0anpkbXprd2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTk2NzcsImV4cCI6MjA5NTE5NTY3N30.Y1ov7w7eDIJfzHYFeWPuU3D8fVMj3uMhXHB18y7Nfbs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== ŞİFRE SIFIRLAMA (RECOVERY) — guard + handler (AUTH-RESET-FLOW-3) =====
var __recovery = (function(){
  try{
    var hash = location.hash || '';
    var qs = new URLSearchParams(location.search || '');
    if(/type=recovery/.test(hash)) return {mode:'hash'};
    if(qs.get('token_hash') && qs.get('type')==='recovery') return {mode:'token_hash', token_hash:qs.get('token_hash')};
    if(qs.get('code')) return {mode:'code', code:qs.get('code')};
    return null;
  }catch(e){ return null; }
})();
// Bu flag: index.html recovery'yi yönetiyor → netkar_banka çift ekran açmasın + DOMContentLoaded auto signOut/login atlasın
window.__bardaksRecovery = !!__recovery;

function showRecoveryUI(state, msg){
  var login=document.getElementById('login'); if(login) login.style.display='flex';
  var app=document.getElementById('app'); if(app) app.style.display='none';
  var card=document.querySelector('#login .login-card'); if(!card) return;
  if(state==='err'){
    card.innerHTML='<h2>Şifre Sıfırlama</h2><div style="color:var(--red);font-size:14px;margin:10px 0 4px">'+msg+'</div>'
      +'<button class="btn btn-block mt" onclick="location.replace(location.origin+location.pathname)">Giriş Ekranına Dön</button>';
    return;
  }
  card.innerHTML='<h2>Yeni Şifre Belirle</h2>'
    +'<label>Yeni Şifre</label><input type="password" id="rcP1" placeholder="En az 6 karakter" autocomplete="new-password">'
    +'<label>Yeni Şifre (Tekrar)</label><input type="password" id="rcP2" placeholder="Tekrar" autocomplete="new-password" onkeydown="if(event.key===\'Enter\')rcSave()">'
    +'<button class="btn btn-block mt" onclick="rcSave()">Şifreyi Kaydet</button>'
    +'<div id="rcErr" style="text-align:center;margin-top:12px;font-size:13px"></div>';
}
async function rcSave(){
  var p1=(document.getElementById('rcP1')||{}).value||'', p2=(document.getElementById('rcP2')||{}).value||'';
  var err=document.getElementById('rcErr');
  if(p1.length<6){ if(err){err.style.color='var(--red)';err.textContent='En az 6 karakter';} return; }
  if(p1!==p2){ if(err){err.style.color='var(--red)';err.textContent='Şifreler uyuşmuyor';} return; }
  if(err){ err.style.color='var(--text-dim)'; err.textContent='Kaydediliyor...'; }
  var r=await sb.auth.updateUser({password:p1});
  if(r.error){ if(err){err.style.color='var(--red)';err.textContent='Hata: '+(r.error.message||r.error);} return; }
  if(err){ err.style.color='var(--green)'; err.textContent='Şifre güncellendi. Giriş ekranına yönlendiriliyorsunuz...'; }
  try{ await sb.auth.signOut(); }catch(e){}
  setTimeout(function(){ location.replace(location.origin+location.pathname); }, 1500);
}
async function startRecovery(rx){
  try{
    if(rx.mode==='code'){ var r=await sb.auth.exchangeCodeForSession(rx.code); if(r.error) throw r.error; }
    else if(rx.mode==='token_hash'){ var r2=await sb.auth.verifyOtp({type:'recovery', token_hash:rx.token_hash}); if(r2.error) throw r2.error; }
    else { // hash: detectSessionInUrl oturumu otomatik kurar; bekle
      var ok=false; for(var i=0;i<25;i++){ var s=await sb.auth.getSession(); if(s.data&&s.data.session){ok=true;break;} await new Promise(function(res){setTimeout(res,200);}); }
      if(!ok) throw new Error('session yok');
    }
  }catch(e){ showRecoveryUI('err','Bağlantı geçersiz veya süresi dolmuş. Lütfen yeni bir “Şifremi unuttum” linki isteyin.'); return; }
  showRecoveryUI('form','');
}
if(__recovery){ startRecovery(__recovery); }

let CURRENT = null;
let FIRMALAR = [], URUNLER = [], FIYATLAR = [];

const TL = n => (Number(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₺';
const today = () => new Date().toISOString().slice(0,10);
const trDate = d => { if(!d) return ''; const p=d.slice(0,10).split('-'); return p[2]+'.'+p[1]+'.'+p[0]; };

const ROL_RENK = { admin:'#1e5ba8', mudur:'#5c8fd6', imalathane:'#2e8b57' };
const ROL_AD = { admin:'Yönetici', mudur:'Müdür', imalathane:'İmalathane' };

let _loginUsers = [];
let _selectedUser = null;

// ===== GİRİŞ (Supabase Auth - e-posta+şifre) =====
async function girisYap(){
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const remember = document.getElementById('rememberMe').checked;
  const errEl = document.getElementById('loginError');
  if(!email || !pass){ errEl.textContent='E-posta ve şifre gir'; return; }
  errEl.textContent='Giriş yapılıyor...';
  if(remember){ localStorage.setItem('bardaks_remember','1'); }
  else { localStorage.removeItem('bardaks_remember'); }
  const r = await sb.auth.signInWithPassword({ email: email, password: pass });
  if(r.error){ errEl.textContent = 'E-posta veya şifre hatalı'; return; }
  const ru = await sb.from('kullanicilar').select('*').eq('auth_id', r.data.user.id).single();
  if(ru.error || !ru.data){
    errEl.textContent = 'Kullanıcı tanımlı değil, yöneticiye bildir';
    await sb.auth.signOut();
    return;
  }
  doLogin(ru.data);
}
function doLogin(u){
  CURRENT = u;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('currentUserName').textContent = u.ad_soyad;
  buildNav();
  initRealtime();
  if(u.rol==='imalathane') showPage('uretim');
  else showPage('home');
  refreshNotifs();
}
async function logout(){
  localStorage.removeItem('bardaks_remember');
  await sb.auth.signOut();
  CURRENT=null;
  location.reload();
}
function buildNav(){
  const nav = document.getElementById('bottomnav');
  let items = [];
  if(CURRENT.rol==='imalathane'){
    items = [{id:'uretim', ico:'🏭', label:'Üretim'},{id:'urunler', ico:'🍰', label:'Ürünler'},{id:'gunozeti', ico:'📋', label:'Notlar'}];
  } else {
    items = [{id:'home', ico:'🏠', label:'Komuta'},{id:'panel', ico:'💰', label:'Finans'},{id:'siparis', ico:'🧾', label:'Sipariş'},{id:'urunler', ico:'🍰', label:'Ürünler'},{id:'sohbet', ico:'✅', label:'Yapılacaklar'},{id:'firmalar', ico:'🏢', label:'Firmalar'},{id:'analiz', ico:'📈', label:'Analiz'},{id:'gunozeti', ico:'📋', label:'Gün Özeti'}]; // [FINANS-MERGE] Panel+Finans→tek Finans
  }
  nav.innerHTML = items.map(function(i){
    const badge = i.id==='sohbet' ? '<span class="nav-badge hidden" id="sohbetBadge">0</span>' : '';
    return '<button class="nav-item" data-page="'+i.id+'" onclick="showPage(\''+i.id+'\')"><span class="nav-ico">'+badge+'</span>'+i.label+'</button>';
  }).join('');
  refreshSohbetBadge();
}
function showPage(id){
  if(id==='finans') id='panel'; // [FINANS-MERGE] tek finans ekranı (eski 'finans' linkleri panel'e)
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.toggle('active', n.dataset.page===id);});
  const page = document.getElementById('page-'+id);
  if(page) page.classList.add('active');
  if(id==='home') renderHome();
  if(id==='panel') renderPanel();
  if(id==='siparis') renderSiparis();
  if(id==='uretim') renderUretim();
  if(id==='firmalar') renderFirmalar();
  if(id==='analiz') renderAnaliz();
  if(id==='gunozeti') renderGunOzeti();
  if(id==='sohbet') renderYapilacaklar(); // [YAPILACAKLAR] Pano slotu → Yapılacaklar
  if(id==='urunler') renderUrunler();
  if(id==='finans') renderFinans();
}
function openModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
function toast(title, body){
  const t = document.createElement('div');
  t.className='toast';
  t.innerHTML = '<div class="toast-title">'+escapeHtml(title)+'</div>'+(body?'<div class="toast-body">'+escapeHtml(body)+'</div>':'');
  document.getElementById('toasts').appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateX(120%)'; t.style.transition='.3s'; setTimeout(function(){t.remove();},300); }, 4000);
}
async function loadCoreData(){
  const r = await Promise.all([
    sb.from('firmalar').select('*').eq('aktif',true).order('ad'),
    sb.from('urunler').select('*').eq('aktif',true).order('ad'),
    sb.from('aktif_firma_fiyatlari').select('*')
  ]);
  FIRMALAR = r[0].data||[]; URUNLER = r[1].data||[]; FIYATLAR = r[2].data||[];
}
window.addEventListener('DOMContentLoaded', async function(){
  if(window.__bardaksRecovery){ return; } // recovery modunda auto signOut/login YOK — şifre ekranı korunur
  await loadCoreData();
  const remember = localStorage.getItem('bardaks_remember')==='1';
  const sess = await sb.auth.getSession();
  if(sess.data && sess.data.session){
    if(!remember){
      await sb.auth.signOut();
      return;
    }
    const ru = await sb.from('kullanicilar').select('*').eq('auth_id', sess.data.session.user.id).single();
    if(ru.data){ doLogin(ru.data); return; }
  }
});

const _renderTimers={};
function scheduleRender(key, fn, delay){
  delay=delay||250;
  if(_renderTimers[key]) clearTimeout(_renderTimers[key]);
  _renderTimers[key]=setTimeout(function(){ delete _renderTimers[key]; fn(); }, delay);
}
function initRealtime(){
  sb.channel('siparis-rt')
    .on('postgres_changes', {event:'*', schema:'public', table:'siparisler'}, function(payload){
      if(document.getElementById('page-uretim').classList.contains('active')) scheduleRender('uretim', renderUretim);
      if(document.getElementById('page-siparis').classList.contains('active')) scheduleRender('siparis', renderSiparis);
      if(document.getElementById('page-panel').classList.contains('active')) scheduleRender('panel', renderPanel);
      if((CURRENT.rol==='mudur'||CURRENT.rol==='admin') && payload.eventType==='UPDATE'){
        const o=payload.old, n=payload.new;
        if(o.durum!==n.durum){
          const fad=(FIRMALAR.find(function(f){return f.id===n.firma_id;})||{}).ad||'';
          toast('Durum değişti', fad+': '+durumAd(o.durum)+' → '+durumAd(n.durum));
        }
      }
      if(CURRENT.rol==='imalathane' && payload.eventType==='INSERT'){
        const fad=(FIRMALAR.find(function(f){return f.id===payload.new.firma_id;})||{}).ad||'';
        toast('🆕 Yeni sipariş', fad);
      }
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'siparis_notlari'}, function(payload){
      if(payload.new.yazan !== CURRENT.ad_soyad){ toast('💬 Yeni not', payload.new.mesaj.slice(0,50)); }
      if(document.getElementById('page-uretim').classList.contains('active')) scheduleRender('uretim', renderUretim);
      if(document.getElementById('page-siparis').classList.contains('active')) scheduleRender('siparis', renderSiparis);
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'gun_ozetleri'}, function(payload){
      if(CURRENT.rol==='admin' && payload.new.yazan!==CURRENT.ad_soyad){ toast('📋 Gün özeti geldi', payload.new.yazan+' bir özet yazdı'); }
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'ekip_sohbet'}, function(payload){
      const m = payload.new;
      if(document.getElementById('page-sohbet').classList.contains('active')){
        appendSohbetMesaj(m);
      } else if(m.yazan_id !== CURRENT.id){
        toast('💬 '+m.yazan_ad, m.mesaj.slice(0,60));
      }
      refreshSohbetBadge();
    })
    .subscribe();
}

const durumAd = d => ({bekleyen:'Bekleyen',uretimde:'Üretimde',hazir:'Hazır',sevk_edildi:'Sevk Edildi',faturalandi:'Faturalandı',tahsil_edildi:'Tahsil Edildi',tamamlandi:'Tamamlandı',iptal:'İptal'}[d]||d);
const durumTag = d => ({bekleyen:'tag-dim',uretimde:'tag-yellow',hazir:'tag-blue',sevk_edildi:'tag-blue',faturalandi:'tag-green',tahsil_edildi:'tag-green',tamamlandi:'tag-green',iptal:'tag-red'}[d]||'tag-dim');

// ===== KOMUTA MERKEZİ (HOME-COCKPIT-1) — yalnız mevcut view/tablo, salt okuma =====
async function renderHome(){
  // [KOMUTA-V2] 6 bölüm: Acil / Bugün Yapılacaklar / Tahsilat / Operasyon / Kârlılık / Finans Özeti
  const el = document.getElementById('page-home');
  if(!el) return;
  el.innerHTML = '<div class="loading">Komuta Merkezi yükleniyor...</div>';
  const now = new Date();
  const Y = now.getFullYear(), M = now.getMonth()+1;
  const ayBas = new Date(Y, now.getMonth(), 1).toISOString().slice(0,10);
  const ayAd = now.toLocaleDateString('tr-TR',{month:'long'});
  const num = function(x){ return Number(x||0); };
  let r;
  try {
    r = await Promise.all([
      sb.from('cari_ozet').select('firma_id,firma_ad,kalan_bakiye'),
      sb.from('gecmis_aylik_ozet').select('firma_id,kalan_bakiye'),
      sb.from('v_aylik_ozet').select('toplam_dahil,net_kar').eq('yil',Y).eq('ay',M),
      sb.from('tahsilatlar').select('tutar').gte('tarih',ayBas).eq('is_deleted',false),
      sb.from('tahsilatlar').select('id',{count:'exact',head:true}).eq('odeme_tipi','cek').eq('cek_durumu','beklemede').eq('is_deleted',false),
      sb.from('v_firma_pulse').select('*'),
      sb.from('hesap_bakiye').select('bakiye'),
      sb.from('siparisler').select('id,firma_id,tarih,teslim_tarihi,durum').in('durum',['bekleyen','uretimde','hazir']).eq('is_deleted',false)
    ]);
  } catch(e){
    el.innerHTML = '<div class="hm-empty"><span class="ico">!</span>Komuta Merkezi yüklenemedi<div style="font-size:12px;margin-top:6px">'+escapeHtml(String((e&&e.message)||e))+'</div></div>';
    return;
  }
  const cari=r[0].data||[], gecmis=r[1].data||[], ayOzet=r[2].data||[], ayTahs=r[3].data||[];
  const bekCek = r[4].count||0;
  const pulse = (r[5]&&r[5].data)||[];
  const hesaplar = (r[6]&&r[6].data)||[];
  const aktifSips = (r[7]&&r[7].data)||[];

  // ---- türevler (yalnız mevcut veriden, yeni sorgu yok) ----
  const acikBakiye = cari.reduce(function(s,x){return s+num(x.kalan_bakiye);},0) + gecmis.reduce(function(s,x){return s+num(x.kalan_bakiye);},0);
  const ayS = ayOzet.reduce(function(s,x){return s+num(x.toplam_dahil);},0);
  const ayK = ayOzet.reduce(function(s,x){return s+num(x.net_kar);},0);
  const ayT = ayTahs.reduce(function(s,x){return s+num(x.tutar);},0);
  const nakit = hesaplar.reduce(function(s,x){return s+num(x.bakiye);},0);
  const bugunStr = today();
  const FIRMS = (typeof FIRMALAR!=='undefined'?FIRMALAR:[]);
  const firmaAdOf = function(fid){ var c=cari.find(function(x){return x.firma_id===fid;}); if(c) return c.firma_ad; var f=FIRMS.find(function(x){return x.id===fid;}); return f?f.ad:'—'; };
  // maliyet / marj
  const maliyetMap = {}; (typeof URUNLER!=='undefined'?URUNLER:[]).forEach(function(u){ maliyetMap[u.id]=num(u.birim_maliyet); });
  const eksikMaliyet = (typeof URUNLER!=='undefined'?URUNLER:[]).filter(function(u){return u.satis_urunu!==false && !num(u.birim_maliyet);}).length;
  const negSet={}; (typeof FIYATLAR!=='undefined'?FIYATLAR:[]).forEach(function(p){ var m=maliyetMap[p.urun_id]||0; if(m>0 && num(p.birim_fiyat_kdv_haric) < m) negSet[p.urun_id]=1; });
  const negatifMarj = Object.keys(negSet).length;
  const karGuvenilir = (eksikMaliyet===0);
  // operasyon
  let opTeslim=0, opGeciken=0, opUretimde=0, opHazir=0; const gecikenList=[];
  aktifSips.forEach(function(s){ const t=(s.teslim_tarihi||s.tarih); if(t<bugunStr){ opGeciken++; gecikenList.push(s);} else if(t===bugunStr) opTeslim++; if(s.durum==='uretimde') opUretimde++; if(s.durum==='hazir') opHazir++; });
  // pulse
  const kritikCek = pulse.filter(function(x){return x.risk_sinif==='kritik_cek';}).sort(function(a,b){return num(b.oncelik_skoru)-num(a.oncelik_skoru);});
  const yapilacak = pulse.filter(function(x){return x.aksiyon && num(x.siddet)>=2 && x.risk_sinif!=='kritik_cek';}).sort(function(a,b){return num(b.oncelik_skoru)-num(a.oncelik_skoru);}).slice(0,5);
  const odemeRisk = pulse.filter(function(x){return x.risk_sinif==='odeme';}).sort(function(a,b){return num(b.acik_bakiye)-num(a.acik_bakiye);}).slice(0,4);

  // ---- sade görsel yardımcılar (emoji'siz, seviye=renk) ----
  const sevColor = {kritik:'--red', uyari:'--accent', bilgi:'--text-dim', ok:'--green'};
  const sect = function(title, sev, bodyHtml, cta){
    return '<div class="card" style="border-left:3px solid var('+(sevColor[sev]||'--border')+')">'
      + '<div class="card-title" style="display:flex;justify-content:space-between;align-items:center;gap:8px"><span>'+escapeHtml(title)+'</span>'+(cta||'')+'</div>'
      + bodyHtml + '</div>';
  };
  const line = function(name, sub, val, col){
    return '<div class="hm-row"><div class="hm-main"><div class="hm-name">'+escapeHtml(name||'—')+'</div>'+(sub?'<div class="hm-sub">'+escapeHtml(sub)+'</div>':'')+'</div>'+(val?'<div class="hm-val" style="color:var('+(col||'--text')+')">'+val+'</div>':'')+'</div>';
  };
  const ctaBtn = function(label, onclick){ return '<button class="btn btn-sec btn-sm" onclick="'+onclick+'">'+escapeHtml(label)+'</button>'; };
  const okBox = function(txt){ return '<div class="hm-empty"><span class="ico">✓</span>'+escapeHtml(txt)+'</div>'; };

  let h = '<h1 class="page-title">Komuta Merkezi</h1><div class="page-desc">'+ayAd+' '+Y+'</div>';

  // [KOMUTA-QUEUE] BUGÜN ÖNCE BUNU YAP — tüm risklerden tek öncelik kuyruğu (en üst)
  var _q=[];
  kritikCek.forEach(function(x){ _q.push({p:100, ad:x.firma_ad, ne:'Karşılıksız çek — riski dondur, firmayı ara', v:num(x.acik_bakiye)>0?TL(x.acik_bakiye):'', cta:ctaBtn('Firma 360',"openFirmaDetay('"+x.firma_id+"')"), clr:'--red'}); });
  if(opGeciken>0) _q.push({p:90, ad:opGeciken+' sipariş teslimi GECİKTİ', ne:gecikenList.slice(0,2).map(function(s){return firmaAdOf(s.firma_id);}).join(', '), v:'', cta:ctaBtn('Operasyon',"showPage('uretim')"), clr:'--red'});
  if(negatifMarj>0 && CURRENT.rol==='admin') _q.push({p:85, ad:negatifMarj+' üründe zararına satış', ne:'Fiyat maliyetin altında — düzelt', v:'', cta:ctaBtn('Ürünler',"showPage('urunler')"), clr:'--red'}); // [MUD-V2] fiyat=admin; müдürde dead-end
  yapilacak.slice(0,3).forEach(function(x){ _q.push({p:70+num(x.siddet), ad:x.firma_ad, ne:x.aksiyon, v:num(x.acik_bakiye)>0?TL(x.acik_bakiye):'', cta:ctaBtn('Firma 360',"openFirmaDetay('"+x.firma_id+"')"), clr:num(x.siddet)>=4?'--red':'--accent'}); });
  odemeRisk.slice(0,2).forEach(function(x){ _q.push({p:50, ad:x.firma_ad, ne:'Açık bakiye yüksek — tahsilat zamanı', v:TL(x.acik_bakiye), cta:ctaBtn('Tahsilat',"openTahsilat('"+x.firma_id+"')"), clr:'--accent'}); });
  _q.sort(function(a,b){return b.p-a.p;});
  var _top=_q.slice(0,4);
  if(_top.length){
    h += '<div class="card" style="border:2px solid var(--accent)"><div class="card-title" style="color:var(--accent);font-size:14px">BUGÜN ÖNCE BUNU YAP</div>'
      + _top.map(function(it,i){ return '<div class="hm-row" style="align-items:center">'
          + '<div style="width:22px;height:22px;border-radius:50%;background:var('+it.clr+');color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-right:10px">'+(i+1)+'</div>'
          + '<div class="hm-main"><div class="hm-name">'+escapeHtml(it.ad)+'</div><div class="hm-sub">'+escapeHtml(it.ne)+'</div></div>'
          + (it.v?'<div class="hm-val" style="color:var('+it.clr+');margin-right:8px">'+it.v+'</div>':'')
          + it.cta + '</div>'; }).join('')
      + '</div>';
  } else {
    h += '<div class="card" style="border:2px solid var(--green)"><div class="card-title" style="color:var(--green)">BUGÜN ÖNCE BUNU YAP</div><div class="hm-empty"><span class="ico">✓</span>Acil aksiyon yok — ritim normal</div></div>';
  }

  // 1) ACİL İŞLER
  let acilBody='';
  kritikCek.forEach(function(x){
    acilBody += line(x.firma_ad, 'Karşılıksız çek — riski dondur', num(x.acik_bakiye)>0?TL(x.acik_bakiye):'', '--red')
      + '<div style="text-align:right;margin:-4px 0 8px">'+ctaBtn('Firma 360 Aç',"openFirmaDetay('"+x.firma_id+"')")+'</div>';
  });
  if(opGeciken>0){
    acilBody += line(opGeciken+' sipariş teslimi GECİKTİ', gecikenList.slice(0,3).map(function(s){return firmaAdOf(s.firma_id);}).join(', ')+(opGeciken>3?(' +'+(opGeciken-3)):''), '', '--red')
      + '<div style="text-align:right;margin:-4px 0 4px">'+ctaBtn('Operasyona Git',"showPage('uretim')")+'</div>';
  }
  if(!acilBody) acilBody = okBox('Acil iş yok');
  h += sect('ACİL İŞLER', (kritikCek.length||opGeciken)?'kritik':'ok', acilBody);

  // 2) BUGÜN YAPILACAKLAR (Pulse)
  let yapBody = yapilacak.length ? yapilacak.map(function(x){
    return line(x.firma_ad, x.aksiyon, num(x.acik_bakiye)>0?TL(x.acik_bakiye):'', num(x.siddet)>=4?'--red':'--text')
      + '<div style="text-align:right;margin:-4px 0 8px">'+ctaBtn('Firma 360 Aç',"openFirmaDetay('"+x.firma_id+"')")+'</div>';
  }).join('') : (pulse.length ? okBox('Aksiyon eşiğini geçen firma yok') : '<div class="hm-empty"><span class="ico">—</span>Pulse verisi yok</div>');
  h += sect('BUGÜN YAPILACAKLAR', 'uyari', yapBody);

  // 3) TAHSİLAT RİSKLERİ
  let tahBody='';
  if(bekCek>0) tahBody += line(bekCek+' çek bekliyor', 'Vade / karşılık takibi', '', '--accent');
  odemeRisk.forEach(function(x){
    tahBody += line(x.firma_ad, 'Açık bakiye yüksek — tahsilat zamanı', TL(x.acik_bakiye), '--accent')
      + '<div style="text-align:right;margin:-4px 0 8px">'+ctaBtn('Tahsilat',"openTahsilat('"+x.firma_id+"')")+'</div>';
  });
  if(!tahBody) tahBody = okBox('Tahsilat riski yok');
  h += sect('TAHSİLAT RİSKLERİ', (bekCek>0||odemeRisk.length)?'uyari':'ok', tahBody);

  // 4) OPERASYON RİSKLERİ
  let opBody = line('Bugün teslim: '+opTeslim+'  ·  Geciken: '+opGeciken+'  ·  Üretimde: '+opUretimde+'  ·  Hazır/sevk: '+opHazir, '', '', opGeciken>0?'--red':(opHazir>0?'--accent':'--text')); // [MUD-V2] sevk handoff görünür
  h += sect(CURRENT.rol==='mudur'?'SEVK / OPERASYON':'OPERASYON RİSKLERİ', opGeciken>0?'kritik':(opHazir>0?'uyari':'bilgi'), opBody, ctaBtn('Operasyona Git',"showPage('uretim')"));

  // 5) KÂRLILIK RİSKLERİ — [MUD-V2] fiyat/maliyet=admin işi; müдürde gizli (gürültü + dead-end)
  if(CURRENT.rol==='admin'){
    let karBody='';
    if(eksikMaliyet>0) karBody += line(eksikMaliyet+' üründe maliyet eksik', 'Kâr güvenilmez — gösterilmiyor', '', '--accent');
    if(negatifMarj>0) karBody += line(negatifMarj+' üründe negatif marj', 'Zararına satış — fiyat/maliyet düzelt', '', '--red');
    if(!karBody) karBody = okBox('Kârlılık riski yok — maliyetler tam');
    h += sect('KÂRLILIK RİSKLERİ', negatifMarj>0?'kritik':(eksikMaliyet>0?'uyari':'ok'), karBody, eksikMaliyet>0?ctaBtn('Maliyetleri Gir',"openMaliyetEksik()"):'');
  }

  // 6) FİNANSAL ÖZET (en alt)
  const karGoster = karGuvenilir ? TL(ayK) : '<span style="color:var(--accent)">⚠ Kâr hesaplanamıyor — maliyet eksik</span>';
  h += '<div class="card"><div class="card-title">FİNANSAL ÖZET · '+ayAd+'</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:8px 20px;align-items:baseline">'
    + '<span style="font-size:12px;color:var(--text-dim)">Açık Bakiye <b style="font-size:16px;color:var('+(acikBakiye>0?'--red':'--text')+')">'+TL(acikBakiye)+'</b></span>'

let maliyetGirisi=[];
async function openMaliyetEksik(){
  const eksik = URUNLER.filter(function(u){return u.satis_urunu!==false && !Number(u.birim_maliyet);});
  if(!eksik.length){ toast('Tüm ürünlerde maliyet var 🎉',''); return; }
  // [MALIYET-V2] ürün bazında toplam adet+ciro (salt-okuma) -> ciro DESC sıralama
  const satMap={};
  try{
    const rk = await sb.from('siparis_kalemleri').select('urun_id,adet,toplam_kdv_haric').eq('is_deleted',false);
    (rk.data||[]).forEach(function(k){ var s=satMap[k.urun_id]||(satMap[k.urun_id]={adet:0,ciro:0}); s.adet+=Number(k.adet||0); s.ciro+=Number(k.toplam_kdv_haric||0); });
  }catch(e){}
  const sirali = eksik.map(function(u){ var s=satMap[u.id]||{adet:0,ciro:0}; return {id:u.id, ad:u.ad, adet:s.adet, ciro:s.ciro}; }).sort(function(a,b){return b.ciro-a.ciro;});
  maliyetGirisi = sirali.map(function(u){return {id:u.id, ad:u.ad, maliyet:0};});
  let h = '<div class="modal-head"><h3>Eksik Maliyetler ('+eksik.length+')</h3><button class="modal-close" onclick="closeModal()">×</button></div>';
  h += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:8px">Maliyet yalnız <b>gelecekteki</b> siparişleri etkiler. Geçmiş siparişlerde satış anındaki maliyet snapshot kullanılır. En çok ciro yapan ürünler üstte.</div>';
  h += '<div style="max-height:50vh;overflow-y:auto">';
  h += sirali.map(function(m,i){return '<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="flex:1;min-width:0"><div style="font-size:14px">'+escapeHtml(m.ad)+'</div><div style="font-size:11px;color:var(--text-dim)">'+m.adet+' adet · '+TL(m.ciro)+' ciro</div></div><input type="number" min="0" step="0.01" style="width:90px;text-align:center" placeholder="maliyet ₺" oninput="maliyetGirisi['+i+'].maliyet=Number(this.value)||0"></div>';}).join('');
  h += '</div><button class="btn btn-block mt" onclick="kaydetMaliyetler()">Kaydet</button>';
  openModal(h);
}
async function kaydetMaliyetler(){
  const dolu = maliyetGirisi.filter(function(m){return m.maliyet>0;});
  if(!dolu.length){ alert('En az bir ürüne maliyet gir'); return; }
  for(var i=0;i<dolu.length;i++){
    const r = await sb.from('urunler').update({birim_maliyet:dolu[i].maliyet}).eq('id',dolu[i].id);
    if(r.error){ alert('Hata: '+r.error.message); return; }
    const u=URUNLER.find(function(x){return x.id===dolu[i].id;}); if(u) u.birim_maliyet=dolu[i].maliyet;
  }
  closeModal(); toast('✅ '+dolu.length+' ürüne maliyet girildi','Geçmiş kârlar güncellendi'); renderPanel();
}

// P0 DOM-SOURCE FALLBACK: adet'i tek doğruluk kaynağı olarak DOM input'larından oku (state kaybına karşı sağlamlaştırma)
function ysAdetOf(inp){ return Math.max(0, Math.floor(Number(inp && inp.value)||0)); }

}

  kalemler.forEach(function(k){ if(!k.uretildi_at){ eksikMap[k.siparis_id]=(eksikMap[k.siparis_id]||0)+1; } });
  Object.keys(eksikMap).forEach(function(sid){ const s=sipMap[sid]; if(s&&s.durum==='hazir') hazirIsaretsiz++; });
  // ürün toplama: yalnız bekleyen/uretimde + kilitsiz siparişlerin kalemleri
  const urunler={};
  kalemler.forEach(function(k){
    const s=sipMap[k.siparis_id]; if(!s) return;
    if(s.durum!=='bekleyen' && s.durum!=='uretimde') return;
    if(s.kilitli) return;
    const key=k.urun_id||('ad:'+k.urun_ad);
    if(!urunler[key]) urunler[key]={uid:k.urun_id, ad:k.urun_ad, toplam:0, uretilen:0, kalan:0, firmalar:{}, sipSet:{}};
    const u=urunler[key];
    u.toplam+=Number(k.adet||0);
    if(k.uretildi_at) u.uretilen+=Number(k.adet||0); else u.kalan+=Number(k.adet||0);
    u.sipSet[s.id]=1;
    const fad=(FIRMALAR.find(function(x){return x.id===s.firma_id;})||{}).ad||'?';
    if(!u.firmalar[fad]) u.firmalar[fad]=[];
    u.firmalar[fad].push({adet:Number(k.adet||0), teslim:(s.teslim_tarihi||s.tarih), isaretli:!!k.uretildi_at, sid:s.id});
  });
  const liste=Object.keys(urunler).map(function(k){return urunler[k];}).filter(function(u){return u.kalan>0;});
  // [UR-ACIL-1] her ürün için en yakın (üretilmemiş) teslim + aciliyet katmanı (0 geciken,1 bugün,2 ileri)
  liste.forEach(function(u){
    var minT=null;
    Object.keys(u.firmalar).forEach(function(fad){ u.firmalar[fad].forEach(function(r){ if(r.isaretli) return; if(minT===null || String(r.teslim)<String(minT)) minT=r.teslim; }); });
    u.enYakinTeslim=minT;
    u.tier=(minT===null)?2:(String(minT)<bugunStr?0:(String(minT)===bugunStr?1:2));
  });
  liste.sort(function(a,b){ if(a.tier!==b.tier) return a.tier-b.tier; var at=String(a.enYakinTeslim||'9999-99-99'), bt=String(b.enYakinTeslim||'9999-99-99'); if(at!==bt) return at<bt?-1:1; return b.kalan-a.kalan; });
  var yukToplam=0, yukGeciken=0, yukBugun=0;
  liste.forEach(function(u){ yukToplam+=u.kalan; if(u.tier===0) yukGeciken+=u.kalan; else if(u.tier===1) yukBugun+=u.kalan; });

  let h = '<div class="flex-between mb"><h1 class="page-title">Üretim</h1>'+uretimToggleHtml()+'</div><div class="page-desc">'+trDate(bugunStr)+' · ürün bazlı</div>';
  const sayac=function(lbl,val,col){ return '<div class="stat" style="padding:12px"><div class="stat-label">'+lbl+'</div><div class="stat-value" style="font-size:22px;color:var('+col+')">'+val+'</div></div>'; };
  h += '<div class="stats" style="grid-template-columns:repeat(4,1fr);gap:8px">'
    + sayac('Geciken', opGeciken, opGeciken>0?'--red':'--text')
    + sayac('Bugün', opTeslim, '--accent')
    + sayac('Üretimde', opUretimde, '--text')
    + sayac('Hazır-Sevk', opHazir, opHazir>0?'--green':'--text')
    + '</div>';
  if(liste.length){ h += '<div class="card" style="padding:11px 14px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap;align-items:baseline">'
    + '<span style="font-size:13px;color:var(--text-dim)">Bugünkü üretim yükü</span>'
    + '<span style="font-size:16px;font-weight:800">'+yukToplam+' adet</span>'
    + (yukGeciken>0?'<span style="font-size:14px;color:var(--red);font-weight:800">Geciken '+yukGeciken+'</span>':'')
    + (yukBugun>0?'<span style="font-size:14px;color:var(--accent);font-weight:800">Bugün teslim '+yukBugun+'</span>':'')
    + '<span style="font-size:13px;color:var(--text-dim)">'+liste.length+' ürün</span>'
    + '</div>'; }
  if(hazirIsaretsiz>0){ h += '<div class="card" style="padding:9px 14px;border-color:var(--yellow)"><span style="font-size:13px;color:var(--yellow)">⚠ '+hazirIsaretsiz+' hazır siparişte işaretsiz kalem var (sonradan kalem eklenmiş olabilir)</span></div>'; }
  if((CURRENT.rol==='admin'||CURRENT.rol==='mudur') && _uuLastBatch){
    h += '<div style="text-align:right;margin:-4px 0 8px"><button class="btn btn-sec btn-sm" style="min-height:44px" onclick="uuGeriAl()">↩ Son işareti geri al</button></div>';
  }
  if(!liste.length){
    h += '<div class="empty"><div class="empty-ico" style="color:var(--green)">✓</div>Üretilecek ürün yok'+(opHazir>0?' — '+opHazir+' sipariş sevk bekliyor':'')+'</div>';
  } else {
    liste.forEach(function(u){
      const btnId='uu-btn-'+(u.uid||'x');
      const kismi = u.uretilen>0 ? '<span class="tag tag-yellow" style="margin-left:8px">'+u.uretilen+'/'+u.toplam+' üretildi</span>' : '';
      const sipSay=Object.keys(u.sipSet).length, firmaSay=Object.keys(u.firmalar).length;
      var tcol = u.tier===0?'var(--red)':(u.tier===1?'var(--accent)':'var(--text-dim)');
      var tlabel;
      if(u.enYakinTeslim==null){ tlabel='teslim tarihi yok'; }
      else if(u.tier===0){ var _g=Math.round((new Date(bugunStr).getTime()-new Date(u.enYakinTeslim).getTime())/86400000); tlabel='GECİKTİ'+(_g>0?' · '+_g+' gün':''); }
      else if(u.tier===1){ tlabel='BUGÜN teslim'; }
      else { tlabel=trDate(u.enYakinTeslim)+' teslim'; }
      var brd = u.tier===0?';border-color:var(--red);border-width:2px':(u.tier===1?';border-color:var(--accent)':'');
      const detay=Object.keys(u.firmalar).map(function(fad){
        return u.firmalar[fad].map(function(r){
          const s=sipMap[r.sid];
          const baskaEksik=(eksikMap[r.sid]||0) - (r.isaretli?0:1);
          return '<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border);font-size:14px"><span>'+escapeHtml(fad)+' <span style="color:var(--text-dim);font-size:12px">· teslim '+trDate(r.teslim)+(s&&s.durum==='uretimde'?' · üretimde':'')+'</span></span><span style="white-space:nowrap"><b>'+r.adet+'</b> '+(r.isaretli?'<span class="tag tag-green">✓</span>':(baskaEksik>0?'<span class="tag tag-dim" title="siparişin diğer ürünleri de bekliyor">+'+baskaEksik+' kalem</span>':''))+'</span></div>';
        }).join('');
      }).join('');
      h += '<div class="card" style="padding:14px;margin-bottom:10px'+brd+'">'
        + '<div style="display:inline-block;font-size:11px;font-weight:800;color:'+tcol+';border:1px solid '+tcol+';border-radius:6px;padding:2px 8px;margin-bottom:8px">'+tlabel+'</div>'
        + '<div class="flex-between" style="gap:10px;flex-wrap:wrap">'
        +   '<div style="min-width:0"><div style="font-size:17px;font-weight:700">'+escapeHtml(u.ad)+kismi+'</div>'
        +   '<div style="font-size:13px;color:var(--text-dim);margin-top:2px">Kalan <b style="font-size:22px;color:'+tcol+'">'+u.kalan+'</b> adet · '+firmaSay+' firma · '+sipSay+' sipariş</div></div>'
        +   (u.uid?'<button class="btn" id="'+btnId+'" style="min-height:48px;min-width:150px;font-size:15px" onclick="uuTap(\''+u.uid+'\',\''+escapeHtml(u.ad).replace(/'/g,"\\'")+'\')">✓ Üretildi</button>'
                 :'<button class="btn btn-sec" style="min-height:48px" disabled title="katalog dışı kalem">—</button>')
        + '</div>'
        + '<details style="margin-top:8px"><summary style="cursor:pointer;font-size:13px;color:var(--text-dim);padding:8px 0;min-height:28px">▸ Firma / sipariş detayı</summary>'+detay+'</details>'
        + '</div>';
    });
  }
  el.innerHTML = h;
}
function uuTap(uid, ad){
  if(_uuBusy) return;
  const btn=document.getElementById('uu-btn-'+uid); if(!btn) return;
  if(_uuConfirm && _uuConfirm.key===uid){ clearTimeout(_uuConfirm.timer); _uuConfirm=null; uuCalistir(uid, ad); return; }
  if(_uuConfirm){ const eski=document.getElementById('uu-btn-'+_uuConfirm.key); if(eski){ eski.textContent='✓ Üretildi'; eski.style.background=''; } clearTimeout(_uuConfirm.timer); }
  btn.textContent='Onayla?'; btn.style.background='var(--yellow)';
  _uuConfirm={key:uid, timer:setTimeout(function(){ _uuConfirm=null; const b=document.getElementById('uu-btn-'+uid); if(b){ b.textContent='✓ Üretildi'; b.style.background=''; } }, 3000)};
}
async function uuCalistir(uid, ad){
  _uuBusy=true;
  const btn=document.getElementById('uu-btn-'+uid); if(btn){ btn.disabled=true; btn.textContent='İşleniyor...'; btn.style.background=''; }
  const key=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():String(Date.now())+'-'+Math.random();
  const r=await sb.rpc('urun_uretildi',{p_urun_id:uid, p_idempotency_key:key});
  _uuBusy=false;
  if(r.error || !r.data || r.data.status==='failed'){
    toast('⛔ İşaretlenemedi', (r.error&&r.error.message)||(r.data&&r.data.reason)||'RPC hatası');
    renderUretim(); return;
  }
  const d=r.data;
  if(d.status!=='noop') _uuLastBatch=d.batch_id||null;
  toast('✅ '+ad, (d.kalem_isaretlendi||0)+' kalem işaretlendi · '+(d.hazir_olan||0)+' sipariş hazır · '+(d.eksik_kalemli_bekleyen||0)+' sipariş bekliyor');
  renderUretim();
}
async function uuGeriAl(){
  if(CURRENT.rol!=='admin' && CURRENT.rol!=='mudur') return;

    toast('⛔ Geri alınamadı', (r.error&&r.error.message)||(r.data&&r.data.reason)||''); return;
  }

}

async function flTopluKaydet(fid){
  const pmap={}; FIYATLAR.filter(function(p){return p.firma_id===fid;}).forEach(function(p){ pmap[p.urun_id]=Number(p.birim_fiyat_kdv_haric); });

  let degisen=0, kaldirilan=0, atlanan=0;
  for(let i=0;i<urunler.length;i++){
    const u=urunler[i]; const inp=document.getElementById('tf-'+u.id); if(!inp) continue;
    const raw=(inp.value||'').trim();
    const eski = (pmap[u.id]!==undefined && pmap[u.id]!==null) ? pmap[u.id] : null;
    if(raw===''){
      if(eski!==null){
        await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:today()}).eq('firma_id',fid).eq('urun_id',u.id).is('gecerlilik_bitis',null);
        await sb.from('firma_urun_log').insert({firma_id:fid,urun_id:u.id,islem:'cikarildi',eski_fiyat:eski,yapan:CURRENT.ad_soyad});
        kaldirilan++;
      }
      continue;
    }
    const yeni=Math.round(Number(raw)*100)/100; // KDV hariç — doğrudan saklanır
    if(!(yeni>0)){ atlanan++; continue; }
    if(eski!==null && eski.toFixed(2)===yeni.toFixed(2)) continue;
    if(eski!==null){ await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:today()}).eq('firma_id',fid).eq('urun_id',u.id).is('gecerlilik_bitis',null); }
    const ins=await sb.from('firma_urun_fiyat').insert({firma_id:fid,urun_id:u.id,birim_fiyat_kdv_haric:yeni,olusturan_id:CURRENT.id});
    if(ins.error){ atlanan++; continue; }
    await sb.from('firma_urun_log').insert({firma_id:fid,urun_id:u.id,islem:(eski!==null?'fiyat_degisti':'eklendi'),eski_fiyat:eski,yeni_fiyat:yeni,yapan:CURRENT.ad_soyad});
    degisen++;
  }
  toast('✅ Fiyatlar kaydedildi', degisen+' güncel · '+kaldirilan+' kaldırıldı'+(atlanan?' · '+atlanan+' atlandı':''));
  await loadCoreData(); openFirmaFiyatToplu(fid);
}

function thHesap(){

    const komTutar=tutar*kom/100; net=tutar-komTutar;

      html='Çek tutarı: '+TL(tutar)+'<br>Vade: '+trDate(vade)+' (~'+Math.round(gun)+' gün)<br>Tahmini değer kaybı: -'+TL(kayip)+'<br><strong>Bugünkü reel değer: '+TL(tutar-kayip)+'</strong>';

  h += '<div class="card"><div class="card-title">Firma Risk & Tahsilat</div><div class="table-wrap"><table><tr><th>Firma</th><th style="text-align:right">Açık</th><th style="text-align:right">Geciken</th><th style="text-align:center">Sip.(90g)</th><th style="text-align:center">Risk</th></tr>';
  h += riskList.map(function(x){return '<tr><td>'+x.ad+'</td><td style="text-align:right">'+TL(x.acik)+'</td><td style="text-align:right;color:'+(x.gec>0?'var(--red)':'var(--text-dim)')+'">'+TL(x.gec)+'</td><td style="text-align:center">'+x.hac+'</td><td style="text-align:center;font-weight:700;color:'+riskRenk(x.risk)+'">'+x.risk+'<div style="font-size:10px;font-weight:400">'+riskEt(x.risk)+'</div></td></tr>';}).join('')||'<tr><td colspan=5 class="empty">Veri yok</td></tr>';
  h += '</table></div><div style="font-size:11px;color:var(--text-dim);margin-top:6px">Risk = geciken ödeme (45p) + açık bakiye büyüklüğü (≤35p) + sipariş seyrekliği (≤20p). Yüksek = dikkat.</div></div>';

let takvimAy = new Date();
let siparisGorunum = 'takvim'; // [TAKVIM-FIRST] sipariş ekranı doğrudan ay takvimiyle açılır

async function renderTakvim(){
  const el = document.getElementById('page-siparis');
  const y = takvimAy.getFullYear(), m = takvimAy.getMonth();
  const ilkGun = new Date(y, m, 1);
  const sonGun = new Date(y, m+1, 0);
  const basStr = ilkGun.toISOString().slice(0,10);
  const bitStr = sonGun.toISOString().slice(0,10);
  const aylar = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

  el.innerHTML = '<div class="flex-between mb"><h1 class="page-title">Siparişler</h1><div class="row" style="gap:6px"><button class="btn btn-sec btn-sm" onclick="siparisGorunum=\'liste\';renderSiparis()">📋 Liste</button><button class="btn btn-sec btn-sm" onclick="openYeniSiparis()">+ Yeni</button></div></div><div class="card"><div class="flex-between mb"><button class="btn btn-sec btn-sm" onclick="takvimAyDegistir(-1)">← Önceki</button><strong style="font-size:16px">'+aylar[m]+' '+y+'</strong><button class="btn btn-sec btn-sm" onclick="takvimAyDegistir(1)">Sonraki →</button></div><div class="takvim" id="takvimGrid"><div class="loading" style="grid-column:span 7">Yükleniyor...</div></div></div>';

  const r = await sb.from('siparisler').select('id,firma_id,tarih,toplam_kdv_dahil,durum').gte('tarih',basStr).lte('tarih',bitStr).neq('durum','iptal').eq('is_deleted',false);
  const sips = r.data || [];
  const gunMap = {};
  sips.forEach(function(s){
    const t = s.tarih.slice(0,10);
    if(!gunMap[t]) gunMap[t] = { sayi:0, ciro:0 };
    gunMap[t].sayi++;
    gunMap[t].ciro += Number(s.toplam_kdv_dahil||0);
  });
  const maxSayi = Math.max(1, ...Object.values(gunMap).map(function(x){return x.sayi;}));

  const grid = document.getElementById('takvimGrid');
  const gunler = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  let html = gunler.map(function(g){return '<div class="takvim-baslik">'+g+'</div>';}).join('');
  let basGun = ilkGun.getDay()-1; if(basGun<0) basGun=6;
  for(let i=0;i<basGun;i++) html += '<div class="takvim-gun bos"></div>';
  const bugun = today();
  for(let d=1; d<=sonGun.getDate(); d++){
    const tarih = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const veri = gunMap[tarih];
    const yogunluk = veri ? Math.min(4, Math.ceil(veri.sayi/maxSayi*4)) : 0;
    const cls = ['takvim-gun', tarih===bugun?'bugun':'', yogunluk?'l'+yogunluk:''].filter(Boolean).join(' ');
    const info = veri ? '<div class="takvim-gun-info"><strong>'+veri.sayi+' sip.</strong><br>'+TL(veri.ciro)+'</div>' : '';
    html += '<div class="'+cls+'" onclick="acGunDetay(\''+tarih+'\')"><div class="takvim-gun-no">'+d+'</div>'+info+'</div>';
  }
  grid.innerHTML = html;
}

function secFoto(urunId){

async function yukleUrunFoto(urunId, file){
  const fotoDiv = document.getElementById('foto-'+urunId);
  if(fotoDiv){ const ld=document.createElement('div'); ld.className='foto-yukleniyor'; ld.textContent='Yükleniyor...'; ld.id='ld-'+urunId; fotoDiv.appendChild(ld); }
  try {
    const optimized = await optimizeImage(file, 1000, 0.82);
    const path = urunId + '-' + Date.now() + '.jpg';
    const up = await sb.storage.from('urun-gorselleri').upload(path, optimized, { contentType:'image/jpeg', upsert:true });
    if(up.error) throw up.error;
    const pub = sb.storage.from('urun-gorselleri').getPublicUrl(path);
    const url = pub.data.publicUrl;
    const r = await sb.from('urunler').update({ gorsel_url:url, guncelleme:new Date().toISOString() }).eq('id',urunId);
    if(r.error) throw r.error;
    toast('✅ Görsel yüklendi','');
    renderUrunler();
  } catch(e){
    const ld=document.getElementById('ld-'+urunId); if(ld) ld.remove();
    alert('Görsel yüklenemedi: '+(e.message||e));
  }
}

function optimizeImage(file, maxW, quality){
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob){ blob ? resolve(blob) : reject(new Error('Dönüştürme hatası')); }, 'image/jpeg', quality);
      };
      img.onerror = function(){ reject(new Error('Geçersiz görsel')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('Dosya okunamadı')); };
    reader.readAsDataURL(file);
  });
}

  var fid = document.getElementById('flFirma').value;
  if(!fid){ flUrunler.forEach(function(u){ var inp=document.getElementById('flf-'+u.id); if(inp) inp.value = u.varsayilan_fiyat || ''; }); return; }
  var r = await sb.from('firma_urun_fiyat').select('urun_id,birim_fiyat_kdv_haric').eq('firma_id',fid);
  var ff = {}; (r.data||[]).forEach(function(x){ ff[x.urun_id]=x.birim_fiyat_kdv_haric; });
  flUrunler.forEach(function(u){
    var inp = document.getElementById('flf-'+u.id);
    if(!inp) return;
    var bfh = ff[u.id] || u.varsayilan_fiyat;
    inp.value = bfh || '';
  });
  document.querySelectorAll('.flCb').forEach(function(cb){
    var uid=cb.dataset.uid;
    cb.checked = !!ff[uid];
  });
}
function flSecHepsi(val){ document.querySelectorAll('.flCb').forEach(function(cb){cb.checked=val;}); }
function fiyatListesiPDF(){
  var secili = [];
  document.querySelectorAll('.flCb').forEach(function(cb){
    if(!cb.checked) return;
    var uid = cb.dataset.uid;
    var u = flUrunler.find(function(x){return x.id===uid;});
    if(!u) return;
    var fiyat = document.getElementById('flf-'+uid).value;
    if(!fiyat) return;
    secili.push({ad:u.ad, fiyat:Number(fiyat), gorsel:u.gorsel_url||'', kategori:u.kategori||'diger', gramaj:u.gramaj||''});
  });
  if(!secili.length){ alert('En az bir ürün seçin'); return; }
  var firma = document.getElementById('flFirma');
  var firmaAd = firma.selectedIndex>0 ? firma.options[firma.selectedIndex].text : '';
  flGorselUret(secili, firmaAd);
}
// Görsel üret + önizleme + WhatsApp paylaş
async function flGorselUret(secili, firmaAd){
  var bugun = new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"});
  var katSira = {cup:1,pasta:2,kruvasan:3,magnolia:4,diger:5};
  secili.sort(function(a,b){return (katSira[a.kategori]||9)-(katSira[b.kategori]||9);});
  var cards = secili.map(function(u){
    var img = u.gorsel
      ? '<div style="width:100%;height:120px;background-image:url(\''+u.gorsel+'\');background-size:cover;background-position:center;border-radius:12px 12px 0 0"></div>'
      : '<div style="width:100%;height:120px;background:linear-gradient(135deg,#f5e9d0,#e8d5b0);border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;font-size:38px">\uD83C\uDF70</div>';
    return '<div style="border-radius:14px;overflow:hidden;border:1px solid #e8ddd0;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.06)">'+img+'<div style="padding:9px 11px"><div style="font-size:13px;font-weight:600;color:#3d2c1e;line-height:1.25;min-height:32px">'+u.ad+(u.gramaj?' <span style="font-weight:400;color:#9a8b7a;font-size:10px">'+u.gramaj+'</span>':'')+'</div><div style="font-size:19px;font-weight:800;color:#8b5e3c;margin-top:3px">'+u.fiyat+' \u20BA</div></div></div>';
  }).join('');
  var box = document.createElement('div');
  box.id = 'flCanvasKaynak';
  box.style.cssText = 'position:fixed;left:-9999px;top:0;width:780px;background:#faf3df;padding:34px;font-family:system-ui,Arial,sans-serif';
  box.innerHTML = '<div style="text-align:center;padding-bottom:18px;border-bottom:3px solid #8b5e3c;margin-bottom:22px"><div style="font-size:40px;font-weight:900;color:#8b5e3c;letter-spacing:-1px;line-height:1">bardak\'s<span style="font-size:15px;vertical-align:super">\u00AE</span></div><div style="font-size:15px;color:#8b5e3c;font-style:italic;margin-top:2px">iz b\u0131rakan tatlar</div><div style="font-size:16px;font-weight:700;color:#3d2c1e;margin-top:12px;letter-spacing:.5px">G\u00DCNL\u00DCK TATLI F\u0130YAT L\u0130STES\u0130</div><div style="font-size:12px;color:#9a8b7a;margin-top:3px">'+(firmaAd?firmaAd.toUpperCase()+' \u00B7 ':'')+bugun+'</div></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">'+cards+'</div><div style="text-align:center;margin-top:24px;padding-top:14px;border-top:2px solid #e8ddd0;font-size:11px;color:#9a8b7a">Birim fiyatlar KDV hari\u00E7tir \u00B7 Genel toplam/fatura KDV dahil hesaplan\u0131r \u00B7 BARDAKS GIDA T\u0130CARET LTD. \u015ET\u0130. \u00B7 bardakstr@gmail.com</div>';
  document.body.appendChild(box);

  openModal('<div class="modal-head"><h3>\uD83D\uDCC4 Fiyat Listesi</h3><button class="modal-close" onclick="closeModal();flTemizle()">\u00D7</button></div><div id="flOnizleme" style="text-align:center;padding:30px"><div class="loading">G\u00F6rsel haz\u0131rlan\u0131yor...</div></div>');

  try {
    var canvas = await html2canvas(box, {backgroundColor:'#faf3df', scale:2, useCORS:true, allowTaint:false, logging:false});
    window._flCanvas = canvas;
    var dataUrl = canvas.toDataURL('image/png');
    var paylasVar = !!(navigator.share);
    document.getElementById('flOnizleme').innerHTML =
      '<img src="'+dataUrl+'" style="max-width:100%;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15)">'+
      '<div class="row mt" style="gap:8px">'+
      (paylasVar?'<button class="btn" style="flex:2;background:#25D366" onclick="flPaylas()">\uD83D\uDCF2 WhatsApp / Payla\u015F</button>':'')+
      '<button class="btn '+(paylasVar?'btn-sec':'')+'" style="flex:1" onclick="flIndir()">\u2B07\uFE0F \u0130ndir</button>'+
      '</div>'+
      (paylasVar?'':'<div style="font-size:11px;color:var(--text-dim);margin-top:8px">G\u00F6rseli indir, WhatsApp\'tan g\u00F6nder. (Telefonda direkt payla\u015F\u0131m \u00E7\u0131kar)</div>');
  } catch(e){
    document.getElementById('flOnizleme').innerHTML = '<div class="empty">G\u00F6rsel olu\u015Fturulamad\u0131: '+(e.message||e)+'</div>';
  }
  flTemizle();
}
function flTemizle(){ var b=document.getElementById('flCanvasKaynak'); if(b) b.remove(); }
function flIndir(){
  if(!window._flCanvas) return;
  var a = document.createElement('a');
  a.download = 'bardaks-fiyat-listesi-'+today()+'.png';
  a.href = window._flCanvas.toDataURL('image/png');
  a.click();
}
async function flPaylas(){
  if(!window._flCanvas) return;
  window._flCanvas.toBlob(async function(blob){
    var dosya = new File([blob], 'bardaks-fiyat-listesi.png', {type:'image/png'});
    try {
      if(navigator.canShare && navigator.canShare({files:[dosya]})){
        await navigator.share({ files:[dosya], title:'Bardaks Fiyat Listesi', text:'Bardaks G\u00FCnl\u00FCk Tatl\u0131 Fiyat Listesi' });
      } else {
        flIndir();
        alert('Bu cihaz dosya payla\u015F\u0131m\u0131n\u0131 desteklemiyor. G\u00F6rsel indirildi, WhatsApp\'tan g\u00F6nderebilirsin.');
      }
    } catch(e){ if(e.name!=='AbortError') flIndir(); }
  }, 'image/png');
}
async function silUrun(urunId, ad){
  if(!confirm(ad+' satıştan kaldırılsın (pasifleştirilsin) mi? (Veri silinmez, firma fiyatları korunur)')) return;
  await sb.from('urunler').update({aktif:false, guncelleme:new Date().toISOString()}).eq('id',urunId);
  closeModal(); toast('Satıştan kaldırıldı (pasif)', ad); renderUrunler();
}
</script>
