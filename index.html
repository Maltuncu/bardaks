<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bardak's · Yönetim</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #faf3df;
    --surface: #ffffff;
    --surface2: #f3ead2;
    --border: #e3d8ba;
    --text: #1a2b40;
    --text-dim: #6b7b8f;
    --accent: #1e5ba8;
    --accent-soft: #e1ebf6;
    --green: #2e8b57;
    --red: #c0392b;
    --yellow: #c8941a;
    --blue: #1e5ba8;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(30,91,168,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; font-size: 15px; }
  #login { position: fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background: radial-gradient(ellipse at top, #fff 0%, var(--bg) 70%); z-index: 100; gap:28px; padding:20px; }
  .brand-circle { width: 200px; height: 200px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; margin: 0 auto; }
  .logo { font-size: 42px; font-weight: 800; letter-spacing:-1px; color: var(--accent); line-height:1; }
  .logo span { color: var(--text); }
  .login-sub { color: var(--accent); margin-top:6px; font-size:14px; font-style:italic; }
  .login-card { background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 28px; width:100%; max-width:360px; box-shadow: var(--shadow); }
  .login-card h2 { font-size:18px; margin-bottom:18px; font-weight:600; }
  .user-btn { display:flex; align-items:center; gap:14px; width:100%; background: var(--surface2); border:1px solid var(--border); border-radius: 10px; padding:14px 16px; margin-bottom:10px; color:var(--text); cursor:pointer; transition:.15s; text-align:left; font-size:15px; }
  .user-btn:hover { border-color: var(--accent); background:var(--accent-soft); }
  .user-avatar { width:38px; height:38px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:#fff; }
  .user-role { font-size:12px; color:var(--text-dim); }
  #app { display:none; min-height:100vh; padding-bottom:70px; }
  .topbar { position:sticky; top:0; z-index:50; background: var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding: 12px 16px; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar .logo-sm { font-size:18px; font-weight:800; color:var(--accent); }
  .topbar .logo-sm span { color:var(--text); }
  .topbar-user { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); }
  .icon-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); width:38px; height:38px; border-radius:9px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; position:relative; }
  .icon-btn:hover { border-color:var(--accent); }
  .badge { position:absolute; top:-5px; right:-5px; background:var(--red); color:#fff; font-size:10px; font-weight:700; min-width:17px; height:17px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .content { padding: 16px; max-width:1100px; margin:0 auto; }
  .page { display:none; }
  .page.active { display:block; animation: fade .2s; }
  @keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .bottomnav { position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--surface); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 4px; }
  .nav-item { flex:1; background:none; border:none; color:var(--text-dim); display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; cursor:pointer; font-size:11px; transition:.15s; border-radius:8px; }
  .nav-item.active { color:var(--accent); }
  .nav-item .nav-ico { font-size:20px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .card-title { font-size:13px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; font-weight:600; }
  h1.page-title { font-size:22px; font-weight:700; margin-bottom:4px; }
  .page-desc { color:var(--text-dim); font-size:13px; margin-bottom:18px; }
  .btn { background:var(--accent); color:#ffffff; border:none; font-weight:700; padding:11px 18px; border-radius:9px; cursor:pointer; font-size:14px; transition:.15s; }
  .btn:hover { filter:brightness(1.08); }
  .btn-sec { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-sec:hover { border-color:var(--accent); }
  .btn-sm { padding:7px 12px; font-size:13px; }
  .btn-block { width:100%; }
  .btn-danger { background:var(--red); color:#fff; }
  label { display:block; font-size:13px; color:var(--text-dim); margin-bottom:5px; margin-top:12px; }
  input, select, textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:11px 13px; color:var(--text); font-size:15px; font-family:inherit; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
  textarea { resize:vertical; min-height:90px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; color:var(--text-dim); font-size:12px; text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--border); font-weight:600; }
  td { padding:10px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:18px; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .stat-label { font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .stat-value { font-size:24px; font-weight:800; }
  .stat-value.red { color:var(--red); }
  .stat-value.green { color:var(--green); }
  .stat-value.accent { color:var(--accent); }
  .tag { display:inline-block; padding:3px 9px; border-radius:6px; font-size:11px; font-weight:700; }
  .tag-red { background:rgba(192,57,43,.15); color:var(--red); }
  .tag-green { background:rgba(46,139,87,.15); color:var(--green); }
  .tag-yellow { background:rgba(200,148,26,.15); color:var(--yellow); }
  .tag-blue { background:rgba(30,91,168,.15); color:var(--blue); }
  .tag-dim { background:var(--surface2); color:var(--text-dim); }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:20px; animation:slideup .25s; }
  @keyframes slideup { from{transform:translateY(40px); opacity:.6;} to{transform:none; opacity:1;} }
  .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .modal-head h3 { font-size:18px; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--text-dim); font-size:24px; cursor:pointer; }
  @media(min-width:600px){ .modal-bg{align-items:center;} .modal{border-radius:16px;} }
  #toasts { position:fixed; top:70px; right:16px; z-index:300; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--surface); border:1px solid var(--accent); border-left:4px solid var(--accent); border-radius:10px; padding:13px 16px; box-shadow:var(--shadow); min-width:240px; max-width:330px; animation:toastin .3s; font-size:14px; }
  @keyframes toastin { from{transform:translateX(120%);} to{transform:none;} }
  .toast-title { font-weight:700; margin-bottom:2px; }
  .toast-body { font-size:13px; color:var(--text-dim); }
  .row { display:flex; gap:10px; }
  .row > * { flex:1; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; }
  .mt { margin-top:14px; } .mb { margin-bottom:14px; }
  .empty { text-align:center; color:var(--text-dim); padding:40px 20px; }
  .empty-ico { font-size:40px; margin-bottom:10px; opacity:.5; }
  .loading { text-align:center; padding:30px; color:var(--text-dim); }
  .pill-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; }
  .pill { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); padding:7px 14px; border-radius:20px; cursor:pointer; font-size:13px; white-space:nowrap; }
  .pill.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div id="login">
  <div style="text-align:center">
    <div class="brand-circle">
      <div class="logo">bardak's<sup style="font-size:14px">&reg;</sup></div>
      <div class="login-sub">iz bırakan tatlar</div>
    </div>
  </div>
  <div class="login-card">
    <h2 id="loginTitle">Kim olarak giriş yapıyorsun?</h2>
    <div id="userList"><div class="loading">Yükleniyor...</div></div>
    <div id="pinArea" class="hidden">
      <div id="pinUserInfo" style="text-align:center;margin-bottom:16px"></div>
      <input type="password" id="pinInput" inputmode="numeric" maxlength="6" placeholder="PIN" style="text-align:center;font-size:24px;letter-spacing:8px" onkeydown="if(event.key==='Enter')verifyPin()">
      <button class="btn btn-block mt" onclick="verifyPin()">Giriş Yap</button>
      <button class="btn btn-sec btn-block mt" onclick="backToUsers()">← Geri</button>
      <div id="pinError" style="color:var(--red);text-align:center;margin-top:10px;font-size:13px"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo-sm">bardak's</span>
    </div>
    <div class="topbar-user">
      <span id="currentUserName"></span>
      <button class="icon-btn" id="notifBtn" onclick="openNotifs()">🔔<span class="badge hidden" id="notifBadge">0</span></button>
      <button class="icon-btn" onclick="logout()" title="Çıkış">⏻</button>
    </div>
  </div>
  <div class="content">
    <div id="page-panel" class="page"></div>
    <div id="page-siparis" class="page"></div>
    <div id="page-uretim" class="page"></div>
    <div id="page-firmalar" class="page"></div>
    <div id="page-analiz" class="page"></div>
    <div id="page-gunozeti" class="page"></div>
  </div>
  <div class="bottomnav" id="bottomnav"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>
<div id="toasts"></div>

<script>
const SUPABASE_URL = 'https://kfpgqqjmkutjzdmzkwaa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmcGdxcWpta3V0anpkbXprd2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTk2NzcsImV4cCI6MjA5NTE5NTY3N30.Y1ov7w7eDIJfzHYFeWPuU3D8fVMj3uMhXHB18y7Nfbs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let CURRENT = null;
let FIRMALAR = [], URUNLER = [], FIYATLAR = [];

const TL = n => (Number(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₺';
const today = () => new Date().toISOString().slice(0,10);
const trDate = d => { if(!d) return ''; const p=d.slice(0,10).split('-'); return p[2]+'.'+p[1]+'.'+p[0]; };

const ROL_RENK = { admin:'#1e5ba8', mudur:'#5c8fd6', imalathane:'#2e8b57' };
const ROL_AD = { admin:'Yönetici', mudur:'Müdür', imalathane:'İmalathane' };

let _loginUsers = [];
let _selectedUser = null;

async function loadUsers(){
  const r = await sb.from('kullanici_liste').select('*').order('rol');
  const el = document.getElementById('userList');
  if(r.error){ el.innerHTML = '<div class="empty">Bağlantı hatası: '+r.error.message+'</div>'; return; }
  _loginUsers = r.data;
  el.innerHTML = r.data.map((u,i)=>'<button class="user-btn" onclick="selectUser('+i+')"><div class="user-avatar" style="background:'+ROL_RENK[u.rol]+'">'+u.ad_soyad[0]+'</div><div><div>'+u.ad_soyad+'</div><div class="user-role">'+ROL_AD[u.rol]+'</div></div></button>').join('');
}
function selectUser(i){
  _selectedUser = _loginUsers[i];
  document.getElementById('userList').classList.add('hidden');
  document.getElementById('pinArea').classList.remove('hidden');
  document.getElementById('loginTitle').textContent = 'PIN gir';
  document.getElementById('pinUserInfo').innerHTML = '<div class="user-avatar" style="background:'+ROL_RENK[_selectedUser.rol]+';margin:0 auto 8px">'+_selectedUser.ad_soyad[0]+'</div><strong>'+_selectedUser.ad_soyad+'</strong><div class="user-role">'+ROL_AD[_selectedUser.rol]+'</div>';
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').textContent='';
  setTimeout(function(){document.getElementById('pinInput').focus();},100);
}
function backToUsers(){
  document.getElementById('userList').classList.remove('hidden');
  document.getElementById('pinArea').classList.add('hidden');
  document.getElementById('loginTitle').textContent = 'Kim olarak giriş yapıyorsun?';
}
async function verifyPin(){
  const pin = document.getElementById('pinInput').value.trim();
  if(!pin){ return; }
  const r = await sb.rpc('pin_giris', { p_kullanici_id:_selectedUser.id, p_pin:pin });
  if(r.error || !r.data || !r.data.length){
    document.getElementById('pinError').textContent = 'Hatalı PIN';
    document.getElementById('pinInput').value='';
    return;
  }
  doLogin(r.data[0]);
}
function doLogin(u){
  CURRENT = u;
  sessionStorage.setItem('bardaks_user', JSON.stringify(u));
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('currentUserName').textContent = u.ad_soyad;
  buildNav();
  initRealtime();
  if(u.rol==='imalathane') showPage('uretim');
  else showPage('panel');
  refreshNotifs();
}
function logout(){
  sessionStorage.removeItem('bardaks_user');
  CURRENT=null;
  location.reload();
}
function buildNav(){
  const nav = document.getElementById('bottomnav');
  let items = [];
  if(CURRENT.rol==='imalathane'){
    items = [{id:'uretim', ico:'🏭', label:'Üretim'},{id:'gunozeti', ico:'📋', label:'Notlar'}];
  } else {
    items = [{id:'panel', ico:'📊', label:'Panel'},{id:'siparis', ico:'🧾', label:'Sipariş'},{id:'firmalar', ico:'🏢', label:'Firmalar'},{id:'analiz', ico:'📈', label:'Analiz'},{id:'gunozeti', ico:'📋', label:'Gün Özeti'}];
  }
  nav.innerHTML = items.map(function(i){return '<button class="nav-item" data-page="'+i.id+'" onclick="showPage(\''+i.id+'\')"><span class="nav-ico">'+i.ico+'</span>'+i.label+'</button>';}).join('');
}
function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.toggle('active', n.dataset.page===id);});
  const page = document.getElementById('page-'+id);
  if(page) page.classList.add('active');
  if(id==='panel') renderPanel();
  if(id==='siparis') renderSiparis();
  if(id==='uretim') renderUretim();
  if(id==='firmalar') renderFirmalar();
  if(id==='analiz') renderAnaliz();
  if(id==='gunozeti') renderGunOzeti();
}
function openModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
function toast(title, body){
  const t = document.createElement('div');
  t.className='toast';
  t.innerHTML = '<div class="toast-title">'+title+'</div>'+(body?'<div class="toast-body">'+body+'</div>':'');
  document.getElementById('toasts').appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateX(120%)'; t.style.transition='.3s'; setTimeout(function(){t.remove();},300); }, 4000);
}
async function loadCoreData(){
  const r = await Promise.all([
    sb.from('firmalar').select('*').eq('aktif',true).order('ad'),
    sb.from('urunler').select('*').eq('aktif',true).order('ad'),
    sb.from('aktif_firma_fiyatlari').select('*')
  ]);
  FIRMALAR = r[0].data||[]; URUNLER = r[1].data||[]; FIYATLAR = r[2].data||[];
}
window.addEventListener('DOMContentLoaded', async function(){
  await loadCoreData();
  const saved = sessionStorage.getItem('bardaks_user');
  if(saved){ try{ doLogin(JSON.parse(saved)); return; }catch(e){} }
  loadUsers();
});

function initRealtime(){
  sb.channel('siparis-rt')
    .on('postgres_changes', {event:'*', schema:'public', table:'siparisler'}, function(payload){
      if(document.getElementById('page-uretim').classList.contains('active')) renderUretim();
      if(document.getElementById('page-siparis').classList.contains('active')) renderSiparis();
      if(document.getElementById('page-panel').classList.contains('active')) renderPanel();
      if((CURRENT.rol==='mudur'||CURRENT.rol==='admin') && payload.eventType==='UPDATE'){
        const o=payload.old, n=payload.new;
        if(o.durum!==n.durum){
          const fad=(FIRMALAR.find(function(f){return f.id===n.firma_id;})||{}).ad||'';
          toast('Durum değişti', fad+': '+durumAd(o.durum)+' → '+durumAd(n.durum));
        }
      }
      if(CURRENT.rol==='imalathane' && payload.eventType==='INSERT'){
        const fad=(FIRMALAR.find(function(f){return f.id===payload.new.firma_id;})||{}).ad||'';
        toast('🆕 Yeni sipariş', fad);
      }
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'siparis_notlari'}, function(payload){
      if(payload.new.yazan !== CURRENT.ad_soyad){ toast('💬 Yeni not', payload.new.mesaj.slice(0,50)); }
      if(document.getElementById('page-uretim').classList.contains('active')) renderUretim();
      if(document.getElementById('page-siparis').classList.contains('active')) renderSiparis();
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'gun_ozetleri'}, function(payload){
      if(CURRENT.rol==='admin' && payload.new.yazan!==CURRENT.ad_soyad){ toast('📋 Gün özeti geldi', payload.new.yazan+' bir özet yazdı'); }
    })
    .subscribe();
}

const durumAd = d => ({bekleyen:'Bekleyen',uretimde:'Üretimde',hazir:'Hazır',faturalandi:'Faturalandı',tamamlandi:'Tamamlandı',iptal:'İptal'}[d]||d);
const durumTag = d => ({bekleyen:'tag-dim',uretimde:'tag-yellow',hazir:'tag-blue',faturalandi:'tag-green',tamamlandi:'tag-green',iptal:'tag-red'}[d]||'tag-dim');

async function renderPanel(){
  const el = document.getElementById('page-panel');
  el.innerHTML = '<div class="loading">Yükleniyor...</div>';
  const r = await Promise.all([
    sb.from('cari_ozet').select('*'),
    sb.from('gecmis_aylik_ozet').select('firma_id, kalan_bakiye'),
    sb.from('siparisler').select('*').gte('tarih', today()).neq('durum','iptal')
  ]);
  const cari=r[0], gecmis=r[1], bugun=r[2];
  let gecmisBorc = (gecmis.data||[]).reduce(function(s,x){return s+Number(x.kalan_bakiye||0);},0);
  let cariBorc = (cari.data||[]).reduce(function(s,x){return s+Number(x.kalan_bakiye||0);},0);
  let toplamAcik = gecmisBorc + cariBorc;
  let bugunSiparis = (bugun.data||[]).length;
  let bugunCiro = (bugun.data||[]).reduce(function(s,x){return s+Number(x.toplam_kdv_dahil||0);},0);
  const firmaBorc = {};
  (gecmis.data||[]).forEach(function(x){ firmaBorc[x.firma_id]=(firmaBorc[x.firma_id]||0)+Number(x.kalan_bakiye||0); });
  (cari.data||[]).forEach(function(x){ firmaBorc[x.firma_id]=(firmaBorc[x.firma_id]||0)+Number(x.kalan_bakiye||0); });
  const borcList = Object.keys(firmaBorc).map(function(fid){return {ad:(FIRMALAR.find(function(f){return f.id===fid;})||{}).ad||'?', fid:fid, borc:firmaBorc[fid]};}).filter(function(x){return x.borc>1;}).sort(function(a,b){return b.borc-a.borc;});
  let h = '<h1 class="page-title">Merhaba '+CURRENT.ad_soyad.split(' ')[0]+' 👋</h1><div class="page-desc">'+trDate(today())+' · Genel durum</div>';
  h += '<div class="stats"><div class="stat"><div class="stat-label">Bugünkü Sipariş</div><div class="stat-value accent">'+bugunSiparis+'</div></div><div class="stat"><div class="stat-label">Bugünkü Ciro</div><div class="stat-value">'+TL(bugunCiro)+'</div></div><div class="stat"><div class="stat-label">Toplam Açık Bakiye</div><div class="stat-value red">'+TL(toplamAcik)+'</div></div></div>';
  h += '<div class="card"><div class="card-title">Firma Bazlı Açık Bakiye</div><div class="table-wrap"><table><tr><th>Firma</th><th style="text-align:right">Açık Bakiye</th><th></th></tr>';

  el.innerHTML='<div class="flex-between mb"><h1 class="page-title">Firmalar</h1><button class="btn" onclick="openYeniFirma()">+ Yeni Firma</button></div>'+FIRMALAR.map(function(f){
    const urunSayisi = FIYATLAR.filter(function(p){return p.firma_id===f.id;}).length;
    return '<div class="card"><div class="flex-between"><div><strong>'+f.ad+'</strong><div style="font-size:12px;color:var(--text-dim)">'+(f.resmi_unvan||'Ünvan girilmemiş')+' · '+urunSayisi+' ürün</div></div><button class="btn btn-sec btn-sm" onclick="openFirmaDetay(\''+f.id+'\')">Yönet</button></div></div>';
  }).join('');
}
function openYeniFirma(){
  openModal('<div class="modal-head"><h3>Yeni Firma</h3><button class="modal-close" onclick="closeModal()">×</button></div><label>Firma Adı *</label><input id="nfAd"><label>Resmi Ünvan</label><input id="nfUnvan"><div class="row"><div><label>Vergi Dairesi</label><input id="nfVd"></div><div><label>Vergi No</label><input id="nfVno"></div></div><label>Yetkili Kişi</label><input id="nfYetkili"><div class="row"><div><label>Telefon</label><input id="nfTel"></div><div><label>E-posta</label><input id="nfMail"></div></div><label>Adres</label><input id="nfAdres"><div class="row"><div><label>Ödeme Tipi</label><select id="nfOdeme"><option value="havale">Havale</option><option value="nakit">Nakit</option><option value="kredi_karti">Kredi Kartı</option><option value="cek">Çek</option></select></div><div><label>Vade (gün)</label><input type="number" id="nfVade" value="30"></div></div><label>Risk Limiti (₺)</label><input type="number" id="nfRisk" value="0"><button class="btn btn-block mt" onclick="kaydetFirma()">Firmayı Ekle</button>');
}
async function kaydetFirma(){
  const ad=document.getElementById('nfAd').value.trim();
  if(!ad){ alert('Firma adı zorunlu'); return; }
  const r = await sb.from('firmalar').insert({ ad:ad, resmi_unvan:val('nfUnvan'), vergi_dairesi:val('nfVd'), vergi_no:val('nfVno'), yetkili_kisi:val('nfYetkili'), telefon:val('nfTel'), email:val('nfMail'), adres:val('nfAdres'), odeme_tipi:document.getElementById('nfOdeme').value, vade_gun:Number(val('nfVade'))||30, risk_limiti:Number(val('nfRisk'))||0, olusturan_id:CURRENT.id });
  if(r.error){ alert('Hata: '+r.error.message); return; }
  closeModal(); toast('✅ Firma eklendi',ad); await loadCoreData(); renderFirmalar();
}
const val = id => document.getElementById(id).value.trim()||null;
async function openFirmaDetay(fid){
  const f=FIRMALAR.find(function(x){return x.id===fid;})||{};
  const fiyatlar=FIYATLAR.filter(function(p){return p.firma_id===fid;});
  const tanimliUrunIds = fiyatlar.map(function(p){return p.urun_id;});
  const eklenebilir = URUNLER.filter(function(u){return tanimliUrunIds.indexOf(u.id)<0;});
  openModal('<div class="modal-head"><h3>'+f.ad+'</h3><button class="modal-close" onclick="closeModal()">×</button></div><div style="font-size:13px;color:var(--text-dim);margin-bottom:14px">'+(f.resmi_unvan||'')+' '+(f.vergi_no?'· VKN: '+f.vergi_no:'')+'<br>'+(f.yetkili_kisi?'👤 '+f.yetkili_kisi:'')+' '+(f.telefon?'· 📞 '+f.telefon:'')+'<br>Ödeme: '+f.odeme_tipi+' · Vade: '+f.vade_gun+' gün</div><div class="card-title">Bu Firmaya Tanımlı Ürünler & Fiyatlar</div><div class="table-wrap"><table><tr><th>Ürün</th><th>Fiyat (Hariç)</th><th></th></tr>'+(fiyatlar.map(function(p){return '<tr><td>'+p.urun_ad+'</td><td>'+TL(p.birim_fiyat_kdv_haric)+'</td><td style="text-align:right"><button class="btn btn-sec btn-sm" onclick="fiyatGuncelle(\''+fid+'\',\''+p.urun_id+'\',\''+p.urun_ad.replace(/'/g,"")+'\','+p.birim_fiyat_kdv_haric+')">✏️</button> <button class="btn btn-sec btn-sm" onclick="urunCikar(\''+fid+'\',\''+p.urun_id+'\',\''+p.urun_ad.replace(/'/g,"")+'\')">🗑️</button></td></tr>';}).join('')||'<tr><td colspan=3 class="empty">Ürün yok</td></tr>')+'</table></div><div class="mt"><label>Ürün Ekle</label><div class="row"><select id="feUrun" style="flex:3">'+eklenebilir.map(function(u){return '<option value="'+u.id+'">'+u.ad+'</option>';}).join('')+'</select><input type="number" id="feFiyat" placeholder="Fiyat" style="flex:1.5"><button class="btn" style="flex:1" onclick="urunEkle(\''+fid+'\')">Ekle</button></div></div>');
}
async function urunEkle(fid){
  const uid=document.getElementById('feUrun').value;
  const fiyat=Number(document.getElementById('feFiyat').value);
  if(!fiyat){ alert('Fiyat gir'); return; }
  await sb.from('firma_urun_fiyat').insert({firma_id:fid,urun_id:uid,birim_fiyat_kdv_haric:fiyat,olusturan_id:CURRENT.id});
  await sb.from('firma_urun_log').insert({firma_id:fid,urun_id:uid,islem:'eklendi',yeni_fiyat:fiyat,yapan:CURRENT.ad_soyad});
  toast('✅ Ürün eklendi','');
  await loadCoreData(); openFirmaDetay(fid);
}
async function urunCikar(fid,uid,ad){
  if(!confirm(ad+' bu firmadan çıkarılsın mı?')) return;
  await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:today()}).eq('firma_id',fid).eq('urun_id',uid).is('gecerlilik_bitis',null);
  await sb.from('firma_urun_log').insert({firma_id:fid,urun_id:uid,islem:'cikarildi',yapan:CURRENT.ad_soyad});
  toast('🗑️ Ürün çıkarıldı','');
  await loadCoreData(); openFirmaDetay(fid);
}
function fiyatGuncelle(fid,uid,ad,eski){
  const yeni=prompt(ad+' için yeni fiyat (KDV hariç):', eski);
  if(yeni===null) return;
  const nf=Number(yeni); if(!nf){ alert('Geçersiz'); return; }
  (async function(){
    await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:today()}).eq('firma_id',fid).eq('urun_id',uid).is('gecerlilik_bitis',null);
    await sb.from('firma_urun_fiyat').insert({firma_id:fid,urun_id:uid,birim_fiyat_kdv_haric:nf,olusturan_id:CURRENT.id});
    await sb.from('firma_urun_log').insert({firma_id:fid,urun_id:uid,islem:'fiyat_degisti',eski_fiyat:eski,yeni_fiyat:nf,yapan:CURRENT.ad_soyad});
    toast('✏️ Fiyat güncellendi','');
    await loadCoreData(); openFirmaDetay(fid);
  })();
}
let analizDonem='ay';
async function renderAnaliz(){
  showPage_quiet('analiz');
  const el=document.getElementById('page-analiz');
  el.innerHTML='<div class="loading">Hesaplanıyor...</div>';
  const bugun=new Date(); let bas;
  if(analizDonem==='hafta'){ bas=new Date(bugun); bas.setDate(bugun.getDate()-7); }
  else if(analizDonem==='ay'){ bas=new Date(bugun.getFullYear(),bugun.getMonth(),1); }
  else { bas=new Date(bugun.getFullYear(),0,1); }
  const basStr=bas.toISOString().slice(0,10);
  const rsp = await sb.from('siparisler').select('id,firma_id,toplam_kdv_dahil,tarih').gte('tarih',basStr).neq('durum','iptal');
  const sips=rsp.data;
  const ids=(sips||[]).map(function(s){return s.id;});
  let kalemler=[];
  if(ids.length){ const r=await sb.from('siparis_kalemleri').select('urun_ad,adet,toplam_kdv_dahil,siparis_id').in('siparis_id',ids); kalemler=r.data||[]; }
  const firmaCiro={};
  (sips||[]).forEach(function(s){ const ad=(FIRMALAR.find(function(f){return f.id===s.firma_id;})||{}).ad||'?'; firmaCiro[ad]=(firmaCiro[ad]||0)+Number(s.toplam_kdv_dahil||0); });
  const firmaList=Object.keys(firmaCiro).map(function(k){return [k,firmaCiro[k]];}).sort(function(a,b){return b[1]-a[1];});
  const maxCiro=firmaList.length?firmaList[0][1]:1;
  const urunAdet={};
  kalemler.forEach(function(k){ urunAdet[k.urun_ad]=(urunAdet[k.urun_ad]||0)+Number(k.adet); });
  const urunList=Object.keys(urunAdet).map(function(k){return [k,urunAdet[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,15);
  const maxAdet=urunList.length?urunList[0][1]:1;
  const toplamCiro=firmaList.reduce(function(s,x){return s+x[1];},0);
  el.innerHTML='<h1 class="page-title">📈 Analiz</h1><div class="pill-tabs"><div class="pill '+(analizDonem==='hafta'?'active':'')+'" onclick="analizDonem=\'hafta\';renderAnaliz()">Haftalık</div><div class="pill '+(analizDonem==='ay'?'active':'')+'" onclick="analizDonem=\'ay\';renderAnaliz()">Aylık</div><div class="pill '+(analizDonem==='yil'?'active':'')+'" onclick="analizDonem=\'yil\';renderAnaliz()">Yıllık</div></div><div class="stats"><div class="stat"><div class="stat-label">Toplam Ciro</div><div class="stat-value accent">'+TL(toplamCiro)+'</div></div><div class="stat"><div class="stat-label">Sipariş Sayısı</div><div class="stat-value">'+(sips||[]).length+'</div></div><div class="stat"><div class="stat-label">Aktif Firma</div><div class="stat-value">'+firmaList.length+'</div></div></div><div class="card"><div class="card-title">Firma Karşılaştırma (Ciro)</div>'+(firmaList.map(function(x){return '<div style="margin-bottom:10px"><div class="flex-between" style="font-size:13px;margin-bottom:3px"><span>'+x[0]+'</span><strong>'+TL(x[1])+'</strong></div><div style="background:var(--surface2);border-radius:5px;height:8px"><div style="background:var(--accent);height:8px;border-radius:5px;width:'+(x[1]/maxCiro*100)+'%"></div></div></div>';}).join('')||'<div class="empty">Veri yok</div>')+'</div><div class="card"><div class="card-title">En Çok Satan Ürünler (Adet)</div>'+(urunList.map(function(x){return '<div style="margin-bottom:10px"><div class="flex-between" style="font-size:13px;margin-bottom:3px"><span>'+x[0]+'</span><strong>'+x[1]+' adet</strong></div><div style="background:var(--surface2);border-radius:5px;height:8px"><div style="background:var(--green);height:8px;border-radius:5px;width:'+(x[1]/maxAdet*100)+'%"></div></div></div>';}).join('')||'<div class="empty">Veri yok</div>')+'</div>';
}
function showPage_quiet(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.toggle('active', n.dataset.page===id);});
  document.getElementById('page-'+id).classList.add('active');
}
async function renderGunOzeti(){
  const el=document.getElementById('page-gunozeti');
  el.innerHTML='<div class="flex-between mb"><h1 class="page-title">📋 Gün Özetleri</h1>'+(CURRENT.rol!=='imalathane'?'<button class="btn" onclick="openYeniOzet()">+ Yaz</button>':'')+'</div><input id="ozetArama" placeholder="🔍 Ara: greenwich ödeme, musluk..." oninput="araOzet()" class="mb"><div id="ozetList"><div class="loading">Yükleniyor...</div></div>';
  araOzet();
}
async function araOzet(){
  const inp=document.getElementById('ozetArama');
  const q=(inp?inp.value:'').trim();
  let query=sb.from('gun_ozetleri').select('*').order('tarih',{ascending:false}).limit(50);
  if(q) query=query.ilike('ozet','%'+q+'%');
  const r=await query;
  const list=document.getElementById('ozetList');
  if(!r.data||!r.data.length){ list.innerHTML='<div class="empty"><div class="empty-ico">📋</div>'+(q?'Sonuç bulunamadı':'Henüz özet yok')+'</div>'; return; }
  list.innerHTML=r.data.map(function(o){return '<div class="card"><div class="flex-between mb"><strong>'+trDate(o.tarih)+'</strong><span class="tag tag-dim">'+o.yazan+'</span></div><div style="white-space:pre-wrap;font-size:14px">'+highlight(o.ozet,q)+'</div></div>';}).join('');
}
function highlight(text,q){
  if(!q) return text;
  return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:var(--accent);color:#fff">$1</mark>');
}
function openYeniOzet(){
  openModal('<div class="modal-head"><h3>Gün Özeti Yaz</h3><button class="modal-close" onclick="closeModal()">×</button></div><label>Tarih</label><input type="date" id="ozTarih" value="'+today()+'"><label>Bugün neler oldu?</label><textarea id="ozMetin" placeholder="Örn: Greenwich havale ödeme yaptı 102K. Mutfak musluğu değişti..." style="min-height:140px"></textarea><button class="btn btn-block mt" onclick="kaydetOzet()">Kaydet ve Yöneticiye Gönder</button>');
}
async function kaydetOzet(){
  const metin=document.getElementById('ozMetin').value.trim();
  if(!metin){ alert('Bir şeyler yaz'); return; }
  await sb.from('gun_ozetleri').insert({tarih:document.getElementById('ozTarih').value, yazan:CURRENT.ad_soyad, ozet:metin});
  closeModal(); toast('✅ Gün özeti kaydedildi','Yöneticiye iletildi'); renderGunOzeti();
}
async function openTahsilat(firmaId){
  const f=FIRMALAR.find(function(x){return x.id===firmaId;})||{};
  const ayar = await getAyar('cek_aylik_iskonto');
  openModal('<div class="modal-head"><h3>💰 Tahsilat · '+f.ad+'</h3><button class="modal-close" onclick="closeModal()">×</button></div><label>Tutar (₺)</label><input type="number" id="thTutar" oninput="thHesap()"><label>Ödeme Tipi</label><select id="thTip" onchange="thTipChange()"><option value="havale">Havale</option><option value="nakit">Nakit</option><option value="kredi_karti">Kredi Kartı</option><option value="cek">Çek</option></select><div id="thKart" class="hidden"><label>POS Komisyon Oranı (%)</label><input type="number" id="thKomisyon" step="0.1" placeholder="örn 1.8" oninput="thHesap()"></div><div id="thCek" class="hidden"><label>Çek Vade Tarihi</label><input type="date" id="thVade" oninput="thHesap()"><div style="font-size:12px;color:var(--text-dim);margin-top:4px">Aylık iskonto: %'+ayar+'</div></div><label>Hangi aya ait? (opsiyonel)</label><input id="thAy" placeholder="örn 2026-05"><label>Açıklama</label><input id="thAciklamaTxt"><div id="thOzet" class="mt" style="background:var(--surface2);padding:12px;border-radius:9px;font-size:13px"></div><button class="btn btn-block mt" onclick="kaydetTahsilat(\''+firmaId+'\')">Tahsilatı Kaydet</button>');
  window._cekIskonto=Number(ayar)||3.5;
  thHesap();
}
function thTipChange(){
  const tip=document.getElementById('thTip').value;
  document.getElementById('thKart').classList.toggle('hidden',tip!=='kredi_karti');
  document.getElementById('thCek').classList.toggle('hidden',tip!=='cek');
  thHesap();
}
function thHesap(){
  const tutar=Number(document.getElementById('thTutar').value)||0;
  const tip=document.getElementById('thTip').value;
  let html='', net=tutar;
  if(tip==='kredi_karti'){
    const kom=Number(document.getElementById('thKomisyon').value)||0;
    const komTutar=tutar*kom/100; net=tutar-komTutar;
    html='Brüt: '+TL(tutar)+'<br>Komisyon (%'+kom+'): -'+TL(komTutar)+'<br><strong>Net ele geçen: '+TL(net)+'</strong>';
  } else if(tip==='cek'){
    const vade=document.getElementById('thVade').value;
    if(vade){
      const gun=Math.max(0,(new Date(vade)-new Date())/(1000*60*60*24));
      const ay=gun/30;
      const kayip=tutar*(window._cekIskonto/100)*ay;
      html='Çek tutarı: '+TL(tutar)+'<br>Vade: '+trDate(vade)+' (~'+Math.round(gun)+' gün)<br>Tahmini değer kaybı: -'+TL(kayip)+'<br><strong>Bugünkü reel değer: '+TL(tutar-kayip)+'</strong>';
    } else html='Çek tutarı: '+TL(tutar)+' · Vade tarihi gir';
  } else { html='<strong>Net ele geçen: '+TL(net)+'</strong>'; }
  document.getElementById('thOzet').innerHTML=html;
}
async function kaydetTahsilat(firmaId){
  const tutar=Number(document.getElementById('thTutar').value);
  if(!tutar){ alert('Tutar gir'); return; }
  const tip=document.getElementById('thTip').value;
  let rec={firma_id:firmaId, tutar:tutar, odeme_tipi:tip, ay_referans:val('thAy'), aciklama:val('thAciklamaTxt'), created_by:CURRENT.ad_soyad, giren_kullanici_id:CURRENT.id};
  if(tip==='kredi_karti'){
    const kom=Number(document.getElementById('thKomisyon').value)||0;
    rec.komisyon_orani=kom; rec.komisyon_tutari=tutar*kom/100; rec.net_tahsil=tutar-rec.komisyon_tutari;
  } else if(tip==='cek'){
    const vade=document.getElementById('thVade').value;
    rec.cek_vade_tarihi=vade||null;
    if(vade){ const ay=Math.max(0,(new Date(vade)-new Date())/(1000*60*60*24))/30; rec.cek_deger_kaybi=tutar*(window._cekIskonto/100)*ay; }
    rec.net_tahsil=tutar;
  } else rec.net_tahsil=tutar;
  const r=await sb.from('tahsilatlar').insert(rec);
  if(r.error){ alert('Hata: '+r.error.message); return; }
  closeModal(); toast('✅ Tahsilat kaydedildi',TL(tutar)); renderPanel();
}
async function refreshNotifs(){
  const r=await sb.from('bildirimler').select('*').eq('alici_rol',CURRENT.rol).eq('okundu',false);
  const n=(r.data||[]).length;
  const badge=document.getElementById('notifBadge');
  badge.textContent=n; badge.classList.toggle('hidden',n===0);
}
async function openNotifs(){
  const r=await sb.from('bildirimler').select('*').eq('alici_rol',CURRENT.rol).order('olusturma',{ascending:false}).limit(30);
  openModal('<div class="modal-head"><h3>🔔 Bildirimler</h3><button class="modal-close" onclick="closeModal()">×</button></div>'+((r.data||[]).map(function(b){return '<div class="card" style="padding:12px;margin-bottom:8px;'+(b.okundu?'opacity:.6':'')+'"><strong style="font-size:14px">'+b.baslik+'</strong><div style="font-size:13px;color:var(--text-dim);margin-top:3px">'+(b.icerik||'')+'</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px">'+new Date(b.olusturma).toLocaleString('tr-TR')+'</div></div>';}).join('')||'<div class="empty">Bildirim yok</div>')+'<button class="btn btn-sec btn-block mt" onclick="tumunuOku()">Tümünü Okundu İşaretle</button>');
}
async function tumunuOku(){
  await sb.from('bildirimler').update({okundu:true}).eq('alici_rol',CURRENT.rol).eq('okundu',false);
  closeModal(); refreshNotifs();
}
async function getAyar(key){
  const r=await sb.from('ayarlar').select('deger').eq('anahtar',key).single();
  return r.data?r.data.deger:'3.5';
}
async function openAyarlar(){
  const r=await sb.from('ayarlar').select('*').order('anahtar');
  openModal('<div class="modal-head"><h3>⚙️ Ayarlar</h3><button class="modal-close" onclick="closeModal()">×</button></div>'+(r.data||[]).map(function(a){return '<label>'+a.aciklama+'</label><input value="'+a.deger+'" onchange="ayarKaydet(\''+a.anahtar+'\',this.value)">';}).join('')+'<div style="font-size:12px;color:var(--text-dim);margin-top:10px">Değişiklikler otomatik kaydedilir.</div>');
}
async function ayarKaydet(key,v){
  await sb.from('ayarlar').update({deger:v}).eq('anahtar',key);
  toast('✅ Ayar kaydedildi','');
}
setInterval(function(){ if(CURRENT) refreshNotifs(); }, 30000);
</script>
