<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bardaks B2B — Operasyon Raporu (UTL)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script src="utl.js"></script>
<style>
:root{--bg:#0f1115;--s:#181b22;--s2:#1f232c;--bd:#2a2f3a;--tx:#e8eaed;--dm:#9aa0ac;--ac:#d4a04f;--gn:#4caf7d;--rd:#e05c5c;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5}
.top{position:sticky;top:0;z-index:30;background:var(--s);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;flex-wrap:wrap;gap:8px}
.logo{font-size:18px;font-weight:800;color:var(--ac)} .logo span{color:var(--tx)}
.w{max-width:1100px;margin:0 auto;padding:16px}
.ctl{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ctl .f{display:flex;flex-direction:column;gap:4px} .ctl label{font-size:12px;color:var(--dm)}
select,input[type=date],input{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:15px;font-family:inherit;min-width:100px}
select:focus,input:focus{outline:none;border-color:var(--ac)}
.b{background:var(--ac);color:#1a1208;border:none;font-weight:700;padding:11px 16px;border-radius:9px;cursor:pointer;font-size:14px}
.b.s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.tabs{display:flex;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-weight:700;font-size:13px;color:var(--dm);border-right:1px solid var(--bd)}
.tab:last-child{border-right:none} .tab.on{background:var(--ac);color:#1a1208}
.state{border-radius:10px;padding:9px 13px;margin-bottom:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.state.processing{background:#1c2a3a;border:1px solid #2f5b8a;color:#bcd6f0}
.state.confirmed{background:#13241b;border:1px solid var(--gn);color:#bff0d6}
.state.unknown{background:#3a2f1c;border:1px solid var(--ac);color:#ffe6b0}
.state.failed{background:#3a1c1c;border:1px solid var(--rd);color:#ffcaca}
.state.hide{display:none}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.empty{padding:40px;text-align:center;color:var(--dm)}
.an-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:16px}
.an-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.an-card .v{font-size:22px;font-weight:800;color:var(--ac)} .an-card .l{font-size:12px;color:var(--dm)}
.an-card .v.gn{color:var(--gn)} .an-card .v.rd{color:var(--rd)}
#sh{background:#fff;color:#1a1a1a;border-radius:10px;padding:24px;box-shadow:0 6px 30px rgba(0,0,0,.4)}
#sh .rh{display:flex;justify-content:space-between;border-bottom:3px solid #1a1a1a;padding-bottom:10px;margin-bottom:8px}
#sh .rl{font-size:22px;font-weight:800} #sh .rs{font-size:11px;color:#666} #sh .rf{font-size:11px;text-align:right;color:#333}
#sh h2{font-size:18px;margin:10px 0 2px} #sh .rm{font-size:12px;color:#666;margin-bottom:12px}
#sh .st{font-size:15px;font-weight:800;margin:18px 0 8px;border-bottom:2px solid #1a1a1a;padding-bottom:4px}
#sh table.sm{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:4px}
#sh table.sm th{background:#f3f3f3;text-align:left;padding:6px 9px;border:1px solid #ddd;font-size:11px}
#sh table.sm td{padding:6px 9px;border:1px solid #e2e2e2} #sh table.sm td.n,#sh table.sm th.n{text-align:right}
#sh table.sm tr.tr td{font-weight:700;background:#faf7f0}
#sh .gr{font-size:16px;font-weight:800;text-align:right;margin-top:10px;border-top:2px solid #1a1a1a;padding-top:8px}
#sh .ft{margin-top:20px;font-size:10px;color:#888;text-align:center;border-top:1px solid #ddd;padding-top:8px}
.day-card{background:#fff;color:#1a1a1a;border-radius:10px;padding:16px;margin-bottom:10px}
.day-card h3{font-size:15px;margin-bottom:8px} .day-card table{width:100%;border-collapse:collapse;font-size:13px}
.day-card th{background:#f3f3f3;text-align:left;padding:6px 9px;border:1px solid #ddd;font-size:11px}
.day-card td{padding:6px 9px;border:1px solid #e2e2e2} .day-card td.n{text-align:right} .day-card tr.tot td{font-weight:700;background:#faf7f0}
.fat-row{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
.tag-g{color:var(--gn)} .tag-r{color:var(--rd)} .tag-y{color:#f59e0b}
.login-box{max-width:340px;margin:60px auto;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:24px}
.login-box h2{font-size:18px;margin-bottom:6px} .login-box label{display:block;font-size:13px;color:var(--dm);margin:8px 0 4px}
@media print{body{background:#fff}.top,.ctl,.tabs,.state,.no-p{display:none!important}.w{max-width:none;padding:0}#sh{box-shadow:none;border-radius:0;padding:0}}
</style>
</head>
<body>
<div class="top">
  <div class="logo">bardak's<span> B2B · Operasyon Raporu</span></div>
  <div id="who" style="font-size:13px;color:var(--dm)"></div>
</div>

<div id="loginBox" class="login-box" style="display:none">
  <h2>Giriş</h2>
  <label>E-posta</label><input type="email" id="em">
  <label>Şifre</label><input type="password" id="pw" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="b" style="width:100%;margin-top:14px" onclick="doLogin()">Giriş Yap</button>
  <div id="le" style="font-size:13px;margin-top:8px;color:var(--rd)"></div>
</div>

<div id="app" class="w" style="display:none">
  <div class="ctl no-p">
    <div class="f"><label>Yıl</label><select id="sY" onchange="onY()"></select></div>
    <div class="f"><label>Ay</label><select id="sM" onchange="go()"></select></div>
    <div class="f" style="flex:1"><label>Firma</label><select id="sF" onchange="go()"></select></div>
    <button class="b s" onclick="window.print()">Yazdır</button>
    <button class="b" onclick="dlpdf()">PDF</button>
  </div>
  <div class="tabs no-p">
    <div class="tab on" data-t="ozet" onclick="setTab('ozet')">Özet</div>
    <div class="tab" data-t="urun" onclick="setTab('urun')">Ürün</div>
    <div class="tab" data-t="gunluk" onclick="setTab('gunluk')">Günlük</div>
    <div class="tab" data-t="fatura" onclick="setTab('fatura')">Fatura</div>
  </div>
  <div id="stateBar" class="state hide no-p"><span class="dot"></span><span id="stateMsg"></span></div>
  <div id="out"></div>
</div>

<script>
const AY=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const TL=n=>(Math.round((+n||0)*100)/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';
const AD=n=>(+n||0).toLocaleString('tr-TR');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);
const SUPABASE_URL='https://kfpgqqjmkutjzdmzkwaa.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmcGdxcWpta3V0anpkbXprd2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTk2NzcsImV4cCI6MjA5NTE5NTY3N30.Y1ov7w7eDIJfzHYFeWPuU3D8fVMj3uMhXHB18y7Nfbs';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); // yalnız auth için; veri erişimi UTL üzerinden

let curTab='ozet', FIRMS=[], PERIODS={};

/* ---- state contract: processing | confirmed | unknown | failed ---- */
function setState(kind,msg){ var b=$('stateBar'); if(!b) return; b.className='state no-p '+kind; $('stateMsg').textContent=msg; }
function clearState(){ var b=$('stateBar'); if(b) b.className='state hide no-p'; }

/* ---- auth ---- */
(async()=>{ const{data:{session}}=await sb.auth.getSession(); if(session) start(); else $('loginBox').style.display='block';
  sb.auth.onAuthStateChange((e,s)=>{ if(s&&$('app').style.display==='none') start(); }); })();
async function doLogin(){ const e=$('em').value.trim(),p=$('pw').value,l=$('le'); l.textContent='Giriş yapılıyor…';
  const{error}=await sb.auth.signInWithPassword({email:e,password:p}); if(error){ l.textContent=error.message; return; } start(); }

async function start(){
  $('loginBox').style.display='none'; $('app').style.display='block';
  const{data:{user}}=await sb.auth.getUser(); $('who').textContent=user?user.email:'';
  setState('processing','Veriler yükleniyor…');
  try{
    FIRMS = await UTL.getFirms();
    $('sF').innerHTML='<option value="">Tüm firmalar</option>'+FIRMS.map(f=>`<option value="${f.id}">${esc(f.ad)}</option>`).join('');
    const daily = await UTL.aggregates.daily({});
    PERIODS={};
    daily.forEach(d=>{ const y=String(d.tarih).slice(0,4), m=+String(d.tarih).slice(5,7); (PERIODS[y]=PERIODS[y]||new Set()).add(m); });
    const years=Object.keys(PERIODS).sort().reverse();
    $('sY').innerHTML = years.length?years.map(y=>`<option>${y}</option>`).join(''):'<option>'+new Date().getFullYear()+'</option>';
    onY(true);
    UTL.subscribe(()=>{ setState('processing','Değişiklik alındı, yenileniyor…'); go(); });
  }catch(err){ setState('failed','Başlangıç verisi alınamadı — bağlantıyı kontrol et, sayfayı yenile. ('+(err&&err.message||err)+')'); }
}
function onY(skip){ const y=$('sY').value; const ms=[...(PERIODS[y]||[])].sort((a,b)=>b-a);
  $('sM').innerHTML = ms.length?ms.map(m=>`<option value="${m}">${AY[m-1]}</option>`).join(''):'<option value="">—</option>';
  go(); }
function setTab(t){ curTab=t; document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t)); go(); }

function curFilter(){ const y=+$('sY').value, m=+$('sM').value, ff=$('sF').value||null;
  if(!y||!m) return null;
  const from=`${y}-${String(m).padStart(2,'0')}-01`;
  const to=`${y}-${String(m).padStart(2,'0')}-${String(new Date(y,m,0).getDate()).padStart(2,'0')}`;
  return {from,to,firma_id:ff}; }
function hdr(f){ const y=$('sY').value,m=+$('sM').value,fn=f.firma_id?(FIRMS.find(x=>x.id===f.firma_id)||{}).ad:'';
  return `<div class="rh"><div><div class="rl">bardak's</div><div class="rs">B2B Operasyon Raporu (canlı DB)</div></div><div class="rf"><b>BARDAKS GIDA TİCARET LTD. ŞTİ.</b><br>Ortahisar / Trabzon</div></div><h2>${AY[m-1]} ${y}${fn?' · '+esc(fn):''}</h2><div class="rm">Oluşturma: ${new Date().toLocaleDateString('tr-TR')} · kaynak: Supabase/UTL</div>`; }

async function go(){
  const f=curFilter(); const out=$('out');
  if(!f){ out.innerHTML='<div class="empty">Dönem seçili değil.</div>'; clearState(); return; }
  setState('processing','Rapor hesaplanıyor…');
  try{
    let html='';
    if(curTab==='ozet')        html=await viewOzet(f);
    else if(curTab==='urun')   html=await viewUrun(f);
    else if(curTab==='gunluk') html=await viewGunluk(f);
    else if(curTab==='fatura') html=await viewFatura(f);
    out.innerHTML=html;
    setState('confirmed','Güncel · Supabase tek kaynağından (UTL)');
  }catch(err){ setState('failed','Rapor üretilemedi — '+(err&&err.message||err)+'. Tekrar denemek için dönemi değiştir veya sayfayı yenile.'); }
}

async function viewOzet(f){
  const v=await UTL.getReportView(f);
  const fin=v.financial||{}, firm=v.firm||[], urun=v.urun||[];
  if(!firm.length){ return '<div class="empty">Bu dönemde sipariş yok (boş durum).</div>'; }
  // [KAR-GUARD] maliyet eksik -> kâr gösterme (UTL.getProducts ile türev, RPC/DB değişmez)
  let eksikM=0; try{ const prods=await UTL.getProducts(); eksikM=(prods||[]).filter(p=>!Number(p.birim_maliyet)).length; }catch(e){ eksikM=0; }
  const karG=(eksikM===0);
  const topU=urun[0];
  let h='<div class="an-grid">';
  h+=`<div class="an-card"><div class="v">${TL(fin.ciro_haric)}</div><div class="l">Ciro (KDV hariç)</div></div>`;
  h+=`<div class="an-card"><div class="v">${TL(fin.ciro_dahil)}</div><div class="l">Ciro (KDV dahil)</div></div>`;
  if(karG){
    h+=`<div class="an-card"><div class="v gn">${TL(fin.brut_kar)}</div><div class="l">Brüt Kâr</div></div>`;
    h+=`<div class="an-card"><div class="v ${(+fin.net_kar>=0)?'gn':'rd'}">${TL(fin.net_kar)}</div><div class="l">Net Kâr</div></div>`;
  } else {
    h+=`<div class="an-card" style="grid-column:span 2;border-color:var(--ac)"><div class="v" style="font-size:13px;color:var(--ac)">⚠ Kâr hesaplanamıyor — maliyet eksik (${eksikM} ürün)</div><div class="l">Brüt / Net Kâr gizli</div></div>`;
  }
  h+=`<div class="an-card"><div class="v">${TL(fin.tahsilat)}</div><div class="l">Tahsilat</div></div>`;
  h+=`<div class="an-card"><div class="v">${topU?esc(topU.urun_ad):'—'}</div><div class="l">En Çok Satan${topU?' ('+AD(topU.toplam_adet)+')':''}</div></div>`;
  h+='</div>';
  h+='<div id="sh">'+hdr(f);
  h+='<div class="st">FİRMA BAZLI ÖZET</div><table class="sm"><tr><th>Firma</th><th class="n">Adet</th><th class="n">KDV Hariç</th><th class="n">KDV Dahil</th></tr>';
  firm.forEach(r=>{ h+=`<tr><td>${esc(r.firma_ad||'—')}</td><td class="n">${AD(r.toplam_adet)}</td><td class="n">${TL(r.kdv_haric)}</td><td class="n">${TL(r.kdv_dahil)}</td></tr>`; });
  h+=`<tr class="tr"><td>GENEL TOPLAM</td><td class="n">${AD(firm.reduce((s,r)=>s+(+r.toplam_adet||0),0))}</td><td class="n">${TL(fin.ciro_haric)}</td><td class="n">${TL(fin.ciro_dahil)}</td></tr></table>`;
  h+=`<div class="gr">GENEL TOPLAM (KDV dahil): ${TL(fin.ciro_dahil)}</div>`;
  h+='<div class="ft">bardak\'s B2B · Supabase/UTL tek kaynağından otomatik üretildi.</div></div>';
  return h;
}
async function viewUrun(f){
  const urun=await UTL.aggregates.urun(f);
  if(!urun.length) return '<div class="empty">Bu dönemde ürün hareketi yok.</div>';
  let h='<div id="sh">'+hdr(f)+'<div class="st">ÜRÜN BAZLI ÖZET</div><table class="sm"><tr><th>Ürün</th><th class="n">Toplam Adet</th><th class="n">KDV Hariç</th><th class="n">KDV Dahil</th></tr>';
  urun.forEach(r=>{ h+=`<tr><td>${esc(r.urun_ad)}</td><td class="n">${AD(r.toplam_adet)}</td><td class="n">${TL(r.kdv_haric)}</td><td class="n">${TL(r.kdv_dahil)}</td></tr>`; });
  h+='</table><div class="ft">Ürün toplamları sunucu tarafı (rapor_urun) — yerel hesap yok.</div></div>';
  return h;
}
async function viewGunluk(f){
  const rows=await UTL.aggregates.urunGun(f);
  const daily=await UTL.aggregates.daily(f);
  if(!rows.length) return '<div class="empty">Bu dönemde günlük hareket yok.</div>';
  const dmap={}; rows.forEach(r=>{ (dmap[r.tarih]=dmap[r.tarih]||[]).push(r); });
  const dtot={}; daily.forEach(d=>dtot[d.tarih]=d);
  let h='';
  Object.keys(dmap).sort().forEach(t=>{
    const d=new Date(t+'T00:00:00'); const gl=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'][d.getDay()];
    const tt=dtot[t]||{};
    h+=`<div class="day-card"><h3>${String(t).slice(8,10)} ${AY[+String(t).slice(5,7)-1]} ${String(t).slice(0,4)} ${gl}</h3>`;
    h+='<table><tr><th>Ürün</th><th class="n">Adet</th><th class="n">KDV Hariç</th><th class="n">KDV Dahil</th></tr>';
    dmap[t].forEach(r=>{ h+=`<tr><td>${esc(r.urun_ad)}</td><td class="n">${AD(r.toplam_adet)}</td><td class="n">${TL(r.kdv_haric)}</td><td class="n">${TL(r.kdv_dahil)}</td></tr>`; });
    h+=`<tr class="tot"><td>Günlük Toplam</td><td class="n">${AD(tt.toplam_adet)}</td><td class="n">${TL(tt.kdv_haric)}</td><td class="n">${TL(tt.kdv_dahil)}</td></tr></table></div>`;
  });
  return h;
}
async function viewFatura(f){
  const orders=await UTL.getOrders(f);
  if(!orders.length) return '<div class="empty">Bu dönemde sipariş yok.</div>';
  let h='<div class="an-grid">';
  const byFirm={}; orders.forEach(o=>{ const fn=(FIRMS.find(x=>x.id===o.firma_id)||{}).ad||'—'; (byFirm[fn]=byFirm[fn]||[]).push(o); });
  h+=`<div class="an-card"><div class="v">${orders.length}</div><div class="l">Sipariş (dönem)</div></div>`;
  h+=`<div class="an-card"><div class="v">${TL(orders.reduce((s,o)=>s+(+o.kdv_dahil||0),0))}</div><div class="l">Toplam (KDV dahil)</div></div></div>`;
  Object.keys(byFirm).sort().forEach(fn=>{
    h+=`<div style="font-weight:700;margin:12px 0 6px">${esc(fn)}</div>`;
    byFirm[fn].sort((a,b)=>a.tarih<b.tarih?-1:1).forEach(o=>{
      h+=`<div class="fat-row"><div><div style="font-weight:700">${esc(o.tarih)}</div><div style="font-size:12px;color:var(--dm)">${esc(o.durum)} · ${o.source}</div></div><div>${TL(o.kdv_dahil)}</div></div>`;
    });
  });
  return h;
}
function dlpdf(){ const el=$('out').querySelector('#sh')||$('out');
  if(!el){ setState('failed','PDF için içerik yok.'); return; }
  setState('processing','PDF hazırlanıyor…');
  html2pdf().set({margin:[6,6,8,6],filename:'Bardaks_Rapor.pdf',image:{type:'jpeg',quality:.95},html2canvas:{scale:2,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(el).save()
    .then(()=>setState('confirmed','PDF indirildi')).catch(e=>setState('failed','PDF üretilemedi: '+(e&&e.message||e)));
}
</script>
</body>
</html>
