<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bardaks B2B — Günlük Sipariş Raporu</title>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script src="gunluk_meta.js"></script>
<script src="gunluk_ord1.js"></script>
<script src="gunluk_ord2.js"></script>
<script src="gunluk_ord3.js"></script>
<style>
  :root{--bg:#0f1115;--surface:#181b22;--surface2:#1f232c;--border:#2a2f3a;--text:#e8eaed;--dim:#9aa0ac;--accent:#d4a04f;--radius:12px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
  .topbar{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;flex-wrap:wrap;gap:8px}
  .logo{font-size:18px;font-weight:800;color:var(--accent)} .logo span{color:var(--text)}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
  .controls .fld{display:flex;flex-direction:column;gap:4px}
  .controls label{font-size:12px;color:var(--dim)}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:15px;font-family:inherit;min-width:120px}
  select:focus{outline:none;border-color:var(--accent)}
  .btn{background:var(--accent);color:#1a1208;border:none;font-weight:700;padding:11px 16px;border-radius:9px;cursor:pointer;font-size:14px}
  .btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn:disabled{opacity:.6}
  .warn{background:#3a1c1c;border:1px solid #e05c5c;color:#ffcaca;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px}
  .ok-badge{background:#1c3a2a;border:1px solid #4caf7d;color:#bff0d6;border-radius:8px;padding:6px 10px;font-size:12px;display:inline-block;margin-bottom:14px}
  /* RAPOR KAĞIDI */
  #sheet{background:#fff;color:#1a1a1a;border-radius:10px;padding:26px;box-shadow:0 6px 30px rgba(0,0,0,.4)}
  #sheet .r-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #1a1a1a;padding-bottom:12px;margin-bottom:6px}
  #sheet .r-logo{font-size:24px;font-weight:800}
  #sheet .r-sub{font-size:12px;color:#666}
  #sheet .r-firma{font-size:11px;text-align:right;color:#333;line-height:1.5}
  #sheet h2{font-size:19px;margin:12px 0 2px}
  #sheet .r-meta{font-size:12px;color:#666;margin-bottom:14px}
  #sheet .firma-h{font-size:16px;font-weight:800;margin:22px 0 4px;color:#1a1a1a}
  #sheet .wk{font-size:13px;font-weight:800;color:#fff;background:#3f8f63;padding:7px 12px;margin:14px 0 0;border-radius:5px 5px 0 0}
  .grid-wrap{overflow-x:auto;border:1px solid #cfe3d6;border-top:none;border-radius:0 0 5px 5px;margin-bottom:6px}
  #sheet table.grid{border-collapse:collapse;font-size:11.5px;white-space:nowrap;min-width:100%}
  #sheet table.grid th,#sheet table.grid td{border:1px solid #d8e6dd;padding:5px 8px;text-align:center}
  #sheet table.grid th{background:#eaf4ee;font-weight:700;font-size:10.5px}
  #sheet table.grid td.urun{text-align:left;font-weight:600;position:sticky;left:0;background:#fff}
  #sheet table.grid th.urun{text-align:left;position:sticky;left:0;background:#eaf4ee;z-index:1}
  #sheet table.grid td.bf{color:#2c6e49;font-weight:600}
  #sheet table.grid td.n{text-align:right}
  #sheet table.grid td.tot,#sheet table.grid th.tot{background:#f6f1e6;font-weight:700}
  #sheet table.grid tr.gunluk td{background:#f3efe4;font-weight:700}
  #sheet table.grid tr.haftalik td{background:#d4a04f;color:#1a1208;font-weight:800;font-size:12px}
  #sheet .section-title{font-size:15px;font-weight:800;margin:24px 0 8px;border-bottom:2px solid #1a1a1a;padding-bottom:4px}
  #sheet table.sum{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:4px}
  #sheet table.sum th{background:#f3f3f3;text-align:left;padding:6px 9px;border:1px solid #ddd;font-size:11px}
  #sheet table.sum td{padding:6px 9px;border:1px solid #e2e2e2}
  #sheet table.sum td.n,#sheet table.sum th.n{text-align:right}
  #sheet table.sum tr.tot-row td{font-weight:700;background:#faf7f0}
  #sheet .grand{font-size:16px;font-weight:800;text-align:right;margin-top:10px;border-top:2px solid #1a1a1a;padding-top:8px}
  #sheet .r-foot{margin-top:24px;font-size:10px;color:#888;text-align:center;border-top:1px solid #ddd;padding-top:10px}
  /* Paylaş menüsü */
  #shareOv{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  #shareOv.open{display:flex}
  #shareCard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;width:100%;max-width:340px}
  #shareCard h3{font-size:16px;margin-bottom:4px} #shareCard p{font-size:12px;color:var(--dim);margin-bottom:14px}
  .share-btn{display:flex;align-items:center;gap:10px;width:100%;padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;text-decoration:none}
  .share-btn:hover{border-color:var(--accent)} .share-btn .ic{font-size:18px;width:24px;text-align:center}
  .hidden{display:none!important}
  @media print{ body{background:#fff} .topbar,.controls,.no-print,#shareOv{display:none!important} .wrap{max-width:none;padding:0} #sheet{box-shadow:none;border-radius:0;padding:0} .grid-wrap{overflow:visible} }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">bardak's<span> B2B · Günlük Sipariş Raporu</span></div>
  <div style="font-size:13px;color:var(--dim)">Excel formatı · gün gün</div>
</div>

<div class="wrap">
  <div class="controls no-print">
    <div class="fld"><label>Yıl</label><select id="selYil" onchange="onYil()"></select></div>
    <div class="fld"><label>Ay</label><select id="selAy" onchange="render()"></select></div>
    <div class="fld" style="flex:1"><label>Firma</label><select id="selFirma" onchange="render()"></select></div>
    <button class="btn" id="btnIlet" onclick="ilet()">📤 İlet</button>
    <button class="btn sec" onclick="window.print()">🖨 Yazdır</button>
  </div>
  <div id="warnBox"></div>
  <div id="out"></div>
</div>

<div id="shareOv" onclick="if(event.target===this)closeShare()">
  <div id="shareCard">
    <h3>📤 Raporu İlet</h3>
    <p id="shareDesc">WhatsApp veya e-posta ile gönder.</p>
    <a class="share-btn" id="shWa" target="_blank" rel="noopener"><span class="ic">🟢</span> WhatsApp ile gönder</a>
    <a class="share-btn" id="shMail"><span class="ic">✉️</span> E-posta ile gönder</a>
    <button class="share-btn" id="shPdf" onclick="downloadPdf()"><span class="ic">📄</span> PDF indir</button>
    <button class="share-btn" onclick="closeShare()" style="justify-content:center;background:none">Kapat</button>
  </div>
</div>

<script>
const AYLAR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const GUN=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const FNAME={G:'Greenwich',A:'Alamare',D:'Dobos Lounge',M:'Mak Grup',L:'Levent Börek',C:'Coffee Neron',O:'Outlier Speciality Coffee'};
const TL=n=>(Math.round((Number(n)||0)*100)/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';
const ADET=n=>(Number(n)||0).toLocaleString('tr-TR');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ORD=window.ORD||[], PROD=window.PROD||[], EXP=window.EXP||{};
let LAST_FILE=null,LAST_URL=null;

function monKey(ds){const d=new Date(ds+'T00:00:00');const off=(d.getDay()+6)%7;const m=new Date(d);m.setDate(d.getDate()-off);return m.toISOString().slice(0,10);}
function dlabel(ds){const d=new Date(ds+'T00:00:00');return ds.slice(8,10)+'.'+ds.slice(5,7)+' '+GUN[d.getDay()];}

// ---- bütünlük kontrolü ----
function integrity(){
  const calc={};
  ORD.forEach(o=>{const ym=o[0]+'|'+o[1].slice(0,7); o[2].forEach(it=>{calc[ym]=(calc[ym]||0)+it[1]*it[2];});});
  const bad=[];
  Object.keys(EXP).forEach(k=>{ if(Math.abs((calc[k]||0)-EXP[k])>0.6) bad.push(k+': hesap '+Math.round(calc[k]||0)+' / beklenen '+Math.round(EXP[k])); });
  const wb=document.getElementById('warnBox');
  if(bad.length){ wb.innerHTML='<div class="warn"><b>⚠ Veri tutarsızlığı (kopyalama hatası olabilir):</b><br>'+bad.join('<br>')+'</div>'; }
  else { wb.innerHTML='<div class="ok-badge">✓ Veri bütünlüğü doğrulandı — '+ORD.length+' günlük sipariş, '+Object.keys(EXP).length+' firma-ay</div>'; }
}

function buildSelectors(){
  const yset=new Set(), aByY={}, fset=new Set();
  ORD.forEach(o=>{const y=o[1].slice(0,4),m=+o[1].slice(5,7); yset.add(y); (aByY[y]=aByY[y]||new Set()).add(m); fset.add(o[0]);});
  window._aByY=aByY;
  const ys=[...yset].sort().reverse();
  selYil.innerHTML=ys.map(y=>`<option>${y}</option>`).join('');
  const fl=[...fset].sort((a,b)=>FNAME[a].localeCompare(FNAME[b],'tr'));
  selFirma.innerHTML='<option value="">Tüm firmalar</option>'+fl.map(f=>`<option value="${f}">${esc(FNAME[f])}</option>`).join('');
  onYil(true);
}
function onYil(keep){
  const y=selYil.value; const ms=[...(window._aByY[y]||[])].sort((a,b)=>b-a);
  selAy.innerHTML=ms.map(m=>`<option value="${m}">${AYLAR[m-1]}</option>`).join('');
  if(!keep) render();
}

function gridFor(fc, mo){
  // mo: o listesi (bu firma+ay). Mon-Sun haftalara böl.
  const weeks={};
  mo.forEach(o=>{const k=monKey(o[1]); (weeks[k]=weeks[k]||[]).push(o);});
  let html='';
  Object.keys(weeks).sort().forEach(wk=>{
    const wos=weeks[wk].sort((a,b)=>a[1]<b[1]?-1:1);
    const days=[...new Set(wos.map(o=>o[1]))].sort();
    // ürün matris
    const pm={}; // pidx -> {fiyat, days:{}, adet, tutar}
    wos.forEach(o=>o[2].forEach(it=>{
      const p=pm[it[0]]=pm[it[0]]||{fiyat:it[2],days:{},adet:0,tutar:0};
      p.days[o[1]]=(p.days[o[1]]||0)+it[1]; p.adet+=it[1]; p.tutar+=it[1]*it[2]; p.fiyat=it[2];
    }));
    const prods=Object.keys(pm).sort((a,b)=>pm[b].adet-pm[a].adet);
    const wkStart=wk, wkEnd=days[days.length-1];
    html+=`<div class="wk">📅 ${wkStart.slice(8,10)}.${wkStart.slice(5,7)} – ${wkEnd.slice(8,10)}.${wkEnd.slice(5,7)} HAFTASI</div>`;
    html+='<div class="grid-wrap"><table class="grid"><tr>'
      +'<th class="urun">ÜRÜN ADI</th><th>BİRİM FİYAT</th>'
      +days.map(d=>`<th>${dlabel(d)}</th>`).join('')
      +'<th class="tot">TOPLAM ADET</th><th class="tot">TOPLAM TUTAR</th></tr>';
    prods.forEach(pi=>{
      const p=pm[pi];
      html+=`<tr><td class="urun">${esc(PROD[pi])}</td><td class="bf">${TL(p.fiyat)}</td>`
        +days.map(d=>`<td>${p.days[d]?ADET(p.days[d]):''}</td>`).join('')
        +`<td class="tot">${ADET(p.adet)}</td><td class="tot n">${TL(p.tutar)}</td></tr>`;
    });
    // günlük toplam adet
    const dayTot={}; let wAdet=0,wTutar=0;
    days.forEach(d=>{dayTot[d]=0;});
    prods.forEach(pi=>{const p=pm[pi]; wAdet+=p.adet; wTutar+=p.tutar; days.forEach(d=>{if(p.days[d])dayTot[d]+=p.days[d];});});
    html+=`<tr class="gunluk"><td class="urun">GÜNLÜK TOPLAM ADET</td><td></td>`
      +days.map(d=>`<td>${ADET(dayTot[d])}</td>`).join('')
      +`<td>${ADET(wAdet)}</td><td></td></tr>`;
    html+=`<tr class="haftalik"><td class="urun">HAFTALIK TOPLAM (%1 KDV dahil)</td><td></td>`
      +`<td colspan="${days.length}"></td>`
      +`<td>${ADET(wAdet)}</td><td class="n">${TL(wTutar*1.01)}</td></tr>`;
    html+='</table></div>';
  });
  return html;
}

function render(){
  const y=selYil.value, m=+selAy.value, ff=selFirma.value;
  if(!y||!m){out.innerHTML='';return;}
  const mo=ORD.filter(o=>o[1].slice(0,4)===y && +o[1].slice(5,7)===m && (!ff||o[0]===ff));
  const fcs=[...new Set(mo.map(o=>o[0]))].sort((a,b)=>FNAME[a].localeCompare(FNAME[b],'tr'));
  let html='<div id="sheet">';
  html+=`<div class="r-head"><div><div class="r-logo">bardak's</div><div class="r-sub">B2B Günlük Sipariş Raporu</div></div>
    <div class="r-firma"><b>BARDAKS GIDA TİCARET LTD. ŞTİ.</b><br>Ortahisar / Trabzon</div></div>`;
  html+=`<h2>${AYLAR[m-1]} ${y}${ff?' · '+esc(FNAME[ff]):''}</h2>`;
  html+=`<div class="r-meta">Oluşturma: ${new Date().toLocaleDateString('tr-TR')} · ${mo.length} günlük sipariş${ff?'':' · '+fcs.length+' firma'}</div>`;
  if(!mo.length){ html+='<p style="color:#999">Bu ay için kayıt yok.</p></div>'; out.innerHTML=html; return; }
  // her firma için grid
  fcs.forEach(fc=>{
    html+=`<div class="firma-h">▸ ${esc(FNAME[fc])}</div>`;
    html+=gridFor(fc, mo.filter(o=>o[0]===fc));
  });
  // aylık ürün toplamları + firma özeti
  const pT={}; const fT={};
  mo.forEach(o=>{ fT[o[0]]=fT[o[0]]||{haric:0}; o[2].forEach(it=>{
    pT[it[0]]=pT[it[0]]||{adet:0,haric:0}; pT[it[0]].adet+=it[1]; pT[it[0]].haric+=it[1]*it[2]; fT[o[0]].haric+=it[1]*it[2];
  });});
  const pl=Object.keys(pT).sort((a,b)=>pT[b].adet-pT[a].adet);
  let gHaric=0; pl.forEach(p=>gHaric+=pT[p].haric);
  html+=`<div class="section-title">AYLIK ÜRÜN TOPLAMLARI</div><table class="sum"><tr><th>Ürün</th><th class="n">Adet</th><th class="n">Tutar (KDV dahil)</th></tr>`;
  pl.forEach(p=>{html+=`<tr><td>${esc(PROD[p])}</td><td class="n">${ADET(pT[p].adet)}</td><td class="n">${TL(pT[p].haric*1.01)}</td></tr>`;});
  html+='</table>';
  if(!ff){
    const fl=Object.keys(fT).sort((a,b)=>fT[b].haric-fT[a].haric);
    html+=`<div class="section-title">FİRMA ÖZETİ</div><table class="sum"><tr><th>Firma</th><th class="n">KDV Hariç</th><th class="n">KDV Dahil</th></tr>`;
    fl.forEach(f=>{html+=`<tr><td>${esc(FNAME[f])}</td><td class="n">${TL(fT[f].haric)}</td><td class="n">${TL(fT[f].haric*1.01)}</td></tr>`;});
    html+=`<tr class="tot-row"><td>GENEL TOPLAM</td><td class="n">${TL(gHaric)}</td><td class="n">${TL(gHaric*1.01)}</td></tr></table>`;
  }
  html+=`<div class="grand">GENEL TOPLAM (KDV dahil): ${TL(gHaric*1.01)}</div>`;
  html+=`<div class="r-foot">bardak's B2B · ${AYLAR[m-1]} ${y} · Sistemden otomatik üretildi · Resmi fatura yerine geçmez.</div></div>`;
  out.innerHTML=html;
  window._sum={ay:AYLAR[m-1],yil:y,firma:ff?FNAME[ff]:'',
    title:`Bardaks ${AYLAR[m-1]} ${y} Günlük Rapor`,
    fileName:`Bardaks_Gunluk_${y}_${String(m).padStart(2,'0')}${ff?'_'+FNAME[ff].replace(/[^\wçğıöşüÇĞİÖŞÜ]+/g,'_'):''}.pdf`,
    summaryText:`bardak's B2B — ${AYLAR[m-1]} ${y}${ff?' · '+FNAME[ff]:''}\nGünlük sipariş: ${mo.length}\nGenel Toplam (KDV dahil): ${TL(gHaric*1.01)}\n\nDetaylı günlük rapor PDF ektedir.`};
  if(LAST_URL){URL.revokeObjectURL(LAST_URL);LAST_URL=null;} LAST_FILE=null;
}

// ---- İlet ----
async function buildPdf(){
  const sheet=document.getElementById('sheet'); if(!sheet)return null; const s=window._sum;
  const blob=await html2pdf().set({margin:[6,6,8,6],filename:s.fileName,image:{type:'jpeg',quality:0.95},
    html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
    pagebreak:{mode:['css','legacy']}}).from(sheet).outputPdf('blob');
  LAST_FILE=new File([blob],s.fileName,{type:'application/pdf'});
  if(LAST_URL)URL.revokeObjectURL(LAST_URL); LAST_URL=URL.createObjectURL(LAST_FILE); return LAST_FILE;
}
async function ilet(){
  const s=window._sum; if(!s)return; const b=document.getElementById('btnIlet');
  b.disabled=true; const o=b.textContent; b.textContent='Hazırlanıyor…';
  let f=null; try{f=await buildPdf();}catch(e){console.warn(e);}
  b.disabled=false; b.textContent=o;
  if(f&&navigator.canShare&&navigator.canShare({files:[f]})){
    try{await navigator.share({files:[f],title:s.title,text:s.summaryText});return;}catch(e){if(e&&e.name==='AbortError')return;}
  }
  openShareMenu();
}
function openShareMenu(){const s=window._sum;
  document.getElementById('shWa').href='https://wa.me/?text='+encodeURIComponent(s.summaryText);
  document.getElementById('shMail').href='mailto:?subject='+encodeURIComponent(s.title)+'&body='+encodeURIComponent(s.summaryText);
  document.getElementById('shPdf').style.display=LAST_FILE?'flex':'none';
  document.getElementById('shareOv').classList.add('open');}
function closeShare(){document.getElementById('shareOv').classList.remove('open');}
function downloadPdf(){if(!LAST_URL||!window._sum)return;const a=document.createElement('a');a.href=LAST_URL;a.download=window._sum.fileName;a.click();}

// init
integrity(); buildSelectors(); render();
</script>
</body>
</html>
