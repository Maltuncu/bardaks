<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bardaks B2B — Firma Yönetim</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1115;--s:#181b22;--s2:#1f232c;--bd:#2a2f3a;--tx:#e8eaed;--dm:#9aa0ac;--ac:#d4a04f;--gn:#4caf7d;--rd:#e05c5c;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5}
.top{position:sticky;top:0;z-index:30;background:var(--s);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;flex-wrap:wrap;gap:8px}
.logo{font-size:17px;font-weight:800;color:var(--ac)} .logo span{color:var(--tx)}
.w{max-width:750px;margin:0 auto;padding:12px}
select,input{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:15px;font-family:inherit;width:100%}
select:focus,input:focus{outline:none;border-color:var(--ac)}
.b{background:var(--ac);color:#1a1208;border:none;font-weight:700;padding:10px 16px;border-radius:9px;cursor:pointer;font-size:14px;display:inline-block}
.b.s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)} .b.d{background:var(--rd);color:#fff} .b.g{background:var(--gn);color:#fff}
.b.full{width:100%;text-align:center}
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.warn{background:#3a2f1c;border:1px solid var(--ac);border-radius:var(--r);padding:12px;margin-bottom:10px;font-size:13px}
.warn b{color:var(--ac)}
label{display:block;font-size:12px;color:var(--dm);margin:8px 0 4px}
.tabs{display:flex;gap:0;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.tab{flex:1;padding:11px 6px;text-align:center;cursor:pointer;font-weight:700;font-size:12px;color:var(--dm);border-right:1px solid var(--bd)}
.tab:last-child{border-right:none} .tab.on{background:var(--ac);color:#1a1208}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0}
.cal-h{text-align:center;font-size:11px;color:var(--dm);font-weight:700;padding:5px 0}
.cal-d{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:5px;min-height:52px;cursor:pointer;transition:.15s}
.cal-d:hover{border-color:var(--ac)} .cal-d.empty{background:transparent;border:none;cursor:default}
.cal-d.today{border-color:var(--ac);border-width:2px} .cal-d.has{background:#2a2f1c;border-color:#4a6a2a}
.cal-d .dn{font-size:12px;font-weight:700} .cal-d .di{font-size:9px;color:var(--dm);margin-top:2px;line-height:1.2}
#mo{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:14px}
#mo.open{display:flex}
#mp{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);width:100%;max-width:520px;padding:16px;margin-top:30px;max-height:90vh;overflow-y:auto}
.mp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mp-h h3{font-size:16px} .mp-x{background:none;border:none;color:var(--dm);font-size:22px;cursor:pointer}
.row{display:flex;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.row .nm{flex:1;font-size:13px} .row .pr{font-size:11px;color:var(--dm)}
.row input[type=number]{width:60px;text-align:center;padding:7px}
.row .x{background:none;border:none;color:var(--rd);font-size:16px;cursor:pointer}
.tot{text-align:right;font-weight:700;padding:8px 0;font-size:15px;color:var(--ac)}
table.rpt{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
table.rpt th{background:var(--s2);text-align:left;padding:6px 8px;border:1px solid var(--bd);font-size:11px}
table.rpt td{padding:6px 8px;border:1px solid var(--bd)} table.rpt td.n{text-align:right}
table.rpt tr.t td{font-weight:700;background:var(--s2)}
.fl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.fl-hist{font-size:11px;color:var(--dm);padding:4px 0 8px;border-bottom:1px solid var(--bd)}
.fl-hist .zam{color:var(--rd)} .fl-hist .ind{color:var(--gn)}
.add-pnl{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:8px}
.add-pnl .ttl{font-weight:700;font-size:14px;margin-bottom:8px}
.lbox{max-width:340px;margin:60px auto;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:24px}
.lbox h2{font-size:18px;margin-bottom:12px}
</style>
</head>
<body>
<div class="top">
  <div class="logo">bardak's<span> B2B · Firma Yönetim</span></div>
  <div id="who" style="font-size:12px;color:var(--dm)"></div>
</div>
<div id="login" class="lbox" style="display:none">
  <h2>Giriş</h2>
  <label>E-posta</label><input type="email" id="em">
  <label>Şifre</label><input type="password" id="pw" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="b full" style="margin-top:14px" onclick="doLogin()">Giriş Yap</button>
  <div id="le" style="font-size:13px;margin-top:8px"></div>
</div>
<div id="app" class="w" style="display:none">
  <div class="card" style="padding:10px 14px">
    <select id="selF" onchange="onFirma()" style="font-weight:700;font-size:16px;border:none;background:transparent;color:var(--ac)"></select>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="setTab('ozet')">📊 Özet</div>
    <div class="tab" onclick="setTab('fiyat')">💰 Fiyat</div>
    <div class="tab" onclick="setTab('takvim')">📅 Sipariş</div>
    <div class="tab" onclick="setTab('tahsilat')">💵 Tahsilat</div>
    <div class="tab" onclick="setTab('cek')">🧾 Çek</div>
    <div class="tab" onclick="setTab('bakiye')">💳 Bakiye</div>
    <div class="tab" onclick="setTab('rapor')">📈 Rapor</div>
    <div class="tab" onclick="setTab('gecmis')">📋 Geçmiş</div>
  </div>
  <div id="priceWarn"></div>
  <div id="content"></div>
</div>
<div id="mo" onclick="if(event.target===this)closeMo()"><div id="mp"></div></div>
<script>
const SU='https://kfpgqqjmkutjzdmzkwaa.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmcGdxcWpta3V0anpkbXprd2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTk2NzcsImV4cCI6MjA5NTE5NTY3N30.Y1ov7w7eDIJfzHYFeWPuU3D8fVMj3uMhXHB18y7Nfbs';
const sb=supabase.createClient(SU,SK);
const AY=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const GN=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const TL=n=>(Math.round((+n||0)*100)/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';
const AD=n=>(+n||0).toLocaleString('tr-TR');
const PCT=n=>(n>=0?'+':'')+n.toFixed(1)+'%';
let F=[],FY=[],UR=[],curMo=new Date(),cF=null,cTab='ozet';
const urlF=new URLSearchParams(location.search).get('firma');

(async()=>{const{data:{session}}=await sb.auth.getSession();if(session)start();else document.getElementById('login').style.display='block';
sb.auth.onAuthStateChange((e,s)=>{if(s)start();});})();
async function doLogin(){const e=document.getElementById('em').value.trim(),p=document.getElementById('pw').value,l=document.getElementById('le');
l.textContent='Giriş…';const{error}=await sb.auth.signInWithPassword({email:e,password:p});if(error){l.style.color='var(--rd)';l.textContent=error.message;return;}start();}
async function start(){
  document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';
  const{data:{user}}=await sb.auth.getUser();document.getElementById('who').textContent=user?user.email:'';
  await reloadData();
  document.getElementById('selF').innerHTML=F.map(f=>'<option value="'+f.id+'">'+f.ad+'</option>').join('');
  if(urlF) document.getElementById('selF').value=urlF;
  cF=document.getElementById('selF').value;onFirma();
}
async function reloadData(){
  const[rf,ru,rp]=await Promise.all([
    sb.from('firmalar').select('id,ad').eq('is_deleted',false).eq('aktif',true).order('ad'),
    sb.from('urunler').select('*').eq('aktif',true),
    sb.from('aktif_firma_fiyatlari').select('*')
  ]);
  F=rf.data||[];UR=ru.data||[];FY=rp.data||[];
}
function onFirma(){cF=document.getElementById('selF').value;render();}
function setTab(t){cTab=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['ozet','fiyat','takvim','tahsilat','cek','bakiye','rapor','gecmis'][i]===t));render();}
function render(){var pw=document.getElementById('priceWarn');if(pw&&cTab!=='fiyat')pw.innerHTML='';
  if(cTab==='ozet')renderOzet();else if(cTab==='takvim')renderTakvim();else if(cTab==='rapor')renderRapor();else if(cTab==='fiyat')renderFiyat();else if(cTab==='gecmis')renderGecmis();
  else if(cTab==='tahsilat')renderTahsilat();else if(cTab==='cek')renderCek();else if(cTab==='bakiye')renderBakiye();}
// ═══ HELPER (MVP) ═══
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function trd(d){if(!d)return '';var x=new Date(d);return isNaN(x)?String(d):x.toLocaleDateString('tr-TR');}
function tdy(){return new Date().toISOString().slice(0,10);}
function fval(id){var e=document.getElementById(id);return e?String(e.value).trim():'';}
var BTN='background:var(--ac);color:#1a1208;border:none;border-radius:8px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:12px';
var BTS='background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:12px';
var BTD='background:var(--rd);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:12px';
var CEKD={beklemede:'Beklemede',tahsil_edildi:'Tahsil Edildi',karsiliksiz:'Karşılıksız',iptal:'İptal'};
async function fmEnsureHesaplar(){ if(window._fmHesaplar) return; var r=await sb.from('hesap_bakiye').select('*'); window._fmHesaplar=(r.data||[]).filter(function(h){return h.aktif!==false && h.is_deleted!==true;}); }
function fmHesapTip(tip){return {nakit:'kasa',havale:'banka',kredi_karti:'pos',cek:'banka'}[tip]||'banka';}
function fmHesapOpts(tip){var t=fmHesapTip(tip);var list=(window._fmHesaplar||[]).filter(function(h){return String(h.tip||'').toLowerCase()===t;});
  if(!list.length)return '<option value="">Bu tip için aktif '+t+' hesabı yok</option>';
  return '<option value="">Hesap seç</option>'+list.map(function(h){return '<option value="'+h.id+'">'+esc(h.ad)+' ('+esc(h.tip)+')</option>';}).join('');}
function fmHesapOptsAll(){var list=(window._fmHesaplar||[]);if(!list.length)return '<option value="">Aktif hesap yok</option>';
  return '<option value="">Hesap seç</option>'+list.map(function(h){return '<option value="'+h.id+'">'+esc(h.ad)+' ('+esc(h.tip)+')</option>';}).join('');}
function fmOpenMo(html){document.getElementById('mp').innerHTML=html;document.getElementById('mo').classList.add('open');}

// ═══ 📊 ÖZET ═══
async function renderOzet(){
  var c=document.getElementById('content');c.innerHTML='<div class="card">Yükleniyor…</div>';var fid=cF;
  var res=await Promise.all([
    sb.from('cari_ozet').select('toplam_fatura,toplam_odenen,kalan_bakiye').eq('firma_id',fid),
    sb.from('siparisler').select('tarih,toplam_kdv_dahil,durum').eq('firma_id',fid).eq('is_deleted',false).order('tarih',{ascending:false}).limit(1),
    sb.from('tahsilatlar').select('tarih,tutar,odeme_tipi').eq('firma_id',fid).eq('is_deleted',false).order('tarih',{ascending:false}).limit(1),
    sb.from('tahsilatlar').select('id').eq('firma_id',fid).eq('odeme_tipi','cek').eq('cek_durumu','beklemede').eq('is_deleted',false)
  ]);
  var cari=(res[0].data&&res[0].data[0])||{},sonSip=res[1].data&&res[1].data[0],sonTah=res[2].data&&res[2].data[0],bekCek=(res[3].data||[]).length;
  var katalog=FY.filter(function(p){return p.firma_id===fid;}),katSay=katalog.length;
  var fiyatli={};katalog.forEach(function(p){fiyatli[p.urun_id]=1;});
  var satisUr=UR.filter(function(u){return u.satis_urunu!==false && !u.is_deleted;});
  var fiyatEksik=satisUr.filter(function(u){return !fiyatli[u.id];}).length;
  var maliyetEksik=satisUr.filter(function(u){return !Number(u.birim_maliyet);}).length;
  var kalan=Number(cari.kalan_bakiye||0);
  var h='<div class="card"><div style="font-size:12px;color:var(--dm)">Açık Bakiye</div><div style="font-size:26px;font-weight:800;color:var('+(kalan>0?'--rd':'--ok,--ac')+')">'+TL(kalan)+'</div>'
    +'<div style="font-size:12px;color:var(--dm);margin-top:4px">Fatura: '+TL(cari.toplam_fatura||0)+' · Ödenen: '+TL(cari.toplam_odenen||0)+'</div></div>';
  h+='<div class="card"><b>Kısa Durum</b><table class="rpt">'
    +'<tr><td>Son Sipariş</td><td class="n">'+(sonSip?trd(sonSip.tarih)+' · '+TL(sonSip.toplam_kdv_dahil)+' · '+esc(sonSip.durum||''):'—')+'</td></tr>'
    +'<tr><td>Son Tahsilat</td><td class="n">'+(sonTah?trd(sonTah.tarih)+' · '+TL(sonTah.tutar)+' · '+esc(sonTah.odeme_tipi||''):'—')+'</td></tr>'
    +'<tr><td>Bekleyen Çek</td><td class="n">'+bekCek+' adet</td></tr>'
    +'<tr><td>Aktif Katalog Ürünü</td><td class="n">'+katSay+'</td></tr>'
    +'</table></div>';
  if(fiyatEksik>0||maliyetEksik>0){
    h+='<div class="card" style="border-color:var(--rd)"><b style="color:var(--rd)">⚠️ Uyarılar</b><table class="rpt">';
    if(fiyatEksik>0)h+='<tr><td>Fiyatı tanımsız satış ürünü</td><td class="n">'+fiyatEksik+'</td></tr>';
    if(maliyetEksik>0)h+='<tr><td>Maliyeti eksik ürün (kâr şişebilir)</td><td class="n">'+maliyetEksik+'</td></tr>';
    h+='</table></div>';
  }
  c.innerHTML=h;
}

// ═══ 💳 BAKİYE / CARİ ═══
async function renderBakiye(){
  var c=document.getElementById('content');c.innerHTML='<div class="card">Yükleniyor…</div>';
  var res=await Promise.all([
    sb.from('cari_ozet').select('toplam_fatura,toplam_odenen,kalan_bakiye').eq('firma_id',cF),
    sb.from('gecmis_aylik_ozet').select('kalan_bakiye').eq('firma_id',cF)
  ]);
  var x=(res[0].data&&res[0].data[0])||{};
  var gecmis=(res[1].data||[]).reduce(function(s,r){return s+Number(r.kalan_bakiye||0);},0);
  var donem=Number(x.kalan_bakiye||0);
  var h='<div class="card"><b>AÇIK BAKİYE / CARİ</b><table class="rpt">'
    +'<tr><td>Toplam Fatura (KDV dahil)</td><td class="n">'+TL(x.toplam_fatura||0)+'</td></tr>'
    +'<tr><td>− Toplam Ödenen (brüt tahsilat)</td><td class="n">'+TL(x.toplam_odenen||0)+'</td></tr>'
    +'<tr class="t"><td>= Dönem Kalan Bakiye</td><td class="n">'+TL(donem)+'</td></tr>'
    +'<tr><td>+ Geçmiş Aylık Bakiye</td><td class="n">'+TL(gecmis)+'</td></tr>'
    +'<tr class="t"><td>= TOPLAM AÇIK</td><td class="n" style="color:var(--rd)">'+TL(donem+gecmis)+'</td></tr>'
    +'</table><div style="font-size:11px;color:var(--dm);margin-top:6px">Karşılıksız/iptal çek ödeme sayılmaz; cari otomatik geri açılır.</div></div>';
  c.innerHTML=h;
}

// ═══ 💵 TAHSİLATLAR ═══
async function renderTahsilat(){
  var c=document.getElementById('content');c.innerHTML='<div class="card">Yükleniyor…</div>';
  var r=await sb.from('tahsilatlar').select('id,tarih,tutar,odeme_tipi,net_tahsil,cek_durumu').eq('firma_id',cF).eq('is_deleted',false).order('tarih',{ascending:false}).limit(50);
  if(r.error){c.innerHTML='<div class="card" style="color:var(--rd)">Okunamadı: '+esc(r.error.message)+'</div>';return;}
  var data=r.data||[];
  var h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b>TAHSİLATLAR</b><button style="'+BTN+'" onclick="fmOpenTahsilat()">+ Yeni Tahsilat</button></div></div>';
  if(!data.length){h+='<div class="card">Tahsilat yok</div>';}
  else{h+='<div class="card"><table class="rpt"><tr><th>Tarih</th><th>Tip</th><th class="n">Tutar</th><th class="n">Net</th><th></th></tr>';
    h+=data.map(function(t){
      var aks=t.odeme_tipi==='cek'?'<span style="font-size:11px;color:var(--dm)">çek → Çek sekmesi</span>':'<button style="'+BTD+'" onclick="fmIptalTahsilat(\''+t.id+'\')">İptal</button>';
      return '<tr><td>'+trd(t.tarih)+'</td><td>'+esc(t.odeme_tipi||'')+(t.odeme_tipi==='cek'?' ('+esc(CEKD[t.cek_durumu]||t.cek_durumu||'')+')':'')+'</td><td class="n">'+TL(t.tutar)+'</td><td class="n">'+TL(t.net_tahsil||t.tutar)+'</td><td class="n">'+aks+'</td></tr>';
    }).join('');h+='</table></div>';}
  c.innerHTML=h;
}
async function fmOpenTahsilat(){
  await fmEnsureHesaplar();var fad=(F.find(function(f){return f.id===cF;})||{}).ad||'';
  fmOpenMo('<h3 style="margin:0 0 8px">💵 Tahsilat · '+esc(fad)+'</h3>'
    +'<label>Tarih</label><input type="date" id="tmTarih" value="'+tdy()+'">'
    +'<label>Brüt Tutar (₺)</label><input type="number" id="tmTutar">'
    +'<label>Ödeme Tipi</label><select id="tmTip" onchange="fmTahTip()"><option value="havale">Havale/EFT</option><option value="nakit">Nakit</option><option value="kredi_karti">Kredi Kartı/POS</option><option value="cek">Çek</option></select>'
    +'<div id="tmHesapW"><label>Hesap</label><select id="tmHesap">'+fmHesapOpts('havale')+'</select></div>'
    +'<label>Valör / Hesaba Geçiş Tarihi</label><input type="date" id="tmValor" value="'+tdy()+'">'
    +'<div id="tmKart" style="display:none"><label>POS Komisyon (%)</label><input type="number" id="tmKom" step="0.1"></div>'
    +'<div id="tmCek" style="display:none"><label>Çek No</label><input id="tmCekNo"><label>Çek Vade</label><input type="date" id="tmVade"></div>'
    +'<label>Dekont / Ref</label><input id="tmDekont"><label>Açıklama</label><input id="tmAcik">'
    +'<div style="margin-top:10px"><button style="'+BTN+'" id="tmBtn" onclick="fmKaydetTahsilat()">Kaydet</button> <button style="'+BTS+'" onclick="closeMo()">Vazgeç</button></div>');
}
function fmTahTip(){var tip=document.getElementById('tmTip').value;
  document.getElementById('tmKart').style.display=tip==='kredi_karti'?'block':'none';
  document.getElementById('tmCek').style.display=tip==='cek'?'block':'none';
  document.getElementById('tmHesapW').style.display=tip==='cek'?'none':'block';
  var h=document.getElementById('tmHesap');if(h)h.innerHTML=fmHesapOpts(tip);}
async function fmKaydetTahsilat(){
  var tutar=Number(fval('tmTutar'));if(!(tutar>0)){alert('Geçerli brüt tutar gir');return;}
  var tip=document.getElementById('tmTip').value;
  if(tip==='cek'){if(!fval('tmCekNo')){alert('Çek no zorunlu');return;}if(!fval('tmVade')){alert('Çek vade tarihi zorunlu');return;}}
  else if(!fval('tmHesap')){alert('Ödeme tipine uygun hesap seç');return;}
  var b=document.getElementById('tmBtn');if(b){b.disabled=true;b.textContent='Kaydediliyor…';}
  var args={p_firma:cF,p_tarih:fval('tmTarih')||tdy(),p_tutar:tutar,p_odeme_tipi:tip,
    p_account_id:(tip==='cek'?null:(fval('tmHesap')||null)),p_komisyon_orani:Number(fval('tmKom'))||0,
    p_cek_no:fval('tmCekNo')||null,p_cek_vade:fval('tmVade')||null,p_cek_durumu:null,

    h+='<div class="fl-row"><div style="flex:1"><div style="font-weight:600">'+p.urun_ad+'</div>'

async function savePrice(fufId,urunId,eskiFiy){
  const yeni=+(parseFloat(document.getElementById('epFiy').value)).toFixed(2); // KDV hariç — doğrudan saklanır
  if(!(yeni>0)){alert('Geçerli satış fiyatı gir (KDV hariç, 0/negatif olamaz)');return;}
  const tar=document.getElementById('epTar').value||new Date().toISOString().slice(0,10);
  // Versiyonlama: eski aktif kaydı kapat (gecerlilik_bitis), yeni satır insert et (hard-delete yok)
  const e1=await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:tar}).eq('id',fufId);
  if(e1.error){alert(e1.error.message);return;}
  const e2=await sb.from('firma_urun_fiyat').insert({firma_id:cF,urun_id:urunId,birim_fiyat_kdv_haric:yeni,gecerlilik_baslangic:tar});
  if(e2.error){alert(e2.error.message);return;}
  if(Math.abs(yeni-eskiFiy)>0.001){
    await sb.from('firma_urun_log').insert({firma_id:cF,urun_id:urunId,islem:'fiyat_degisti',eski_fiyat:+Number(eskiFiy).toFixed(2),yeni_fiyat:yeni,yapan:'Firma Yönetim'}).catch(()=>{});
  }
  // Maliyet değiştiyse ürün maliyetini güncelle (urunler trigger'ları: trg_urun_maliyet_gecmis + audit_urunler tetiklenir; snapshot YALNIZ yeni siparişlere yansır)
  const mEl=document.getElementById('epMaliyet');
  if(mEl){
    const yeniMaliyet=parseFloat(mEl.value);
    const u=UR.find(x=>x.id===urunId)||{};const eskiMaliyet=Number(u.birim_maliyet||0);
    if(!isNaN(yeniMaliyet)&&yeniMaliyet>=0&&Math.abs(yeniMaliyet-eskiMaliyet)>0.001){
      const em=await sb.from('urunler').update({birim_maliyet:yeniMaliyet}).eq('id',urunId);
      if(em.error){alert('Maliyet güncellenemedi: '+em.error.message);return;}
    }
  }
  await reloadData();closeMo();renderFiyat();
}

  const e1=await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:dun}).eq('id',fufId);

}

  if(!(fiy>0)){alert('Geçerli satış fiyatı gir (KDV hariç, 0/negatif olamaz)');return;}
  const bas=document.getElementById('apBas').value||new Date().toISOString().slice(0,10);
  const{error}=await sb.from('firma_urun_fiyat').insert({firma_id:cF,urun_id:uid,birim_fiyat_kdv_haric:fiy,gecerlilik_baslangic:bas});
  if(error){alert(error.message);return;}
  await sb.from('firma_urun_log').insert({firma_id:cF,urun_id:uid,islem:'eklendi',eski_fiyat:null,yeni_fiyat:fiy,yapan:'Firma Yönetim'}).catch(()=>{});
  await reloadData();renderFiyat();
}

// ═══ 📋 GEÇMİŞ ═══
async function renderGecmis(){
  const c=document.getElementById('content');
  const r=await sb.from('siparisler').select('id,tarih,siparis_no,durum,fatura_durumu,toplam_kdv_dahil').eq('firma_id',cF).eq('is_deleted',false).order('tarih',{ascending:false}).limit(200);
  const sips=r.data||[];
  let h='<div class="card"><b>Sipariş Geçmişi ('+sips.length+')</b>';
  if(!sips.length) h+='<div style="color:var(--dm);margin-top:8px">Sipariş yok.</div>';
  else{h+='<table class="rpt"><tr><th>Tarih</th><th>No</th><th>Durum</th><th class="n">Tutar</th><th></th></tr>';
    sips.forEach(s=>{const dc=s.durum==='iptal'?'color:var(--rd)':s.durum==='tamamlandi'?'color:var(--gn)':'';
      h+='<tr><td>'+s.tarih+'</td><td style="font-size:11px">'+(s.siparis_no||'—')+'</td><td style="'+dc+'">'+s.durum+'</td><td class="n">'+TL(s.toplam_kdv_dahil)+'</td>'
        +'<td><button class="b s" style="padding:3px 8px;font-size:11px" onclick="openDay(\''+s.tarih+'\')">Aç</button></td></tr>';});
    h+='</table>';}
  h+='</div>';c.innerHTML=h;
}

// ═══ Fiyat uyarısı ═══
async function checkPW(y,m){const pw=document.getElementById('priceWarn');
  try{const r=await sb.from('firma_urun_log').select('*').eq('firma_id',cF).order('olusturma',{ascending:false}).limit(10);
  const logs=(r.data||[]).filter(l=>{const d=new Date(l.olusturma);return d.getFullYear()===y&&d.getMonth()+1===m;});
  if(logs.length){let h='<div class="warn"><b>⚠️ Bu ay fiyat güncellendi:</b>';
    logs.forEach(l=>{const t=new Date(l.olusturma).toLocaleDateString('tr-TR');
      const eski=+l.eski_fiyat,yeni=+l.yeni_fiyat,fark=eski>0?((yeni-eski)/eski*100):0;
      const u=UR.find(x=>x.id===l.urun_id);const ad=u?u.ad:'Ürün';
      h+='<div style="margin-top:4px">'+t+' — '+ad+': '+TL(eski)+' → '+TL(yeni)+' <span style="color:'+(fark>0?'var(--rd)':'var(--gn)')+'">'+PCT(fark)+'</span></div>';});
  h+='</div>';pw.innerHTML=h;}else pw.innerHTML='';}catch(e){pw.innerHTML='';}
}

// ═══ GÜN DETAY ═══
async function openDay(tarih){
  const r=await sb.from('siparisler').select('*').eq('firma_id',cF).eq('tarih',tarih).eq('is_deleted',false);const sips=r.data||[];
  const d=new Date(tarih+'T00:00:00');const gl=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'][d.getDay()];
  const fname=(F.find(f=>f.id===cF)||{}).ad||'?';
  let h='<div class="mp-h"><h3>📅 '+tarih.slice(8,10)+' '+AY[+tarih.slice(5,7)-1]+' '+gl+'</h3><button class="mp-x" onclick="closeMo()">✕</button></div>';
  h+='<div style="color:var(--ac);font-weight:700;margin-bottom:10px">'+fname+'</div>';
  if(sips.length){for(const s of sips){
    const rk=await sb.from('siparis_kalemleri').select('*').eq('siparis_id',s.id).eq('is_deleted',false);const kl=rk.data||[];
    h+='<div class="card"><div style="display:flex;justify-content:space-between"><b>'+(s.siparis_no||'—')+'</b><span style="font-size:12px;color:var(--dm)">'+TL(s.toplam_kdv_dahil)+'</span></div>';
    if(kl.length){h+='<table class="rpt"><tr><th>Ürün</th><th class="n">Adet</th><th class="n">Fiyat</th><th class="n">Toplam</th></tr>';
      kl.forEach(k=>{h+='<tr><td>'+k.urun_ad+'</td><td class="n">'+k.adet+'</td><td class="n">'+TL(k.birim_fiyat_kdv_haric*(1+(k.kdv_orani||1)/100))+'</td><td class="n">'+TL(k.toplam_kdv_dahil)+'</td></tr>';});
      h+='</table>';}
    h+='</div>';}}
  else h+='<div style="padding:16px;text-align:center;color:var(--dm)">Bu gün sipariş yok.</div>';
  h+='<button class="b full" style="margin-top:10px" onclick="closeMo();newSip(\''+tarih+'\')">+ Yeni sipariş ekle</button>';
  document.getElementById('mp').innerHTML=h;document.getElementById('mo').classList.add('open');
}
function closeMo(){document.getElementById('mo').classList.remove('open');}

// ═══ YENİ SİPARİŞ (firma ürün listesi — prompt YOK) ═══
function newSip(tarih){
  const fl=FY.filter(p=>p.firma_id===cF);
  window._ns=fl.map(p=>({uid:p.urun_id,ad:p.urun_ad,f:p.birim_fiyat_kdv_haric,k:p.kdv_orani,a:0}));
  let h='<div class="mp-h"><h3>+ Sipariş · '+tarih+'</h3><button class="mp-x" onclick="closeMo()">✕</button></div>';
  h+='<div id="nR"></div><div id="nAddArea"></div><div id="nT" class="tot"></div>';
  h+='<button class="b full" style="margin-top:8px" onclick="saveN(\''+tarih+'\')">Kaydet</button>';
  document.getElementById('mp').innerHTML=h;document.getElementById('mo').classList.add('open');rNR();
}
function rNR(){
  const c=document.getElementById('nR');if(!c)return;
  c.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label style="margin:0;font-weight:700">Ürünler</label><span style="font-size:11px;color:var(--dm)">Yalnız firma kataloğu</span></div>'
    +window._ns.map((s,i)=>'<div class="row"><div class="nm">'+s.ad+'<div class="pr">'+TL(s.f)+'/br (KDV hariç)</div></div><input type="number" min="0" value="'+(s.a||0)+'" oninput="window._ns['+i+'].a=+this.value||0;cNT()"><button class="x" onclick="window._ns.splice('+i+',1);rNR()">✕</button></div>').join('');
  cNT();
}
function cNT(){const t=window._ns.reduce((s,r)=>s+r.a*r.f*(1+r.k/100),0);const e=document.getElementById('nT');if(e)e.textContent='Toplam: '+TL(t);}

// Listede olmayan ürün ekleme (prompt yerine güzel panel)
function showNAdd(){
  const area=document.getElementById('nAddArea');if(!area)return;
  const allUr=UR.filter(u=>u.aktif!==false&&!window._ns.some(n=>n.uid===u.id));
  const opts=allUr.map(u=>'<option value="'+u.id+'" data-ad="'+u.ad+'" data-fiy="'+(u.varsayilan_fiyat||0)+'" data-kdv="'+(u.kdv_orani||1)+'">'+u.ad+'</option>').join('');
  area.innerHTML='<div class="add-pnl"><div class="ttl">➕ Ürün Ekle</div>'
    +'<label>Katalogdan</label><select id="naSel" onchange="naFill()"><option value="">— Seç —</option>'+opts+'</select>'
    +'<label>veya serbest gir</label><input id="naAd" placeholder="Ürün adı">'
    +'<div style="display:flex;gap:8px"><div style="flex:1"><label>Satış Fiyatı (KDV hariç)</label><input type="number" step="0.01" id="naFiy"></div>'
    +'<div style="width:70px"><label>KDV %</label><input type="number" id="naKdv" value="1"></div>'
    +'<div style="width:70px"><label>Adet</label><input type="number" id="naAdet" value="1" min="1"></div></div>'
    +'<div style="display:flex;gap:8px;margin-top:8px"><button class="b" style="flex:1" onclick="doNAdd()">Ekle</button><button class="b s" style="flex:1" onclick="document.getElementById(\'nAddArea\').innerHTML=\'\'">İptal</button></div></div>';
}
function naFill(){const s=document.getElementById('naSel');if(!s||!s.value)return;const o=s.options[s.selectedIndex];
  const kdv=parseFloat(o.getAttribute('data-kdv'))||1;const haric=parseFloat(o.getAttribute('data-fiy'))||0;
  document.getElementById('naAd').value=o.getAttribute('data-ad')||'';document.getElementById('naFiy').value=haric?(+haric.toFixed(2)):'';document.getElementById('naKdv').value=kdv;}
function doNAdd(){
  const sel=document.getElementById('naSel');const uid=sel&&sel.value?sel.value:null;
  if(!uid){alert('Yalnızca firma kataloğundaki ürünler siparişe eklenebilir');return;}
  const ad=(document.getElementById('naAd').value||'').trim();
  const f=+(parseFloat(document.getElementById('naFiy').value)||0).toFixed(2); // KDV hariç — doğrudan saklanır
  const k=parseFloat(document.getElementById('naKdv').value)||1;
  const a=parseInt(document.getElementById('naAdet').value)||1;
  if(!ad){alert('Ürün adı gir');return;}if(f<=0){alert('Satış fiyatı gir (KDV hariç)');return;}
  if(window._ns.some(s=>s.ad===ad)){alert(ad+' zaten listede');return;}
  window._ns.push({uid,ad,f,k,a});
  document.getElementById('nAddArea').innerHTML='';rNR();
}

async function saveN(tarih){const dolu=window._ns.filter(s=>s.a>0);if(!dolu.length){alert('En az bir ürüne adet gir');return;}
  if(dolu.some(s=>!s.uid)){alert('Yalnızca firma kataloğundaki ürünler siparişe eklenebilir (katalog dışı kalem engellendi)');return;}
  const{data:sip,error}=await sb.from('siparisler').insert({firma_id:cF,tarih,durum:'tamamlandi',fatura_durumu:'bekliyor',created_by:'Firma Yönetim'}).select().single();
  if(error){alert(error.message);return;}
  await sb.from('siparis_kalemleri').insert(dolu.map(s=>({siparis_id:sip.id,urun_id:s.uid,urun_ad:s.ad,adet:s.a,birim_fiyat_kdv_haric:s.f,kdv_orani:s.k})));
  closeMo();render();
}
</script>
</body>
