<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bardaks B2B — Firma Yönetim</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4F6F9">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bardaks">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F4F6F9;--s:#FFFFFF;--s2:#F8FAFC;--bd:#E2E8F0;--tx:#1A2B40;--dm:#64748B;--ac:#1E5BA8;--gn:#1F8B5F;--rd:#C0392B;--r:10px;--sh:0 1px 2px rgba(16,32,56,.06)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.top{position:sticky;top:0;z-index:30;background:var(--s);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;flex-wrap:wrap;gap:8px}
.logo{font-size:17px;font-weight:800;color:var(--ac)} .logo span{color:var(--tx)}
.w{max-width:750px;margin:0 auto;padding:12px}
select,input{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:15px;font-family:inherit;width:100%}
select:focus,input:focus{outline:none;border-color:var(--ac)}
.b{background:var(--ac);color:#fff;border:none;font-weight:700;padding:10px 16px;border-radius:9px;cursor:pointer;font-size:14px;display:inline-block}
.b.s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)} .b.d{background:var(--rd);color:#fff} .b.g{background:var(--gn);color:#fff}
.b.full{width:100%;text-align:center}
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
/* UI-REFINEMENT-V1 */
.crumb{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--dm);margin:2px 2px 10px}
.crumb a{color:var(--dm);text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:7px;transition:.15s}
.crumb a:hover{color:var(--tx);background:var(--s2)}
.crumb .sep{opacity:.5} .crumb .cur{color:var(--tx);font-weight:600}
.hero{background:linear-gradient(180deg,var(--s2),var(--s));border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.28);position:relative;overflow:hidden}
.hero.s-rd{border-color:#F0C8C2;background:linear-gradient(180deg,#FBE9E7,var(--s))}
.hero.s-gn{border-color:#BFE3D0;background:linear-gradient(180deg,#E6F4EE,var(--s))}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hero-lbl{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--dm);font-weight:700}
.hero-score{font-size:13px;color:var(--dm)} .hero-score b{font-size:18px}
.badge{display:inline-flex;align-items:center;gap:7px;font-size:20px;font-weight:800;margin-top:10px;padding:6px 14px;border-radius:999px;line-height:1}
.badge.rd{background:rgba(227,106,106,.16);color:var(--rd)} .badge.gn{background:rgba(86,185,138,.16);color:var(--gn)} .badge.nt{background:var(--s2);color:var(--dm)}.badge.wn{background:rgba(230,170,30,.18);color:#9a6b00}
.hero-reason{font-size:14px;color:var(--tx);margin-top:12px;line-height:1.5}
.hero-act{display:block;width:100%;text-align:center;margin-top:14px;padding:13px;border-radius:10px;font-weight:800;font-size:15px;border:none;cursor:pointer}
.hero-act.call{background:var(--rd);color:#fff;box-shadow:0 2px 10px rgba(227,106,106,.35)}
.hero-act.calm{background:var(--s2);color:var(--gn);border:1px solid var(--bd)}.hero-act-mark{display:block;width:100%;margin-top:8px;padding:10px;border-radius:9px;background:var(--s2);color:var(--gn);border:1px solid var(--bd);font-weight:700;font-size:13px;cursor:pointer}
.hero-meta{margin-top:14px;border-top:1px solid var(--bd);padding-top:10px}
.l2{border-left:3px solid var(--ac)} .l2 b{color:var(--ac)}
.lvl4{opacity:.92}
.warn{background:#FBF1DD;border:1px solid var(--ac);border-radius:var(--r);padding:12px;margin-bottom:10px;font-size:13px}
.warn b{color:var(--ac)}
label{display:block;font-size:12px;color:var(--dm);margin:8px 0 4px}
.tabs{display:flex;gap:0;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.tab{flex:1;padding:11px 6px;text-align:center;cursor:pointer;font-weight:700;font-size:12px;color:var(--dm);border-right:1px solid var(--bd)}
.tab:last-child{border-right:none} .tab.on{background:var(--ac);color:#fff}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0}
.cal-h{text-align:center;font-size:11px;color:var(--dm);font-weight:700;padding:5px 0}
.cal-d{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:5px;min-height:60px;cursor:pointer;transition:.15s}
.cal-d:hover{border-color:var(--ac)} .cal-d.empty{background:transparent;border:none;cursor:default}
.cal-d.today{border-color:var(--ac);border-width:2px} .cal-d.has{background:#E8F0FB;border-color:#1E5BA8}
.cal-d .dn{font-size:12px;font-weight:700} .cal-d .di{font-size:9px;color:var(--dm);margin-top:2px;line-height:1.2}
#mo{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:14px}
#mo.open{display:flex}
#mp{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);width:100%;max-width:520px;padding:16px;margin-top:30px;max-height:90vh;overflow-y:auto}
.mp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mp-h h3{font-size:16px} .mp-x{background:none;border:none;color:var(--dm);font-size:22px;cursor:pointer}
.row{display:flex;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.row .nm{flex:1;font-size:13px} .row .pr{font-size:11px;color:var(--dm)}
.row input[type=number]{width:60px;text-align:center;padding:7px}
.row .x{background:none;border:none;color:var(--rd);font-size:16px;cursor:pointer}
.tot{text-align:right;font-weight:700;padding:8px 0;font-size:15px;color:var(--ac)}
table.rpt{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
table.rpt th{background:var(--s2);text-align:left;padding:6px 8px;border:1px solid var(--bd);font-size:11px}
table.rpt td{padding:6px 8px;border:1px solid var(--bd)} table.rpt td.n{text-align:right}
table.rpt tr.t td{font-weight:700;background:var(--s2)}
.fl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.fl-hist{font-size:11px;color:var(--dm);padding:4px 0 8px;border-bottom:1px solid var(--bd)}
.fl-hist .zam{color:var(--rd)} .fl-hist .ind{color:var(--gn)}
.add-pnl{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:8px}
.add-pnl .ttl{font-weight:700;font-size:14px;margin-bottom:8px}
.lbox{max-width:340px;margin:60px auto;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:24px}
.lbox h2{font-size:18px;margin-bottom:12px}
@media print{
  body.print-rapor .top,body.print-rapor .tabs,body.print-rapor #priceWarn,body.print-rapor #login{display:none!important}
  body.print-rapor #content>.card:first-child{display:none!important} /* donem secim bari + butonlar */
  body.print-rapor #mo{display:none!important}
  body.print-rapor{background:#fff;color:#000}
  body.print-rapor .card{background:#fff;border:1px solid #ccc;box-shadow:none;break-inside:avoid}
  body.print-rapor table.rpt th{background:#eee;color:#000}
  body.print-rapor table.rpt td,body.print-rapor table.rpt th{border:1px solid #999;color:#000}
  body.print-rapor .b,body.print-rapor button{display:none!important}
  /* === PORTFÖY YAZDIR === */
  body.print-portfoy .top,body.print-portfoy .tabs,body.print-portfoy #priceWarn,body.print-portfoy #login,body.print-portfoy #mo{display:none!important}
  body.print-portfoy #content>.card{display:none!important}
  body.print-portfoy #portfoyPrint{display:block!important}
  body.print-portfoy{background:#fff;color:#000}
  body.print-portfoy .card{background:#fff;border:1px solid #ccc;box-shadow:none;break-inside:avoid}
  body.print-portfoy table.rpt th{background:#eee;color:#000}
  body.print-portfoy table.rpt td,body.print-portfoy table.rpt th{border:1px solid #999;color:#000}
  body.print-portfoy .b,body.print-portfoy button{display:none!important}
}
#tk-ov{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column}
#tk-ov.open{display:flex}
.tk-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--s);border-bottom:1px solid var(--bd);flex-shrink:0}
.tk-bar b{font-size:16px;color:var(--ac)} .tk-x{background:none;border:none;color:var(--dm);font-size:22px;cursor:pointer;padding:4px 10px}
#tk-body{flex:1;overflow-y:auto;padding:14px;max-width:780px;margin:0 auto;width:100%}
.tk-foot{flex-shrink:0;display:flex;gap:8px;padding:12px 16px;background:var(--s);border-top:1px solid var(--bd);position:sticky;bottom:0}
.tk-foot .b{flex:1}
.tk-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.tk-prev-item{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.tk-img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--s2);flex-shrink:0}
.tk-ph{width:48px;height:48px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--dm);font-size:18px;flex-shrink:0}
@media print{
  body.print-teklif>*{display:none!important}
  body.print-teklif #tk-ov{display:block!important;position:static;background:#fff;color:#000}
  body.print-teklif #tk-ov .tk-bar,body.print-teklif #tk-ov .tk-foot{display:none!important}
  body.print-teklif #tk-body{max-width:none;overflow:visible;padding:0}
  body.print-teklif #tkSelArea{display:none!important}
  body.print-teklif #tkPrint{display:block!important;color:#000}
  body.print-teklif #tkPrint .card{background:#fff;border:1px solid #ccc;box-shadow:none;break-inside:avoid}
  body.print-teklif #tkPrint table.rpt th{background:#eee;color:#000}
  body.print-teklif #tkPrint table.rpt td,body.print-teklif #tkPrint table.rpt th{border:1px solid #999;color:#000}
}
</style>
</head>
<body>
<div class="top">
  <div class="logo">bardak's<span> B2B · Firma Yönetim</span></div>
  <div id="who" style="font-size:12px;color:var(--dm)"></div>
</div>
<div id="login" class="lbox" style="display:none">
  <h2>Giriş</h2>
  <label>E-posta</label><input type="email" id="em">
  <label>Şifre</label><input type="password" id="pw" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="b full" style="margin-top:14px" onclick="doLogin()">Giriş Yap</button>
  <div id="le" style="font-size:13px;margin-top:8px"></div>
</div>
<div id="app" class="w" style="display:none">
  <nav class="crumb"><a href="index.html">← Komuta Merkezi</a><span class="sep">/</span><span class="cur">Firma Dosyası</span></nav>
  <div class="card" style="padding:10px 14px">
    <select id="selF" onchange="onFirma()" style="font-weight:700;font-size:16px;border:none;background:transparent;color:var(--ac)"></select>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="setTab('ozet')">Firma 360</div>
    <div class="tab" onclick="setTab('fiyat')">Portföy</div>
    <div class="tab" onclick="setTab('takvim')">Sipariş</div>
    <div class="tab" onclick="setTab('tahsilat')">Tahsilat</div>
    <div class="tab" onclick="setTab('cek')">Çek</div>
    <div class="tab" onclick="setTab('bakiye')">Bakiye</div>
    <div class="tab" onclick="setTab('rapor')">Rapor</div>
    <div class="tab" onclick="setTab('gecmis')">Geçmiş</div>
  </div>
  <div id="priceWarn"></div>
  <div id="content"></div>
</div>
<div id="mo" onclick="if(event.target===this)closeMo()"><div id="mp"></div></div>
<div id="tk-ov"><div class="tk-bar"><b id="tk-title">📄 Teklif</b><button class="tk-x" onclick="closeTeklif()">✕</button></div><div id="tk-body"></div><div class="tk-foot" id="tk-foot"></div></div>
<script>
const SU='https://kfpgqqjmkutjzdmzkwaa.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmcGdxcWpta3V0anpkbXprd2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTk2NzcsImV4cCI6MjA5NTE5NTY3N30.Y1ov7w7eDIJfzHYFeWPuU3D8fVMj3uMhXHB18y7Nfbs';
const sb=supabase.createClient(SU,SK);
const AY=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const GN=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const TL=n=>(Math.round((+n||0)*100)/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';
const AD=n=>(+n||0).toLocaleString('tr-TR');
const PCT=n=>(n>=0?'+':'')+n.toFixed(1)+'%';
let F=[],FY=[],UR=[],curMo=new Date(),cF=null,cTab='ozet';
const urlF=new URLSearchParams(location.search).get('firma');

(async()=>{const{data:{session}}=await sb.auth.getSession();if(session)start();else document.getElementById('login').style.display='block';
sb.auth.onAuthStateChange((e,s)=>{if(s)start();});})();
async function doLogin(){const e=document.getElementById('em').value.trim(),p=document.getElementById('pw').value,l=document.getElementById('le');
l.textContent='Giriş…';const{error}=await sb.auth.signInWithPassword({email:e,password:p});if(error){l.style.color='var(--rd)';l.textContent=error.message;return;}start();}
async function start(){
  document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';
  const{data:{user}}=await sb.auth.getUser();document.getElementById('who').textContent=user?user.email:'';
  // [RM-1] aktif kullanıcı kimliği (görüşme kayıtlarının yazan/yazan_rol alanları için)
  if(user){ try{ const ku=await sb.from('kullanicilar').select('ad_soyad,rol').eq('auth_id',user.id).maybeSingle(); if(ku.data){ window.AKTIF_AD=ku.data.ad_soyad; window.AKTIF_ROL=ku.data.rol; } }catch(e){} }
  void 0;/*[RM-2] görüşme günlüğü hafifletildi*/ // tek-seferlik cihaz içe aktarımı (arka planda; orijinal anahtarlar silinmez)
  await reloadData();
  document.getElementById('selF').innerHTML=F.map(f=>'<option value="'+f.id+'">'+f.ad+'</option>').join('');
  if(urlF) document.getElementById('selF').value=urlF;
  cF=document.getElementById('selF').value;onFirma();
}
async function reloadData(){
  const[rf,ru,rp]=await Promise.all([
    sb.from('firmalar').select('id,ad,notlar').eq('is_deleted',false).eq('aktif',true).order('ad'),
    sb.from('urunler').select('*').eq('aktif',true),
    sb.from('aktif_firma_fiyatlari').select('*')
  ]);
  F=rf.data||[];UR=ru.data||[];FY=rp.data||[];
}
async function onFirma(){cF=document.getElementById('selF').value;
  try{const r=await sb.from('siparisler').select('tarih').eq('firma_id',cF).eq('is_deleted',false).neq('durum','iptal').order('tarih',{ascending:false}).limit(1);
    const s=r.data&&r.data[0]&&r.data[0].tarih;curMo=s?new Date(+s.slice(0,4),+s.slice(5,7)-1,1):new Date();
  }catch(e){curMo=new Date();}
  render();}
function setTab(t){cTab=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['ozet','fiyat','takvim','tahsilat','cek','bakiye','rapor','gecmis'][i]===t));render();}
function render(){var pw=document.getElementById('priceWarn');if(pw&&cTab!=='fiyat')pw.innerHTML='';
  if(cTab==='ozet')renderOzet();else if(cTab==='takvim')renderTakvim();else if(cTab==='rapor')renderRapor();else if(cTab==='fiyat')renderFiyat();else if(cTab==='gecmis')renderGecmis();
  else if(cTab==='tahsilat')renderTahsilat();else if(cTab==='cek')renderCek();else if(cTab==='bakiye')renderBakiye();}
// ═══ HELPER (MVP) ═══
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function trd(d){if(!d)return '';var x=new Date(d);return isNaN(x)?String(d):x.toLocaleDateString('tr-TR');}
function tdy(){return new Date().toISOString().slice(0,10);}
function fval(id){var e=document.getElementById(id);return e?String(e.value).trim():'';}
var BTN='background:var(--ac);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:12px';
var BTS='background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:12px';
var BTD='background:var(--rd);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:12px';
var CEKD={beklemede:'Beklemede',tahsil_edildi:'Tahsil Edildi',karsiliksiz:'Karşılıksız',iptal:'İptal'};
// ═══ 📝 FİRMA NOTU (firma hafızası — yalnız firmalar.notlar UPDATE) ═══
function openFirmaNot(){
  if(!cF){alert('Önce firma seç');return;}
  var fNot=(F.find(function(f){return f.id===cF;})||{}).notlar||'';
  fmOpenMo('<div class="mp-h"><h3>Firma Notu</h3><button class="mp-x" onclick="closeMo()">✕</button></div>'
    +'<div style="font-size:12px;color:var(--dm);margin-bottom:6px">Firma hakkında hatırlatmalar (serbest metin, satır satır).</div>'
    +'<textarea id="fnTxt" style="width:100%;min-height:160px;resize:vertical" placeholder="Örn:\nPatron Ahmet Bey\nÇarşamba teslim ister\nÇek ile çalışır">'+esc(fNot)+'</textarea>'
    +'<div style="margin-top:10px"><button class="b" id="fnBtn" onclick="saveFirmaNot()">Kaydet</button> <button class="b s" onclick="closeMo()">Vazgeç</button></div>');
}
async function saveFirmaNot(){
  var v=(document.getElementById('fnTxt').value||'').trim();
  var b=document.getElementById('fnBtn');if(b){b.disabled=true;b.textContent='Kaydediliyor…';}
  var r=await sb.from('firmalar').update({notlar:v}).eq('id',cF);
  if(r.error){if(b){b.disabled=false;b.textContent='Kaydet';}alert('Hata: '+r.error.message);return;}
  var f=F.find(function(x){return x.id===cF;});if(f)f.notlar=v; // yerel state senkron
  closeMo();renderOzet();
}
async function fmEnsureHesaplar(){ if(window._fmHesaplar) return; var r=await sb.from('hesap_bakiye').select('*'); window._fmHesaplar=(r.data||[]).filter(function(h){return h.aktif!==false && h.is_deleted!==true;}); }
function fmHesapTip(tip){return {nakit:'kasa',havale:'banka',kredi_karti:'pos',cek:'banka'}[tip]||'banka';}
function fmHesapOpts(tip){var t=fmHesapTip(tip);var list=(window._fmHesaplar||[]).filter(function(h){return String(h.tip||'').toLowerCase()===t;});
  if(!list.length)return '<option value="">Bu tip için aktif '+t+' hesabı yok</option>';
  return '<option value="">Hesap seç</option>'+list.map(function(h){return '<option value="'+h.id+'">'+esc(h.ad)+' ('+esc(h.tip)+')</option>';}).join('');}
function fmHesapOptsAll(){var list=(window._fmHesaplar||[]);if(!list.length)return '<option value="">Aktif hesap yok</option>';
  return '<option value="">Hesap seç</option>'+list.map(function(h){return '<option value="'+h.id+'">'+esc(h.ad)+' ('+esc(h.tip)+')</option>';}).join('');}
function fmOpenMo(html){document.getElementById('mp').innerHTML=html;document.getElementById('mo').classList.add('open');}

// ═══ 📄 TEKLİF (geçici, DB'siz — kayıt/sipariş/cari etkisi YOK) ═══
var _teklif=[],_tkStep=1;
function openTeklif(){
  if(!cF){alert('Önce firma seç');return;}

// ═══ DİJİTAL İKİZ — yeniden kullanılabilir karar fonksiyonları (Komuta Merkezi de kullanır) ═══
function bkMedian(a){if(!a.length)return null;var b=a.slice().sort(function(x,y){return x-y;});var m=Math.floor(b.length/2);return b.length%2?b[m]:(b[m-1]+b[m])/2;}
function bkPulse(dates){
  var ds=(dates||[]).map(function(d){return new Date(d+'T00:00:00').getTime();}).filter(function(t){return !isNaN(t);}).sort(function(a,b){return a-b;});
  if(ds.length<3) return {yeterli:false};
  var gaps=[];for(var i=1;i<ds.length;i++)gaps.push((ds[i]-ds[i-1])/86400000);
  var med=bkMedian(gaps),last=ds[ds.length-1];
  var today=new Date();today.setHours(0,0,0,0);
  var sonSessizlik=Math.round((today.getTime()-last)/86400000);
  var enUzun=Math.round(Math.max.apply(null,gaps));
  var mean=gaps.reduce(function(s,x){return s+x;},0)/gaps.length;
  var varc=gaps.reduce(function(s,x){return s+(x-mean)*(x-mean);},0)/gaps.length;
  var cv=mean>0?Math.sqrt(varc)/mean:1;
  return {yeterli:true,habit:(med<=1.5?'Günlük':med<=3?'Sık (2-3 gün)':med<=8?'Haftalık':'Seyrek'),med:med,
    expected:new Date(last+med*86400000),sonSessizlik:sonSessizlik,enUzun:enUzun,
    guven:(cv<0.5?'Yüksek':cv<1?'Orta':'Düşük'),normalDisi:(sonSessizlik>Math.max(enUzun,med*1.5))};
}
function bkHealth(p){
  var s_odeme=Math.round(25*Math.min(1,p.odemeOrani||0));
  var s_surek=p.sureklilikOk?20:12;
  var s_buyume=(p.buyumeRatio>=1)?15:(p.buyumeRatio>=0.8?11:7);
  var s_bakiye=p.ciro>0?Math.round(15*Math.max(0,1-(Math.max(0,p.kalan)/p.ciro))):12;
  var s_veri=15; if(!p.vergiVar)s_veri-=8; if(p.fiyatEksik>0)s_veri-=4; s_veri=Math.max(0,s_veri);
  var s_maliyet=p.maliyetTop>0?Math.round(10*(p.maliyetli/p.maliyetTop)):0;
  var strong=[],improve=[];
  if((p.odemeOrani||0)>=0.95)strong.push('Ödeme performansı çok güçlü (%'+Math.round((p.odemeOrani||0)*100)+')');
  if(p.buyumeRatio>=1)strong.push('Son dönem büyüme var');
  if(p.ciro>0&&(p.kalan/p.ciro)<0.05)strong.push('Açık bakiye düşük');
  var eksM=p.maliyetTop-p.maliyetli;
  if(eksM>0)improve.push({t:eksM+' ürün maliyetini gir',p:'+6 puan'});
  if(!p.vergiVar)improve.push({t:'Vergi bilgilerini tamamla',p:'+5 puan'});
  if(p.fiyatEksik>0)improve.push({t:'Ürün/fiyat eşleştirmelerini tamamla',p:'+4 puan'});
  return {score:Math.round(s_odeme+s_surek+s_buyume+s_bakiye+s_veri+s_maliyet),strong:strong,improve:improve};
}

// ═══ 📊 RAPOR (cok-donemli: gun/hafta/ay/yil/ozel) ═══
var _rapMode=null,_rapBas=null,_rapBit=null;
function _isoLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _rapInit(){ // varsayilan: icinde bulunulan ay
  if(_rapMode) return;
  var y=curMo.getFullYear(),m=curMo.getMonth();
  _rapMode='ay';_rapBas=y+'-'+String(m+1).padStart(2,'0')+'-01';_rapBit=_isoLocal(new Date(y,m+1,0));
}
function setRapMode(mode){
  var t=new Date(),y=t.getFullYear(),m=t.getMonth(),d=t.getDate();
  if(mode==='gun'){_rapBas=_rapBit=_isoLocal(t);}
  else if(mode==='hafta'){var wd=(t.getDay()+6)%7;var bs=new Date(y,m,d-wd);var bt=new Date(y,m,d-wd+6);_rapBas=_isoLocal(bs);_rapBit=_isoLocal(bt);}
  else if(mode==='ay'){_rapBas=y+'-'+String(m+1).padStart(2,'0')+'-01';_rapBit=_isoLocal(new Date(y,m+1,0));}
  else if(mode==='yil'){_rapBas=y+'-01-01';_rapBit=y+'-12-31';}
  else if(mode==='ozel'){var ib=document.getElementById('rapBas'),it=document.getElementById('rapBit');
    if(ib&&ib.value)_rapBas=ib.value; if(it&&it.value)_rapBit=it.value;
    if(_rapBas>_rapBit){alert('Başlangıç tarihi bitişten büyük olamaz');return;}}
  _rapMode=mode;renderRapor();
}
async function rapVeri(firmaId,bas,bit){
  var firmaAd=(F.find(function(f){return f.id===firmaId;})||{}).ad||'';
  var gunFark=Math.round((new Date(bit)-new Date(bas))/86400000);
  var grupTipi=(gunFark>31)?'ay':'gun';
  var rs=await sb.from('siparisler').select('id,tarih').eq('firma_id',firmaId).eq('is_deleted',false).neq('durum','iptal').gte('tarih',bas).lte('tarih',bit);
  var sips=rs.data||[];var sids=sips.map(function(s){return s.id;});var sipMap={};sips.forEach(function(s){sipMap[s.id]=s.tarih;});
  var kalemler=[];
  if(sids.length){var rk=await sb.from('siparis_kalemleri').select('siparis_id,urun_ad,adet,birim_fiyat_kdv_haric,toplam_kdv_haric,toplam_kdv_dahil').in('siparis_id',sids).eq('is_deleted',false);kalemler=rk.data||[];}
  var grupMap={};var urunOzet={};var dA=0,dH=0,dD=0;
  kalemler.forEach(function(k){
    var t=sipMap[k.siparis_id];if(!t)return;
    var anahtar=(grupTipi==='ay')?t.slice(0,7):t;
    var g=grupMap[anahtar]=grupMap[anahtar]||{};
    var pk=g[k.urun_ad]=g[k.urun_ad]||{f:+k.birim_fiyat_kdv_haric,a:0,h:0,d:0};
    pk.a+=+k.adet;pk.h+=+k.toplam_kdv_haric;pk.d+=+k.toplam_kdv_dahil;
    var u=urunOzet[k.urun_ad]=urunOzet[k.urun_ad]||{a:0,h:0,d:0};u.a+=+k.adet;u.h+=+k.toplam_kdv_haric;u.d+=+k.toplam_kdv_dahil;
    dA+=+k.adet;dH+=+k.toplam_kdv_haric;dD+=+k.toplam_kdv_dahil;
  });
  var gruplar=Object.keys(grupMap).sort().map(function(an){
    var prods=Object.entries(grupMap[an]).sort(function(a,b){return b[1].a-a[1].a;});
    var ga=prods.reduce(function(s,p){return s+p[1].a;},0),gh=prods.reduce(function(s,p){return s+p[1].h;},0),gd=prods.reduce(function(s,p){return s+p[1].d;},0);
    var etiket;
    if(grupTipi==='ay'){etiket=AY[+an.slice(5,7)-1]+' '+an.slice(0,4);}
    else{var dd=new Date(an+'T00:00:00');var gl=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'][dd.getDay()];etiket=an.slice(8,10)+' '+AY[+an.slice(5,7)-1]+' '+gl;}
    return {anahtar:an,etiket:etiket,urunler:prods.map(function(e){return {urun_ad:e[0],adet:e[1].a,birim_haric:e[1].f,toplam_haric:e[1].h,toplam_dahil:e[1].d};}),grup_adet:ga,grup_haric:gh,grup_dahil:gd};
  });
  var rt=await sb.from('tahsilatlar').select('odeme_tipi,tutar').eq('firma_id',firmaId).eq('is_deleted',false).gte('tarih',bas).lte('tarih',bit);
  var tMap={},tTop=0;(rt.data||[]).forEach(function(x){tMap[x.odeme_tipi]=(tMap[x.odeme_tipi]||0)+ +x.tutar;tTop+=+x.tutar;});
  var rc=await sb.from('cari_ozet').select('kalan_bakiye').eq('firma_id',firmaId);
  var acik=(rc.data&&rc.data[0])?Number(rc.data[0].kalan_bakiye||0):0;
  return {firmaAd:firmaAd,bas:bas,bit:bit,mode:_rapMode,grupTipi:grupTipi,gruplar:gruplar,
    urunOzet:Object.entries(urunOzet).sort(function(a,b){return b[1].d-a[1].d;}).map(function(e){return {urun_ad:e[0],adet:e[1].a,toplam_haric:e[1].h,toplam_dahil:e[1].d};}),
    donem:{adet:dA,haric:dH,dahil:dD},
    tahsilatOzet:Object.entries(tMap).map(function(e){return {odeme_tipi:e[0],brut:e[1]};}),tahsilatBrut:tTop,acikBakiye:acik};
}

  _rapInit();
  var c=document.getElementById('content');
  var modes=[['gun','Gün'],['hafta','Hafta'],['ay','Ay'],['yil','Yıl'],['ozel','Özel']];

      g.urunler.forEach(function(p){h+='<tr><td>'+esc(p.urun_ad)+'</td><td class="n">'+AD(p.adet)+'</td><td class="n">'+TL(p.birim_haric)+'</td><td class="n">'+TL(p.toplam_dahil)+'</td></tr>';});
      h+='<tr class="t"><td>Toplam</td><td class="n">'+AD(g.grup_adet)+'</td><td></td><td class="n">'+TL(g.grup_dahil)+'</td></tr></table></div>';
    });
    h+='<div class="card"><b>DÖNEM ÜRÜN ÖZETİ</b><table class="rpt"><tr><th>Ürün</th><th class="n">Adet</th><th class="n">KDV Hariç</th><th class="n">KDV Dahil</th></tr>';
    v.urunOzet.forEach(function(p){h+='<tr><td>'+esc(p.urun_ad)+'</td><td class="n">'+AD(p.adet)+'</td><td class="n">'+TL(p.toplam_haric)+'</td><td class="n">'+TL(p.toplam_dahil)+'</td></tr>';});
    h+='<tr class="t"><td>TOPLAM</td><td class="n">'+AD(v.donem.adet)+'</td><td class="n">'+TL(v.donem.haric)+'</td><td class="n">'+TL(v.donem.dahil)+'</td></tr></table></div>';
  }
  h+='<div class="card"><b>TAHSİLAT ÖZETİ</b><table class="rpt"><tr><th>Ödeme Tipi</th><th class="n">Brüt Tutar</th></tr>';
  if(v.tahsilatOzet.length){v.tahsilatOzet.forEach(function(x){h+='<tr><td>'+esc(x.odeme_tipi)+'</td><td class="n">'+TL(x.brut)+'</td></tr>';});}

  h+='<tr class="t"><td>TOPLAM</td><td class="n">'+TL(v.tahsilatBrut)+'</td></tr></table></div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between"><b>Açık Bakiye</b><b style="color:var('+(v.acikBakiye>0?'--rd':'--ac')+')">'+TL(v.acikBakiye)+'</b></div></div>';
  h+='</div>';

// ═══ 💰 FİYAT LİSTESİ + GEÇMİŞ + DÜZENLEME ═══
async function renderFiyat(){
  const c=document.getElementById('content');
  const firmaAd=(F.find(f=>f.id===cF)||{}).ad||'';
  const fiyatlar=FY.filter(p=>p.firma_id===cF).sort((a,b)=>(a.urun_ad||'').localeCompare(b.urun_ad||'','tr'));
  // [ZAM-1] Zam geçmişi: firma_urun_fiyat versiyonlarından türetilir (gerçek satış fiyatı değişimi).
  // firma_urun_log artık kullanılmıyor: oradaki kayıtlar çoğunlukla cikarildi/eklendi (yeni_fiyat=null) → yanlış -%100 gösteriyordu.
  const rv=await sb.from('firma_urun_fiyat').select('urun_id,birim_fiyat_kdv_haric,gecerlilik_baslangic').eq('firma_id',cF).eq('is_deleted',false).order('gecerlilik_baslangic',{ascending:true});
  const _vers={};(rv.data||[]).forEach(v=>{const uid=v.urun_id;(_vers[uid]=_vers[uid]||[]).push(v);});
  const zamMap={};
  Object.keys(_vers).forEach(uid=>{let prev=null;_vers[uid].forEach(v=>{const fy=+v.birim_fiyat_kdv_haric||0;if(prev!=null&&Math.abs(fy-prev)>0.001){const pct=prev>0?((fy-prev)/prev*100):0;(zamMap[uid]=zamMap[uid]||[]).push({tarih:v.gecerlilik_baslangic,eski:prev,yeni:fy,pct:pct});}prev=fy;});});
  // Son sipariş + toplam satış (firma kapsamlı, is_deleted=false) — YENİ TABLO YOK
  const sonMap={},satisMap={};
  const rs=await sb.from('siparisler').select('id,tarih').eq('firma_id',cF).eq('is_deleted',false).neq('durum','iptal');
  const sips=rs.data||[];const sids=sips.map(s=>s.id);const sipT={};sips.forEach(s=>sipT[s.id]=s.tarih);
  if(sids.length){
    const rk=await sb.from('siparis_kalemleri').select('siparis_id,urun_id,adet').in('siparis_id',sids).eq('is_deleted',false);
    (rk.data||[]).forEach(k=>{const t=sipT[k.siparis_id];if(!t)return;
      satisMap[k.urun_id]=(satisMap[k.urun_id]||0)+(+k.adet||0);
      const cur=sonMap[k.urun_id];
      if(!cur||t>cur.tarih)sonMap[k.urun_id]={tarih:t,adet:(+k.adet||0)};
      else if(t===cur.tarih)cur.adet+=(+k.adet||0);
    });
  }
  // satır verisi
  const rows=fiyatlar.map(p=>{const u=UR.find(x=>x.id===p.urun_id)||{};
    const maliyet=Number(u.birim_maliyet||0),satis=Number(p.birim_fiyat_kdv_haric||0);
    const net=maliyet>0?(satis-maliyet):null,marj=(maliyet>0&&satis>0)?(net/satis*100):null;
    return {p:p,u:u,maliyet:maliyet,satis:satis,net:net,marj:marj,gramaj:u.gramaj||'',kdv:(p.kdv_orani||u.kdv_orani||1),son:sonMap[p.urun_id]||null,topAdet:satisMap[p.urun_id]||0};});
  const aktifSay=rows.length;
  // EMPTY STATE
  if(!aktifSay){
    c.innerHTML='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b>Portföy</b></div>'
      +'<div style="text-align:center;color:var(--dm);padding:30px 16px"><div style="font-size:34px;opacity:.5;margin-bottom:10px">📦</div>'
      +'Bu firmaya henüz ürün/fiyat tanımlı değil.<br>Önce katalogdan ürün ekleyip firma fiyatını girin.'
      +'<div style="margin-top:14px"><button class="b" onclick="showAddPrice()">Ürün Ekle</button></div><div id="addPriceArea"></div></div></div>';
    return;
  }
  // KPI
  const marjlilar=rows.filter(r=>r.marj!=null);
  const ortMarj=marjlilar.length?(marjlilar.reduce((s,r)=>s+r.marj,0)/marjlilar.length):null;
  const enCok=rows.filter(r=>r.topAdet>0).sort((a,b)=>b.topAdet-a.topAdet)[0]||null;
  const enKar=rows.filter(r=>r.net!=null).sort((a,b)=>b.net-a.net)[0]||null;
  let h='<div class="card" style="padding:12px 14px"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">'
    +'<div><div style="font-size:11px;color:var(--dm)">Aktif Ürün</div><b style="font-size:18px">'+aktifSay+'</b></div>'
    +'<div><div style="font-size:11px;color:var(--dm)">Ortalama Marj</div><b style="font-size:18px;color:var(--ac)">'+(ortMarj==null?'—':('%'+ortMarj.toFixed(1)))+'</b></div>'
    +'<div><div style="font-size:11px;color:var(--dm)">En Çok Satan</div><b style="font-size:14px">'+(enCok?esc(enCok.p.urun_ad)+' <span style="color:var(--dm);font-weight:400">('+AD(enCok.topAdet)+')</span>':'—')+'</b></div>'
    +'<div><div style="font-size:11px;color:var(--dm)">En Kârlı</div><b style="font-size:14px;color:var(--gn)">'+(enKar?esc(enKar.p.urun_ad)+' <span style="color:var(--dm);font-weight:400">('+TL(enKar.net)+')</span>':'—')+'</b></div>'
    +'</div></div>';
  // [ZAM-1] Firma geneli Zam Geçmişi özeti (read-only, versiyonlardan türetildi)
  const zamRows=rows.filter(r=>(zamMap[r.p.urun_id]||[]).length).map(r=>{const zs=zamMap[r.p.urun_id];const ilk=zs[0].eski,son=zs[zs.length-1].yeni;const pct=ilk>0?((son-ilk)/ilk*100):0;return {ad:r.p.urun_ad,ilk:ilk,son:son,pct:pct,tar:zs[zs.length-1].tarih,n:zs.length};}).sort((a,b)=>b.pct-a.pct);
  if(zamRows.length){h+='<div class="card"><div style="margin-bottom:8px"><b>Zam Geçmişi ('+zamRows.length+' ürün)</b> <span style="font-size:11px;color:var(--dm)">satış fiyatı · KDV hariç · ilk→son</span></div>';
    zamRows.forEach(z=>{h+='<div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="min-width:0">'+esc(z.ad)+' <span style="font-size:11px;color:var(--dm)">'+trd(z.tar)+(z.n>1?(' · '+z.n+' kez'):'')+'</span></span><span style="white-space:nowrap">'+TL(z.ilk)+' → <b>'+TL(z.son)+'</b> <span class="'+(z.pct>0?'zam':'ind')+'">('+PCT(z.pct)+')</span></span></div>';});
    h+='</div>';}
  h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b>Portföy ('+aktifSay+')</b><div style="display:flex;gap:6px;flex-wrap:wrap">'
    +'<button class="b s" style="font-size:12px;padding:6px 10px" onclick="portfoyYazdir()">Yazdır</button>'
    +'<button class="b s" style="font-size:12px;padding:6px 10px" onclick="openTeklif()">Teklif</button>'
    +'<button class="b s" style="font-size:12px;padding:6px 10px" onclick="showAddPrice()">Yeni Ürün</button></div></div>';
  rows.forEach(r=>{const p=r.p,uid=p.urun_id,zh=zamMap[uid]||[];
    const karHtml=r.maliyet>0
      ?'Maliyet (KDV hariç): '+TL(r.maliyet)+' · <b style="color:var('+(r.net>=0?'--gn':'--rd')+')">Birim net kâr: '+TL(r.net)+'</b> (marj %'+r.marj.toFixed(1)+')'
      :'<span style="color:var(--rd)">⚠️ Maliyet girilmemiş — birim net kâr hesaplanamıyor</span>';
    const sonHtml=r.son?('Son sipariş: '+trd(r.son.tarih)+' · '+AD(r.son.adet)+' adet'):'<span style="color:var(--dm)">Henüz sipariş yok</span>';
    h+='<div class="fl-row"><div style="flex:1;min-width:0"><div style="font-weight:600">'+esc(p.urun_ad)+(r.gramaj?' <span style="font-size:11px;color:var(--dm)">('+esc(r.gramaj)+')</span>':'')+'</div>'
      +'<div style="font-size:11px;color:var(--dm)">KDV %'+r.kdv+'</div>'
      +'<div style="font-size:11px;color:var(--dm);margin-top:2px">'+karHtml+'</div>'
      +'<div style="font-size:11px;color:var(--dm);margin-top:2px">'+sonHtml+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px"><div style="text-align:right"><div style="font-size:10px;color:var(--dm)">Satış (KDV hariç)</div><b style="color:var(--ac);font-size:16px">'+TL(r.satis)+'</b></div>'
      +'<button class="b s" style="padding:5px 10px;font-size:12px" onclick="editPrice(\''+p.id+'\',\''+uid+'\',\''+String(p.urun_ad).replace(/'/g,"\\'")+'\','+r.satis+','+r.kdv+')"></button>'
      +'<button class="b s" style="padding:5px 10px;font-size:12px;color:var(--rd)" onclick="urunKaldir(\''+p.id+'\',\''+uid+'\',\''+String(p.urun_ad).replace(/'/g,"\\'")+'\')">Kaldır</button></div></div>';
    if(zh.length){h+='<div class="fl-hist">';
      zh.slice().reverse().slice(0,6).forEach(z=>{const cls=z.pct>0?'zam':'ind';h+='<div style="margin:2px 0">'+trd(z.tarih)+': '+TL(z.eski)+' → '+TL(z.yeni)+' <span class="'+cls+'">('+PCT(z.pct)+')</span></div>';});
      h+='</div>';}
  });
  h+='<div id="addPriceArea"></div></div>';
  h+=buildPortfoyPrint(firmaAd,rows);
  c.innerHTML=h;
}
function buildPortfoyPrint(firmaAd,rows){
  let t='<div id="portfoyPrint" style="display:none"><div class="card"><div style="text-align:center;margin-bottom:8px"><b>'+esc(firmaAd)+' · Ürün Portföyü</b><div style="font-size:12px;color:var(--dm)">'+trd(tdy())+'</div></div>'
    +'<table class="rpt"><tr><th>Ürün</th><th>Gramaj</th><th class="n">Maliyet</th><th class="n">Fiyat</th><th class="n">Kâr</th><th class="n">Marj</th><th>Son Sipariş</th></tr>';

function portfoyYazdir(){document.body.classList.add('print-portfoy');window.print();setTimeout(function(){document.body.classList.remove('print-portfoy');},500);}

function editPrice(fufId,urunId,ad,fiy,kdv){
  const bugun=new Date().toISOString().slice(0,10);
  const u=UR.find(x=>x.id===urunId)||{};const maliyet=Number(u.birim_maliyet||0);
  let h='<div class="mp-h"><h3>'+ad+'</h3><button class="mp-x" onclick="closeMo()">✕</button></div>';
  h+='<div style="padding:10px;background:var(--s2);border-radius:8px;margin-bottom:10px;font-size:13px">Mevcut: <b>'+TL(fiy)+'</b> (KDV hariç) · KDV %'+kdv+'</div>';
  h+='<label>Satış Fiyatı (KDV hariç)</label><input type="number" step="0.01" id="epFiy" value="'+fiy+'" oninput="epHesap()">';
  h+='<label>Maliyet (KDV hariç)</label><input type="number" step="0.01" id="epMaliyet" value="'+(maliyet||'')+'" placeholder="0" oninput="epHesap()">';
  h+='<div id="epPrev" style="padding:10px;background:var(--s2);border-radius:8px;margin:8px 0;font-size:13px"></div>';
  h+='<label>Değişim Tarihi</label><input type="date" id="epTar" value="'+bugun+'">';
  h+='<div style="font-size:11px;color:var(--dm);margin:6px 0">Satış fiyatı KDV hariç girilir; KDV dahil tutarlar yalnız satır/genel toplam ve raporlarda gösterilir. Birim net kâr anlık karar-destektir; geçmiş sipariş kârını/snapshot\'ı değiştirmez.</div>';
  h+='<button class="b full" style="margin-top:4px" onclick="savePrice(\''+fufId+'\',\''+urunId+'\','+fiy+')">Güncelle</button>';
  document.getElementById('mp').innerHTML=h;document.getElementById('mo').classList.add('open');epHesap();
}
function epHesap(){
  const haric=parseFloat(document.getElementById('epFiy').value)||0;
  const maliyet=parseFloat(document.getElementById('epMaliyet').value)||0;
  const pv=document.getElementById('epPrev');if(!pv)return;
  if(maliyet>0){const net=haric-maliyet;const marj=haric>0?(net/haric*100):0;
    pv.innerHTML='Satış (KDV hariç): <b>'+TL(haric)+'</b> − Maliyet (KDV hariç): <b>'+TL(maliyet)+'</b><br><b style="color:var('+(net>=0?'--gn':'--rd')+')">Birim net kâr: '+TL(net)+'</b> (marj %'+marj.toFixed(1)+')';}
  else pv.innerHTML='<span style="color:var(--dm)">Maliyet gir → birim net kâr hesaplanır</span>';
}

async function savePrice(fufId,urunId,eskiFiy){
  const yeni=+(parseFloat(document.getElementById('epFiy').value)).toFixed(2); // KDV hariç — doğrudan saklanır
  if(!(yeni>0)){alert('Geçerli satış fiyatı gir (KDV hariç, 0/negatif olamaz)');return;}
  const tar=document.getElementById('epTar').value||new Date().toISOString().slice(0,10);
  // Versiyonlama: eski aktif kaydı kapat (gecerlilik_bitis), yeni satır insert et (hard-delete yok)
  const e1=await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:tar}).eq('id',fufId);
  if(e1.error){alert(e1.error.message);return;}
  const e2=await sb.from('firma_urun_fiyat').insert({firma_id:cF,urun_id:urunId,birim_fiyat_kdv_haric:yeni,gecerlilik_baslangic:tar});
  if(e2.error){alert(e2.error.message);return;}
  if(Math.abs(yeni-eskiFiy)>0.001){
    await sb.from('firma_urun_log').insert({firma_id:cF,urun_id:urunId,islem:'fiyat_degisti',eski_fiyat:+Number(eskiFiy).toFixed(2),yeni_fiyat:yeni,yapan:'Firma Yönetim'}).catch(()=>{});
  }
  // Maliyet değiştiyse ürün maliyetini güncelle (urunler trigger'ları: trg_urun_maliyet_gecmis + audit_urunler tetiklenir; snapshot YALNIZ yeni siparişlere yansır)
  const mEl=document.getElementById('epMaliyet');
  if(mEl){
    const yeniMaliyet=parseFloat(mEl.value);
    const u=UR.find(x=>x.id===urunId)||{};const eskiMaliyet=Number(u.birim_maliyet||0);
    if(!isNaN(yeniMaliyet)&&yeniMaliyet>=0&&Math.abs(yeniMaliyet-eskiMaliyet)>0.001){
      const em=await sb.from('urunler').update({birim_maliyet:yeniMaliyet}).eq('id',urunId);
      if(em.error){alert('Maliyet güncellenemedi: '+em.error.message);return;}
    }
  }
  await reloadData();closeMo();renderFiyat();
}
async function urunKaldir(fufId,urunId,ad){
  if(!confirm(ad+' bu firmada satılmıyor olarak işaretlensin mi? (Fiyat kaldırılır, veri silinmez, geçmiş korunur)'))return;
  const dun=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const e1=await sb.from('firma_urun_fiyat').update({gecerlilik_bitis:dun}).eq('id',fufId);
  if(e1.error){alert(e1.error.message);return;}
  await sb.from('firma_urun_log').insert({firma_id:cF,urun_id:urunId,islem:'cikarildi',eski_fiyat:null,yeni_fiyat:null,yapan:'Firma Yönetim'}).catch(()=>{});
  await reloadData();renderFiyat();
}

function showAddPrice(){
  const area=document.getElementById('addPriceArea');if(!area)return;
  const urunOpts=UR.filter(u=>u.aktif!==false&&u.satis_urunu!==false&&!u.is_deleted).sort((a,b)=>(a.ad||'').localeCompare(b.ad||'','tr')).map(u=>'<option value="'+u.id+'" data-fiy="'+(u.varsayilan_fiyat||0)+'" data-kdv="'+(u.kdv_orani||1)+'">'+u.ad+'</option>').join('');

    +'<div style="display:flex;gap:8px"><div style="flex:1"><label>Satış Fiyatı (KDV hariç)</label><input type="number" step="0.01" id="apFiy"></div>'
    +'<div style="width:80px"><label>KDV %</label><input type="number" id="apKdv" value="1"></div></div>'

function apFill(){const s=document.getElementById('apSel');if(!s||!s.value)return;const o=s.options[s.selectedIndex];
  const kdv=parseFloat(o.getAttribute('data-kdv'))||1;const haric=parseFloat(o.getAttribute('data-fiy'))||0;
  document.getElementById('apFiy').value=haric?(+haric.toFixed(2)):'';document.getElementById('apKdv').value=kdv;}
async function doAddPrice(){
  const sel=document.getElementById('apSel');const uid=sel&&sel.value?sel.value:null;
  if(!uid){alert('Katalogdan ürün seç');return;}
  const fiy=+(parseFloat(document.getElementById('apFiy').value)).toFixed(2); // KDV hariç — doğrudan saklanır
  if(!(fiy>0)){alert('Geçerli satış fiyatı gir (KDV hariç, 0/negatif olamaz)');return;}
  const bas=document.getElementById('apBas').value||new Date().toISOString().slice(0,10);
  const{error}=await sb.from('firma_urun_fiyat').insert({firma_id:cF,urun_id:uid,birim_fiyat_kdv_haric:fiy,gecerlilik_baslangic:bas});
  if(error){alert(error.message);return;}
  await sb.from('firma_urun_log').insert({firma_id:cF,urun_id:uid,islem:'eklendi',eski_fiyat:null,yeni_fiyat:fiy,yapan:'Firma Yönetim'}).catch(()=>{});
  await reloadData();renderFiyat();
}

// ═══ [TL-REV5] CUSTOMER TIMELINE — read-only hikâye akışı; eski liste "Liste" toggle'ında korunur ═══
let gecmisGorunum='timeline';
function tlToggle(id){ var d=document.getElementById(id); if(!d) return; var acik=d.style.display!=='none'; d.style.display=acik?'none':'block'; var ch=document.getElementById(id+'-ch'); if(ch) ch.textContent=acik?'▾':'▴'; }
function tlGun(t){ if(!t) return ''; var b=tdy(); if(t===b) return '<b>bugün</b>'; return String(t).slice(8,10)+'.'+String(t).slice(5,7); }
function gecmisToggleHtml(){ return '<div style="display:flex;gap:6px"><button class="b'+(gecmisGorunum==='timeline'?'':' s')+'" style="font-size:12px;padding:8px 12px;min-height:40px" onclick="gecmisGorunum=\'timeline\';renderGecmis()">Hikâye</button><button class="b'+(gecmisGorunum==='liste'?'':' s')+'" style="font-size:12px;padding:8px 12px;min-height:40px" onclick="gecmisGorunum=\'liste\';renderGecmis()">Liste</button></div>'; }
async function renderGecmis(){
  const c=document.getElementById('content');
  c.innerHTML='<div class="card">Yükleniyor…</div>';
  if(gecmisGorunum==='liste'){ return renderGecmisListe(c); }
  const fid=cF, bugun=tdy();
  const bas90=_isoLocal(new Date(Date.now()-90*86400000));
  const res=await Promise.all([
    sb.from('v_firma_pulse').select('health_skor,health_renk,sessiz_gun,acik_bakiye').eq('firma_id',fid).maybeSingle(),
    sb.from('firma_gorusmeleri').select('*').eq('firma_id',fid).gte('gorusme_tarihi',bas90).order('gorusme_tarihi',{ascending:false}).order('olusturma',{ascending:false}).limit(200),
    sb.from('siparisler').select('id,tarih,siparis_no,durum,toplam_kdv_dahil,iptal_nedeni,iptal_eden_kullanici,created_by,olusturma,uretimde_at,hazir_at,sevk_at,faturalandi_at,tahsil_at').eq('firma_id',fid).eq('is_deleted',false).gte('tarih',bas90).order('tarih',{ascending:false}).limit(200),
    sb.from('tahsilatlar').select('id,tarih,tutar,odeme_tipi,cek_durumu,created_by,olusturma').eq('firma_id',fid).eq('is_deleted',false).gte('tarih',bas90).order('tarih',{ascending:false}).limit(200)
  ]);
  const pv=(res[0]&&res[0].data)||null;
  const gor=(res[1]&&res[1].data)||[];
  const sips=(res[2]&&res[2].data)||[];
  const tahs=(res[3]&&res[3].data)||[];
  let notlar=[]; const sids=sips.map(function(s){return s.id;});
  if(sids.length){ const rn=await sb.from('siparis_notlari').select('siparis_id,yazan,mesaj,olusturma').in('siparis_id',sids).order('olusturma',{ascending:false}).limit(200); notlar=rn.data||[]; }

  // ── olay listesi (doğal dil; durum geçişleri ayrı satır DEĞİL — gövde mikro-satırı)
  const DSIRA={bekleyen:0,uretimde:1,hazir:2,sevk_edildi:3,faturalandi:4,tahsil_edildi:5,tamamlandi:6,iptal:0};
  const ev=[];
  gor.forEach(function(g){
    var gec = g.sonraki_aksiyon_tarihi && g.sonraki_aksiyon_tarihi<bugun;
    ev.push({tarih:g.gorusme_tarihi, ts:g.olusturma, serit:'--dm', ikon:'📞',
      baslik:(g.gorusen_kisi?esc(g.gorusen_kisi)+' ile görüşüldü':'Görüşme kaydedildi'),
      sag:(g.sonraki_aksiyon_tarihi?'<span style="font-size:12px;color:var('+(gec?'--rd':'--ac')+')">'+(gec?'takip gecikti':tlGun(g.sonraki_aksiyon_tarihi)+' takip')+'</span>':''),
      det:'<div style="white-space:pre-wrap">'+esc(g.not_metni)+'</div><div style="font-size:11px;color:var(--dm);margin-top:4px">'+esc(g.yazan||'')+(g.kaynak==='import_localstorage'?' · 📲 aktarım':'')+' · '+trd(g.gorusme_tarihi)+(g.sonraki_aksiyon_tarihi?' · sonraki aksiyon '+trd(g.sonraki_aksiyon_tarihi):'')+'</div>'});
  });
  tahs.forEach(function(t){
    var kars=(t.cek_durumu==='karsiliksiz');
    ev.push({tarih:t.tarih, ts:t.olusturma, serit:(kars?'--rd':'--gn'), ikon:'💰',
      baslik:(kars?'Çek karşılıksız — '+TL(t.tutar):TL(t.tutar)+(t.odeme_tipi==='cek'?' çek alındı':' tahsil edildi')),
      sag:'',
      det:'<div style="font-size:11px;color:var(--dm)">'+esc(t.odeme_tipi||'')+(t.cek_durumu?' · çek: '+esc(t.cek_durumu):'')+' · '+esc(t.created_by||'')+' · '+trd(t.tarih)+'</div>'});
  });
  sips.forEach(function(s){
    var d=DSIRA[s.durum]!=null?DSIRA[s.durum]:0;
    var fiil='verildi', serit='--ac';
    if(s.durum==='iptal'){ fiil='iptal edildi'; serit='--rd'; }
    else if(s.sevk_at && d>=3) fiil='sevk edildi';
    else if(s.hazir_at && d>=2) fiil='hazırlandı';
    else if(s.uretimde_at && d>=1) fiil='üretimde';
    var mikro=[];
    mikro.push('verildi '+trd(s.tarih)+(s.created_by?' · '+esc(s.created_by):''));
    if(s.uretimde_at && d>=1) mikro.push('üretime alındı '+String(s.uretimde_at).slice(11,16));
    if(s.hazir_at && d>=2) mikro.push('hazırlandı '+String(s.hazir_at).slice(11,16));
    if(s.sevk_at && d>=3) mikro.push('sevk '+String(s.sevk_at).slice(11,16));
    if(s.faturalandi_at && d>=4) mikro.push('faturalandı');
    if(s.durum==='iptal') mikro.push('<span style="color:var(--rd)">iptal'+(s.iptal_nedeni?' — '+esc(s.iptal_nedeni):'')+(s.iptal_eden_kullanici?' ('+esc(s.iptal_eden_kullanici)+')':'')+'</span>');
    ev.push({tarih:s.tarih, ts:s.olusturma, serit:serit, ikon:'📦',
      baslik:'Sipariş #'+esc((s.siparis_no||'').slice(-4))+' '+fiil,
      sag:'<b style="font-size:13px">'+TL(s.toplam_kdv_dahil)+'</b>',
      det:'<div style="font-size:12px;color:var(--dm)">↳ '+mikro.join(' · ')+'</div><div style="font-size:11px;color:var(--dm);margin-top:3px">'+esc(s.siparis_no||'')+' · KDV dahil</div>'});
  });
  var sipNoMap={}; sips.forEach(function(s){ sipNoMap[s.id]=(s.siparis_no||'').slice(-4); });
  notlar.forEach(function(n){
    ev.push({tarih:String(n.olusturma).slice(0,10), ts:n.olusturma, serit:'--dm', ikon:'📝',
      baslik:'Not eklendi', sag:'<span style="font-size:11px;color:var(--dm)">#'+esc(sipNoMap[n.siparis_id]||'')+'</span>',
      det:'<div style="white-space:pre-wrap">'+esc(n.mesaj)+'</div><div style="font-size:11px;color:var(--dm);margin-top:4px">'+esc(n.yazan||'')+' · '+new Date(n.olusturma).toLocaleString('tr-TR')+'</div>'});
  });
  ev.sort(function(a,b){ if(a.tarih!==b.tarih) return a.tarih<b.tarih?1:-1; return String(a.ts)<String(b.ts)?1:-1; });

  // ── ŞU AN şeridi (4 sinyal; dokunuş Özet'e — özet↔detay köprüsü, bilgi deposu değil)
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="font-size:15px">🕒 Müşteri Hikâyesi <span style="font-size:11px;color:var(--dm);font-weight:400">son 90 gün · '+ev.length+' olay</span></b>'+gecmisToggleHtml()+'</div>';
  if(pv){
    var fut=null, past=null;
    gor.forEach(function(g){ var dd=g.sonraki_aksiyon_tarihi; if(!dd) return; if(dd>=bugun){ if(!fut||dd<fut)fut=dd; } else { if(!past||dd>past)past=dd; } });
    var takip = fut ? ('takip '+tlGun(fut)) : (past?'<span style="color:var(--rd)">takip gecikti ('+tlGun(past)+')</span>':'takip —');
    var prenk = pv.health_renk==='yesil'?'--gn':(pv.health_renk==='sari'?'--ac':'--rd');
    var acik = Number(pv.acik_bakiye||0);
    h+='<div class="card" style="padding:10px 14px;cursor:pointer;margin-bottom:10px" onclick="setTab(\'ozet\')"><div style="display:flex;flex-wrap:wrap;gap:4px 14px;font-size:13px;align-items:baseline">'
      +'<span><span style="color:var('+prenk+')">●</span> <b>'+pv.health_skor+'</b>/100</span>'
      +(pv.sessiz_gun!=null?'<span style="color:var(--dm)">'+pv.sessiz_gun+'g sessiz</span>':'')
      +'<span>'+takip+'</span>'
      +'<span style="color:var(--dm)">açık <b style="color:var('+(acik>0?'--rd':'--gn')+')">'+TL(acik)+'</b></span>'
      +'<span style="margin-left:auto;font-size:11px;color:var(--dm)">Özet →</span></div></div>';
  }
  // ── akış
  if(!ev.length){
    h+='<div class="card" style="text-align:center;padding:28px;color:var(--dm)"><div style="font-size:34px">🕒</div><div style="margin-top:6px;font-size:14px">Son 90 günde hareket yok</div><div style="font-size:12px;margin-top:4px">Bu firmanın hikâyesi burada birikecek.</div><button class="b" style="margin-top:12px;min-height:44px" onclick="hizliArama()">Aradım, işaretle</button></div>';
  } else {
    h+='<div class="card" style="padding:2px 0">';
    ev.forEach(function(e,i){
      h+='<div onclick="tlToggle(\'tl'+i+'\')" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 12px;border-left:3px solid var('+e.serit+');border-bottom:1px solid var(--bd);cursor:pointer;min-height:44px">'
        +'<span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px"><span style="color:var(--dm);font-size:12px">'+tlGun(e.tarih)+'</span> '+e.ikon+' '+e.baslik+'</span>'
        +'<span style="white-space:nowrap;display:flex;align-items:center;gap:6px">'+(e.sag||'')+'<span id="tl'+i+'-ch" style="color:var(--dm);opacity:.45;font-size:10px">▾</span></span></div>'
        +'<div id="tl'+i+'" style="display:none;padding:8px 14px 12px;border-left:3px solid var('+e.serit+');border-bottom:1px solid var(--bd);font-size:13px;background:var(--s2)">'+e.det+'</div>';
    });
    h+='</div>';
  }
  c.innerHTML=h;
}
async function renderGecmisListe(c){
  const r=await sb.from('siparisler').select('id,tarih,siparis_no,durum,fatura_durumu,toplam_kdv_dahil').eq('firma_id',cF).eq('is_deleted',false).order('tarih',{ascending:false}).limit(200);
  const sips=r.data||[];
  let h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b>Sipariş Geçmişi ('+sips.length+')</b>'+gecmisToggleHtml()+'</div>';
  if(!sips.length) h+='<div style="color:var(--dm);margin-top:8px">Sipariş yok.</div>';
  else{h+='<table class="rpt"><tr><th>Tarih</th><th>No</th><th>Durum</th><th class="n">Tutar</th><th></th></tr>';
    sips.forEach(s=>{const dc=s.durum==='iptal'?'color:var(--rd)':s.durum==='tamamlandi'?'color:var(--gn)':'';
      h+='<tr><td>'+s.tarih+'</td><td style="font-size:11px">'+(s.siparis_no||'—')+'</td><td style="'+dc+'">'+s.durum+'</td><td class="n">'+TL(s.toplam_kdv_dahil)+'</td>'
        +'<td><button class="b s" style="padding:3px 8px;font-size:11px" onclick="openDay(\''+s.tarih+'\')">Aç</button></td></tr>';});
    h+='</table>';}
  h+='</div>';c.innerHTML=h;
}

// ═══ Fiyat uyarısı ═══
async function checkPW(y,m){const pw=document.getElementById('priceWarn');
  try{const r=await sb.from('firma_urun_log').select('*').eq('firma_id',cF).order('olusturma',{ascending:false}).limit(10);
  const logs=(r.data||[]).filter(l=>{const d=new Date(l.olusturma);return d.getFullYear()===y&&d.getMonth()+1===m;});
  if(logs.length){let h='<div class="warn"><b>Bu ay fiyat güncellendi:</b>';
    logs.forEach(l=>{const t=new Date(l.olusturma).toLocaleDateString('tr-TR');
      const eski=+l.eski_fiyat,yeni=+l.yeni_fiyat,fark=eski>0?((yeni-eski)/eski*100):0;
      const u=UR.find(x=>x.id===l.urun_id);const ad=u?u.ad:'Ürün';
      h+='<div style="margin-top:4px">'+t+' — '+ad+': '+TL(eski)+' → '+TL(yeni)+' <span style="color:'+(fark>0?'var(--rd)':'var(--gn)')+'">'+PCT(fark)+'</span></div>';});
  h+='</div>';pw.innerHTML=h;}else pw.innerHTML='';}catch(e){pw.innerHTML='';}
}

// ═══ GÜN DETAY + FİŞ GİRİŞİ (tek panel — QUICK-ORDER-CALENDAR-DRAWER-1) ═══
// Financial chain trigger-driven: toplam/kâr/maliyet-snapshot/cari ELLE YAZILMAZ. Insert kolonları index.html kaydetSiparis ile birebir.
function closeMo(){document.getElementById('mo').classList.remove('open');}
function openDay(tarih){ if(!cF){alert('Önce firma seç');return;} window._qoDay=tarih; qoRender(tarih); }
async function qoRender(tarih){
  var fname=(F.find(function(f){return f.id===cF;})||{}).ad||'?';
  var d=new Date(tarih+'T00:00:00');
  var gl=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'][d.getDay()];
  // BÖLÜM A — o günün mevcut siparişleri
  var rs=await sb.from('siparisler').select('id,siparis_no,durum,toplam_kdv_dahil').eq('firma_id',cF).eq('tarih',tarih).eq('is_deleted',false).order('olusturma',{ascending:true});
  var gunSip=rs.data||[];
  var _gids=gunSip.map(function(s){return s.id;}); var _gk={};
  if(_gids.length){ var _rgk=await sb.from('siparis_kalemleri').select('siparis_id,urun_ad,adet').in('siparis_id',_gids).eq('is_deleted',false);
    (_rgk.data||[]).forEach(function(k){ (_gk[k.siparis_id]=_gk[k.siparis_id]||[]).push(k); }); }
  // BÖLÜM B — firma portföyü
  var port=FY.filter(function(p){return p.firma_id===cF;}).sort(function(a,b){return (a.urun_ad||'').localeCompare(b.urun_ad||'','tr');});
  window._qoRows=port.map(function(p){return {urun_id:p.urun_id,ad:p.urun_ad,fiyat:+p.birim_fiyat_kdv_haric,kdv:+(p.kdv_orani||1),gramaj:((UR.find(function(u){return u.id===p.urun_id;})||{}).gramaj||''),maliyet:+((UR.find(function(u){return u.id===p.urun_id;})||{}).birim_maliyet)||0,adet:0};});
  var h='<div class="mp-h"><h3>'+tarih.slice(8,10)+' '+AY[+tarih.slice(5,7)-1]+' '+gl+'</h3><button class="mp-x" onclick="closeMo();render()">✕</button></div>';
  h+='<div style="color:var(--ac);font-weight:700;margin-bottom:8px">'+esc(fname)+'</div>';
  h+='<div style="font-weight:700;font-size:13px;margin:2px 0 6px">📋 Bu Günün Siparişleri</div>';
  if(gunSip.length){
    h+=gunSip.map(function(s){
      var _kk=_gk[s.id]||[]; var _ta=_kk.reduce(function(a,k){return a+(+k.adet||0);},0);
      var _ln=_kk.length?_kk.map(function(k){return '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--dm);padding:2px 0"><span>'+esc(k.urun_ad||'?')+'</span><span>\u00d7'+AD(k.adet)+'</span></div>';}).join(''):'<div style="font-size:12px;color:var(--dm)">kalem bilgisi yok</div>';
      return '<div style="padding:8px 0;border-bottom:1px solid var(--bd)">'
        +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px">'+esc(s.siparis_no||'\u2014')+' <span style="font-size:11px;color:var(--dm)">('+esc(s.durum||'')+')</span></span><b>'+TL(s.toplam_kdv_dahil)+'</b></div>'
        +'<div style="margin-top:4px">'+_ln+'</div>'
        +'<div style="text-align:right;font-size:11px;color:var(--dm);margin-top:2px">toplam '+AD(_ta)+' adet</div>'
      +'</div>';}).join('')+'<div style="font-size:11px;color:var(--dm);margin-top:6px;padding-top:4px;border-top:1px dashed var(--bd)">💡 Düzeltmek için: Siparişler → Aç → ✏️ Düzenle</div>';
  } else { h+='<div style="color:var(--dm);font-size:13px;padding:6px 0">Bu gün sipariş yok</div>'; }
  h+='<div style="font-weight:700;font-size:13px;margin:14px 0 6px;border-top:1px solid var(--bd);padding-top:10px">➕ YENİ Sipariş — mevcut siparişi değiştirmez</div>';
  if(!window._qoRows.length){
    h+='<div style="color:var(--rd);font-size:13px">Bu firmada aktif ürün/fiyat yok. Önce 📦 Portföy\'den ürün/fiyat girin.</div>'
      +'<div style="display:flex;gap:6px;margin-top:10px"><button class="b s" style="flex:1" onclick="setTab(\'fiyat\')">Portföy\'e Git</button><button class="b s" style="flex:1" onclick="closeMo();render()">Kapat</button></div>';
    document.getElementById('mp').innerHTML=h;document.getElementById('mo').classList.add('open');return;
  }
  h+='<div id="qoList">'+qoRowsHtml()+'</div>';
  h+='<div id="qoFooter" style="position:sticky;bottom:0;background:var(--s2,#181b22);border-top:1px solid var(--bd);padding:10px 0 4px;margin-top:8px">';
  h+='<div id="qoToplam" class="tot" style="text-align:right;font-weight:800;font-size:18px;margin-bottom:8px"></div>';
  h+='<button class="b full" style="font-size:16px;padding:14px;min-height:48px" id="qoSaveBtn" onclick="qoSave()">Kaydet</button>';
  h+='<div style="display:flex;gap:6px;margin-top:6px"><button class="b s" style="flex:1" onclick="qoNextDay()">Sonraki güne geç →</button><button class="b s" style="flex:1" onclick="closeMo();render()">Kapat</button></div>';
  h+='</div>';
  document.getElementById('mp').innerHTML=h;document.getElementById('mo').classList.add('open');qoHesap();
}
function qoRowsHtml(){
  return (window._qoRows||[]).map(function(s,i){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)"><div style="flex:1;min-width:0"><div style="font-size:14px">'+esc(s.ad)+(s.gramaj?' <span style="font-size:11px;color:var(--dm)">('+esc(s.gramaj)+')</span>':'')+'</div><div style="font-size:12px;color:var(--dm)">'+TL(s.fiyat)+'/br (KDV hariç) · KDV %'+s.kdv+(s.maliyet>0&&s.fiyat<s.maliyet?' <span style="color:#e05c5c;font-weight:700">⚠ maliyet altı</span>':'')+'</div><div style="font-size:11px;color:var(--dm)" id="qoSat'+i+'"></div></div><input type="number" min="0" step="1" inputmode="numeric" data-qo-idx="'+i+'" style="width:64px;text-align:center" value="'+(s.adet||0)+'" oninput="qoSync(this);qoHesap()" onchange="qoSync(this);qoHesap()"></div>';
  }).join('');
}
// P0 DOM-SOURCE FALLBACK: adet'i DOM input'larından tek doğruluk kaynağı olarak oku (state kaybına karşı)
function qoAdetOf(inp){ return Math.max(0, Math.floor(Number(inp && inp.value)||0)); }
function qoSync(inp){ var i=+inp.getAttribute('data-qo-idx'); if(window._qoRows&&window._qoRows[i]) window._qoRows[i].adet=qoAdetOf(inp); }
function qoReadFromDOM(){
  var inputs=document.querySelectorAll('#qoList input[data-qo-idx]');
  inputs.forEach(function(inp){ var i=+inp.getAttribute('data-qo-idx'); if(window._qoRows&&window._qoRows[i]) window._qoRows[i].adet=qoAdetOf(inp); });
}
function qoHesap(){
  qoReadFromDOM();
  var tA=0,tD=0;
  (window._qoRows||[]).forEach(function(s,i){ var sd=(s.adet||0)*s.fiyat*(1+s.kdv/100); tA+=(s.adet||0); tD+=sd; var el=document.getElementById('qoSat'+i); if(el) el.textContent=s.adet>0?('Satır: '+TL(sd)+' (KDV dahil)'):''; });
  var t=document.getElementById('qoToplam'); if(t) t.textContent='Toplam: '+AD(tA)+' adet · '+TL(tD)+' (KDV dahil)';
}
async function qoSave(){
  qoReadFromDOM();
  var dolu=(window._qoRows||[]).filter(function(s){return s.adet>0;});
  if(!dolu.length){ alert('En az bir ürüne adet gir'); return; }
  if(dolu.some(function(s){return !s.urun_id;})){ alert('Yalnızca firma kataloğundaki ürünler eklenebilir'); return; }
  // [NEG-MARGIN] maliyet altı satış uyarısı
  var _zarar=dolu.filter(function(s){return s.maliyet>0 && s.fiyat<s.maliyet;});
  if(_zarar.length && !confirm(_zarar.length+' ürün maliyetin ALTINDA satılıyor (zarar): '+_zarar.map(function(s){return s.ad;}).join(', ')+'. Yine de kaydet?')){ return; }
  // [DUP-GUARD] aynı firma+gün aktif sipariş varsa soft uyarı (D-native, fail-open, hard-block yok)
  try{
    var _dupq=await sb.from('siparisler').select('id').eq('firma_id',cF).eq('tarih',window._qoDay).eq('is_deleted',false).neq('durum','iptal');
    if(_dupq.data && _dupq.data.length){
      if(!confirm('⚠ Bu firmaya bu tarih için zaten sipariş bulunmaktadır.\n\nMevcut siparişi düzeltmek istiyorsan: Siparişler → Aç → ✏ Düzenle\n\nAYRI yeni sipariş oluşturmak istiyor musun?')){ return; }
    }
  }catch(e){ /* fail-open: okuma hatası kaydı engellemez */ }
  var btn=document.getElementById('qoSaveBtn'); if(btn){btn.disabled=true;btn.textContent='Kaydediliyor...';}
  var who='Firma Yönetim'; try{ var u=await sb.auth.getUser(); if(u.data&&u.data.user&&u.data.user.email) who=u.data.user.email; }catch(e){}
  // siparisler insert — index.html kaydetSiparis BİREBİR; toplam/kâr/cari ELLE YAZILMAZ (trigger hesaplar)
  var kalemler=dolu.map(function(s){return {urun_id:s.urun_id,urun_ad:s.ad,adet:s.adet,birim_fiyat_kdv_haric:s.fiyat,kdv_orani:s.kdv};});
  var r=await sb.rpc('siparis_kaydet', {p_firma:cF, p_tarih:window._qoDay, p_teslim:window._qoDay, p_kalemler:kalemler}); // [ORDER-RPC-1] atomik tek RPC
  if(r.error){ if(btn){btn.disabled=false;btn.textContent='Kaydet';} console.error('[qoSave] rpc hatası:', r.error); alert('Sipariş kaydedilemedi: '+((r.error&&r.error.message)||'tekrar deneyin')); return; }
  await qoRender(window._qoDay); // modal açık kalır, mevcut liste yenilenir, adetler sıfırlanır
}
function qoNextDay(){ var d=new Date(window._qoDay+'T00:00:00'); d.setDate(d.getDate()+1); openDay(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
</script>
